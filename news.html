<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ニュース</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0c0c12;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --text: #e4e2dc;
    --muted: #555;
    --accent: #f0d060;
    --accent-dim: rgba(240,208,96,0.1);
    --accent-border: rgba(240,208,96,0.2);
    --sidebar-w: 148px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Meiryo','メイリオ','Hiragino Kaku Gothic Pro',sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

  #header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(12,12,18,0.97);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }
  #header-top { display: flex; align-items: center; justify-content: space-between; padding: 14px 0 10px; }
  #logo { font-size: 20px; font-weight: 900; color: #fff; letter-spacing: -0.5px; }

  .btn { background: var(--surface); border: 1px solid var(--border); color: #aaa; border-radius: 8px; padding: 6px 14px; font-size: 12px; cursor: pointer; font-family: 'Meiryo','メイリオ',sans-serif; transition: background 0.15s; }
  .btn:hover { background: rgba(255,255,255,0.1); }
  #header-actions { display: flex; gap: 8px; align-items: center; }

  #tab-row { display: flex; gap: 4px; padding-bottom: 12px; overflow-x: auto; scrollbar-width: none; }
  #tab-row::-webkit-scrollbar { display: none; }
  .cat-tab { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 20px; padding: 5px 18px; font-size: 12px; cursor: pointer; white-space: nowrap; font-family: inherit; transition: all 0.15s; }
  .cat-tab.active { background: #fff; color: #0c0c12; border-color: #fff; font-weight: 700; }

  /* Source menu */
  #source-menu-wrap { position: relative; }
  #source-menu { display: none; position: absolute; right: 0; top: calc(100% + 6px); background: #18181f; border: 1px solid var(--border); border-radius: 14px; padding: 20px; z-index: 200; width: 700px; max-width: 95vw; box-shadow: 0 12px 40px rgba(0,0,0,0.8); }
  #source-menu.open { display: block; }
  #source-menu-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  #source-menu-header h4 { font-size: 12px; color: #aaa; font-weight: 700; }
  #source-menu-actions { display: flex; gap: 8px; }
  .btn-small { background: var(--surface); border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-family: inherit; }
  .btn-small:hover { background: rgba(255,255,255,0.1); color: #ccc; }
  .btn-small.active { background: rgba(255,255,255,0.12); color: #ccc; border-color: rgba(255,255,255,0.2); }
  .btn-apply { background: var(--accent-dim) !important; border-color: var(--accent-border) !important; color: var(--accent) !important; font-weight: 700; }
  .btn-apply:hover { background: rgba(240,208,96,0.2) !important; }
  .source-card.dragging { opacity: 0.4; transform: scale(0.97); }
  .source-card.drag-over { border-color: var(--accent) !important; background: var(--accent-dim) !important; }
  #source-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; max-height: 55vh; overflow-y: auto; padding-right: 4px; }
  #source-grid::-webkit-scrollbar { width: 4px; }
  #source-grid::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 2px; }
  #custom-source-form { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 14px; }
  #custom-source-form h4 { font-size: 12px; color: #aaa; font-weight: 700; margin-bottom: 10px; }
  .custom-form-row { display: grid; grid-template-columns: 1fr 1fr 1fr 2fr auto; gap: 8px; align-items: center; }
  .custom-input { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 7px; padding: 6px 10px; font-size: 12px; color: var(--text); font-family: inherit; width: 100%; transition: border-color 0.15s; }
  .custom-input:focus { outline: none; border-color: rgba(255,255,255,0.25); }
  .custom-input::placeholder { color: #3a3a5a; }
  .btn-add { background: var(--accent-dim); border: 1px solid var(--accent-border); color: var(--accent); border-radius: 7px; padding: 6px 14px; font-size: 12px; cursor: pointer; font-weight: 700; font-family: inherit; white-space: nowrap; transition: background 0.15s; }
  .btn-add:hover { background: rgba(240,208,96,0.2); }
  .custom-cats { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
  .custom-cat-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 12px; padding: 3px 10px; font-size: 11px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .custom-cat-btn.active { background: #fff; color: #0c0c12; border-color: #fff; font-weight: 700; }
  #custom-add-msg { font-size: 11px; margin-top: 6px; height: 14px; }
  #custom-add-msg.ok { color: #6f6; }
  #custom-add-msg.err { color: #f88; }
  .source-card { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 6px 8px; cursor: pointer; transition: all 0.15s; user-select: none; }
  .source-card:hover { background: rgba(255,255,255,0.07); }
  .source-card.active { border-color: var(--c); background: color-mix(in srgb, var(--c) 10%, transparent); }
  .source-card-emoji { font-size: 14px; flex-shrink: 0; }
  .source-card-info { flex: 1; min-width: 0; }
  .source-card-name { font-size: 10px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .source-card-cat { font-size: 9px; color: var(--muted); margin-top: 1px; }
  .source-card-check { width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.15); flex-shrink: 0; transition: all 0.15s; display: flex; align-items: center; justify-content: center; font-size: 8px; }
  .source-card.active .source-card-check { background: var(--c); border-color: var(--c); color: #fff; }
  .source-card-del { font-size: 14px; color: #444; cursor: pointer; padding: 2px 4px; border-radius: 4px; line-height: 1; transition: color 0.15s; flex-shrink: 0; }
  .source-card-del:hover { color: #f88; }

  /* Layout */
  #layout { display: flex; flex: 1; min-height: 0; }

  /* Sidebar */
  #sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 10px 0 20px;
    overflow-y: auto;
    position: sticky;
    top: 88px;
    height: calc(100vh - 88px);
    scrollbar-width: thin;
    scrollbar-color: #2a2a3a transparent;
  }
  #sidebar::-webkit-scrollbar { width: 3px; }
  #sidebar::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 2px; }
  #sidebar-title { font-size: 9px; letter-spacing: 0.1em; color: #2a2a3a; padding: 0 10px 6px; text-transform: uppercase; font-weight: 700; }
  .sidebar-src {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 8px 4px 10px;
    cursor: grab;
    transition: background 0.12s, border-color 0.12s;
    border-left: 3px solid transparent;
    user-select: none;
  }
  .sidebar-src:active { cursor: grabbing; }
  .sidebar-src:hover { background: rgba(255,255,255,0.04); }
  .sidebar-src.active { background: rgba(255,255,255,0.07); border-left-color: var(--sc, #fff); }
  .sidebar-src.drag-over { border-left-color: var(--accent) !important; background: var(--accent-dim) !important; }
  .sidebar-src.dragging { opacity: 0.35; }
  .sidebar-favicon { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; object-fit: contain; }
  .sidebar-name { font-size: 10px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; transition: color 0.12s; }
  .sidebar-src.active .sidebar-name { color: #ccc; font-weight: 700; }
  .sidebar-count { font-size: 9px; color: #2a2a3a; min-width: 14px; text-align: right; flex-shrink: 0; }
  .sidebar-src.active .sidebar-count { color: #555; }

  /* Main */
  #main { flex: 1; min-width: 0; padding: 20px 24px 80px; }
  #status-bar { font-size: 11px; color: #3a3a4a; margin-bottom: 16px; }
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; transition: border-color 0.2s, transform 0.15s; }
  .card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
  .card-thumb { width: 100%; height: 190px; overflow: hidden; background: #111; flex-shrink: 0; }
  .card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
  .card:hover .card-thumb img { transform: scale(1.04); }
  .card-body { flex: 1; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
  .card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

  /* Source badge with favicon */
  .source-badge { border-radius: 5px; padding: 2px 7px; font-size: 10px; font-weight: 700; letter-spacing: 0.04em; white-space: nowrap; display: inline-flex; align-items: center; gap: 4px; }
  .badge-favicon { width: 11px; height: 11px; border-radius: 2px; flex-shrink: 0; object-fit: contain; }
  .time-label { font-size: 10px; color: var(--muted); white-space: nowrap; }
  .cat-label { font-size: 10px; color: #444; background: rgba(255,255,255,0.04); border-radius: 4px; padding: 1px 6px; }
  .title-len { font-size: 10px; color: #3a4a3a; background: rgba(255,255,255,0.03); border-radius: 4px; padding: 1px 6px; margin-left: auto; }
  .title-len.long { color: #8a6a30; background: rgba(240,160,60,0.08); }
  /* 記事文字数 */
  .art-len { font-size: 10px; color: #2a3855; border-radius: 4px; padding: 1px 6px; white-space: nowrap; transition: color 0.3s; }
  .art-len.ready { color: #4a6a99; }

  .card-title { font-size: 14px; font-weight: 700; color: var(--text); text-decoration: none; line-height: 1.55; display: block; transition: color 0.15s; }
  .card-title:hover { color: var(--accent); }

  /* List cards (no thumb): 2-column row */
  .card.card-list { flex-direction: row; align-items: stretch; }
  .card.card-list .card-list-accent { width: 3px; align-self: stretch; flex-shrink: 0; }
  .card.card-list .card-body { padding: 8px 12px; gap: 3px; flex-direction: column; min-width: 0; }
  .card.card-list .card-meta .cat-label,
  .card.card-list .card-meta .title-len,
  .card.card-list .card-meta .art-len { display: none; }
  .card.card-list .card-title { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  /* 2-col list wrapper */
  .list-row { grid-column: 1/-1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }

  #loading { text-align: center; padding: 80px 0; color: var(--muted); }
  #loading .spin { font-size: 36px; display: inline-block; animation: spin 1s linear infinite; margin-bottom: 12px; }
  #empty { text-align: center; padding: 80px 0; color: #333; grid-column: 1/-1; font-size: 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .filter-opt { background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#888;border-radius:6px;padding:5px 11px;font-size:11px;cursor:pointer;font-family:inherit;transition:all 0.15s;white-space:nowrap; }
  .filter-opt:hover { background:rgba(255,255,255,0.1);color:#ccc; }
  .filter-opt.active { background:#fff;color:#0c0c12;border-color:#fff;font-weight:700; }
  .time-divider { grid-column:1/-1;display:flex;align-items:center;gap:10px;padding:6px 0;margin:4px 0; }
  .time-divider-line { flex:1;height:1px;background:rgba(255,255,255,0.06); }
  .time-divider-label { font-size:10px;color:#444;white-space:nowrap;letter-spacing:0.06em; }
  .btn-del-selected { background: rgba(255,80,80,0.08) !important; border-color: rgba(255,80,80,0.2) !important; color: #f87 !important; }
  .btn-del-selected:hover { background: rgba(255,80,80,0.18) !important; }

  #del-confirm-overlay { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
  #del-confirm-overlay.open { display: flex; }
  #del-confirm-box { background: #18181f; border: 1px solid rgba(255,80,80,0.3); border-radius: 16px; padding: 28px 32px; max-width: 360px; width: 90vw; box-shadow: 0 16px 48px rgba(0,0,0,0.9); animation: fadeIn 0.15s ease; }
  #del-confirm-box h3 { font-size: 15px; font-weight: 900; color: #fff; margin-bottom: 10px; }
  #del-confirm-box p { font-size: 12px; color: #888; line-height: 1.7; margin-bottom: 18px; }
  #del-confirm-box .del-names { font-size: 11px; color: #f88; background: rgba(255,80,80,0.06); border: 1px solid rgba(255,80,80,0.12); border-radius: 8px; padding: 8px 12px; margin-bottom: 18px; max-height: 120px; overflow-y: auto; line-height: 1.8; }
  #del-confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }
  #del-confirm-actions .btn-cancel { background: var(--surface); border: 1px solid var(--border); color: #aaa; border-radius: 8px; padding: 7px 18px; font-size: 12px; cursor: pointer; font-family: inherit; }
  #del-confirm-actions .btn-cancel:hover { background: rgba(255,255,255,0.1); }
  #del-confirm-actions .btn-danger { background: rgba(255,60,60,0.15); border: 1px solid rgba(255,60,60,0.35); color: #f66; border-radius: 8px; padding: 7px 18px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
  #del-confirm-actions .btn-danger:hover { background: rgba(255,60,60,0.28); }

  @media (max-width: 700px) { #sidebar { display: none; } #main { padding: 14px 12px 60px; } }
</style>
</head>
<body>

<div id="header">
  <div id="header-top">
    <div id="logo"><span style="font-size:11px;color:#444;letter-spacing:0.08em;">ニュース</span></div>
    <div id="header-actions">
      <div id="source-menu-wrap">
        <button class="btn" id="source-menu-btn" onclick="toggleSourceMenu()">📡 ソース選択</button>
        <div id="source-menu">
          <div id="source-menu-header">
            <h4>取得するサイトを選ぶ</h4>
            <div id="source-menu-actions">
              <button class="btn-small btn-apply" onclick="applyAndClose()">✓ 適用</button>
              <button class="btn-small btn-del-selected" id="btn-del-selected" onclick="deleteSelectedSources()">🗑 削除</button>
              <button class="btn-small" onclick="selectAll()">すべて選択</button>
              <button class="btn-small" onclick="selectNone()">すべて解除</button>
            </div>
          </div>
          <div id="source-sort-bar" style="display:flex;gap:5px;margin-bottom:10px;align-items:center;">
            <span style="font-size:10px;color:#555;flex-shrink:0;">並び順:</span>
            <button class="btn-small src-sort active" data-srcSort="default" onclick="setSourceSort('default',this)">デフォルト</button>
            <button class="btn-small src-sort" data-srcSort="cat" onclick="setSourceSort('cat',this)">カテゴリ</button>
            <button class="btn-small src-sort" data-srcSort="name" onclick="setSourceSort('name',this)">名前順</button>
            <span style="font-size:10px;color:#444;margin-left:6px;" id="drag-hint">✥ ドラッグで並び替え可</span>
          </div>
          <div id="source-grid"></div>
          <div id="custom-source-form">
            <h4>＋ ソースを自分で追加</h4>
            <div class="custom-form-row">
              <input class="custom-input" id="ci-name" placeholder="名前（例: 日経）" />
              <input class="custom-input" id="ci-emoji" placeholder="絵文字（例: 📰）" maxlength="2" />
              <input class="custom-input" id="ci-color" type="color" value="#4488ff" style="padding:3px 6px;height:32px;" />
              <input class="custom-input" id="ci-url" placeholder="RSS URL（例: https://...feed.xml）" />
              <button class="btn-add" onclick="addCustomSource()">追加</button>
            </div>
            <div class="custom-cats" id="custom-cat-row"></div>
            <div id="custom-add-msg"></div>
          </div>
        </div>
      </div>
      <div id="filter-menu-wrap" style="position:relative;">
        <button class="btn" id="filter-btn" onclick="toggleFilterMenu()">⚙️ 絞り込み</button>
        <div id="filter-menu" style="display:none;position:absolute;right:0;top:calc(100% + 6px);background:#18181f;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px;z-index:200;width:260px;box-shadow:0 12px 40px rgba(0,0,0,0.8);">
          <div style="font-size:11px;color:#aaa;font-weight:700;margin-bottom:10px;">並び替え</div>
          <div style="display:flex;gap:6px;margin-bottom:14px;">
            <button class="filter-opt active" data-sort="new" onclick="setSort('new',this)">新しい順</button>
            <button class="filter-opt" data-sort="old" onclick="setSort('old',this)">古い順</button>
          </div>
          <div style="font-size:11px;color:#aaa;font-weight:700;margin-bottom:10px;">この時間より前の記事を表示</div>
          <div style="display:flex;flex-direction:column;gap:6px;">
            <button class="filter-opt active" data-time="all" onclick="setTime('all',this)">すべて</button>
            <button class="filter-opt" data-time="1" onclick="setTime('1',this)">1時間より前</button>
            <button class="filter-opt" data-time="3" onclick="setTime('3',this)">3時間より前</button>
            <button class="filter-opt" data-time="6" onclick="setTime('6',this)">6時間より前</button>
            <button class="filter-opt" data-time="12" onclick="setTime('12',this)">12時間より前</button>
            <button class="filter-opt" data-time="24" onclick="setTime('24',this)">24時間より前</button>
          </div>
          <div style="font-size:11px;color:#aaa;font-weight:700;margin:14px 0 10px;">時刻区切りを表示</div>
          <div style="display:flex;gap:6px;">
            <button class="filter-opt" id="divider-btn" onclick="toggleDividers(this)">OFF</button>
          </div>
        </div>
      </div>
      <button class="btn" id="refresh-btn" onclick="loadAll()">🔄 更新</button>
    </div>
  </div>
  <div id="tab-row"></div>
</div>

<div id="layout">
  <div id="sidebar">
    <div id="sidebar-title">提供元</div>
    <div id="sidebar-list"></div>
  </div>
  <div id="main">
    <div id="status-bar"></div>
    <div id="loading"><div class="spin">⚡</div><div>ニュースを取得中...</div></div>
    <div id="grid" style="display:none"></div>
  </div>
</div>

<div id="del-confirm-overlay">
  <div id="del-confirm-box">
    <h3>🗑 ソースを削除しますか？</h3>
    <p>以下のソースを一覧から完全に削除します。<br>削除後は「ソースを自分で追加」から再登録できます。</p>
    <div class="del-names" id="del-confirm-names"></div>
    <div id="del-confirm-actions">
      <button class="btn-cancel" onclick="closeDelConfirm()">キャンセル</button>
      <button class="btn-danger" onclick="confirmDelete()">削除する</button>
    </div>
  </div>
</div>

<script>
const BUILTIN_SOURCES = [
  { id:"nhk",       name:"NHK",             short:"NHK",        cat:"国内",       color:"#e8380d", emoji:"📺", url:"https://www3.nhk.or.jp/rss/news/cat0.xml" },
  { id:"asahi",     name:"朝日新聞",          short:"朝日",        cat:"国内",       color:"#c62828", emoji:"📰", url:"https://www.asahi.com/rss/asahi/newsheadlines.rdf" },
  { id:"mainichi",  name:"毎日新聞",          short:"毎日",        cat:"国内",       color:"#2e7d32", emoji:"📄", url:"https://news.google.com/rss/search?q=%E6%AF%8E%E6%97%A5%E6%96%B0%E8%81%9E&hl=ja&gl=JP&ceid=JP:ja" },
  { id:"sankei",    name:"産経新聞",          short:"産経",        cat:"国内",       color:"#e65100", emoji:"📋", url:"https://news.google.com/rss/search?q=site:sankei.com&hl=ja&gl=JP&ceid=JP:ja" },
  { id:"livedoor",  name:"livedoorニュース",  short:"livedoor",   cat:"国内",       color:"#ff4444", emoji:"📡", url:"https://news.livedoor.com/topics/rss/top.xml" },
  { id:"yhoo_soc",  name:"Yahooニュース",     short:"Y!国内",      cat:"国内",       color:"#ff0033", emoji:"🔴", url:"https://news.yahoo.co.jp/rss/topics/domestic.xml" },
  { id:"yhoo_main", name:"Yahoo主要",         short:"Y!主要",      cat:"国内",       color:"#cc0000", emoji:"🗞", url:"https://news.yahoo.co.jp/rss/topics/top-picks.xml" },
  { id:"jcast",     name:"J-CASTニュース",    short:"J-CAST",     cat:"国内",       color:"#e91e63", emoji:"📢", url:"https://www.j-cast.com/index.xml" },

function faviconUrl(domain) { return domain ? `https://www.google.com/s2/favicons?domain=${domain}&sz=32` : ""; }
function domainOf(url) { try { return new URL(url).hostname; } catch { return ""; } }

// ─── サムネイル ───
const BAD_THUMB = [/1x1/i,/pixel/i,/tracking/i,/beacon/i,/analytics/i,/logo/i,/icon\.(png|gif|jpg)/i,/blank/i,/spacer/i,/ads?\//i,/ad\.(png|jpg|gif)/i,/\.gif$/i];
function goodThumb(url) {
  if (!url || !url.startsWith("http")) return false;
  return !BAD_THUMB.some(p => p.test(url));
}
function extractThumb(item) {
  const cands = [];
  const NS = ["http://search.yahoo.com/mrss/","http://www.rssboard.org/media-rss","http://video.search.yahoo.com/mrss/","http://search.yahoo.com/mrss"];
  for (const ns of NS) for (const tag of ["content","thumbnail"]) {
    const els = item.getElementsByTagNameNS(ns, tag);
    for (let i = 0; i < els.length; i++) {
      const u = els[i].getAttribute("url");
      const w = parseInt(els[i].getAttribute("width")||"0"), h = parseInt(els[i].getAttribute("height")||"0");
      if (goodThumb(u)) cands.push({url:u, score:w*h||100});
    }
  }
  const enc = item.querySelector("enclosure");
  if (enc) { const t=enc.getAttribute("type")||"",u=enc.getAttribute("url")||""; if (goodThumb(u)&&(t.startsWith("image")||/\.(jpg|jpeg|png|webp)/i.test(u))) cands.push({url:u,score:80}); }
  for (const tag of ["description","encoded","content"]) {
    const el = item.querySelector(tag); if (!el) continue;
    const html = el.textContent||"";
    const ms = [...html.matchAll(/<img[^>]+src=["']([^"']+)["'][^>]*(?:width=["']?(\d+)["']?)?/gi)];
    for (const m of ms) { const u=m[1],w=parseInt(m[2]||"0"); if (goodThumb(u)) cands.push({url:u,score:w>0?w*w:60}); }
    if (cands.length) break;
  }
  const ii = item.getElementsByTagNameNS("http://www.itunes.com/dtds/podcast-1.0.dtd","image")[0];
  if (ii) { const u=ii.getAttribute("href")||ii.textContent; if (goodThumb(u)) cands.push({url:u,score:50}); }
  if (!cands.length) return null;
  cands.sort((a,b)=>b.score-a.score);
  return cands[0].url;
}
function extractDomain(url) { try { return new URL(url).hostname.replace(/^www\./,""); } catch { return ""; } }
function stripHtml(h) { if (!h) return ""; return h.replace(/<[^>]*>/g," ").replace(/\s+/g," ").trim().slice(0,600); }

// ─── 日時フォーマット（「〇分前」ではなく実際の日時）───
function fmtDate(d) {
  if (!d) return "";
  const dt = new Date(d); if (isNaN(dt)) return "";
  const now = new Date();
  const M = dt.getMonth()+1, D = dt.getDate();
  const h = String(dt.getHours()).padStart(2,"0"), m = String(dt.getMinutes()).padStart(2,"0");
  if (dt.getFullYear() === now.getFullYear()) return `${M}/${D} ${h}:${m}`;
  return `${dt.getFullYear()}/${M}/${D} ${h}:${m}`;
}

const artLenCache = {};
async function getArticleLen(url) {
  if (url in artLenCache) return artLenCache[url];
  artLenCache[url] = 0;
  try {
    const enc = encodeURIComponent(url);
    let html = null;
    try { const r = await fetch(`https://api.allorigins.win/get?url=${enc}`,{signal:AbortSignal.timeout(12000)}); if (r.ok){const j=await r.json(); if(j.contents?.length>300) html=j.contents;} } catch {}
    if (!html) { try { const r=await fetch(`https://corsproxy.io/?${enc}`,{signal:AbortSignal.timeout(12000)}); if(r.ok){const t=await r.text(); if(t?.length>300) html=t;} } catch {} }
    if (!html) { artLenCache[url]=-1; return -1; }
    const doc = new DOMParser().parseFromString(html,"text/html");
    doc.querySelectorAll("script,style,nav,header,footer,aside").forEach(e=>e.remove());
    let text = "";
    const art = doc.querySelector("article,main,.article-body,.post-body,.entry-content,.news-body,.article-content");
    text = art ? (art.textContent||"") : [...doc.querySelectorAll("p")].map(p=>p.textContent).join("");
    const len = text.replace(/\s+/g,"").length;
    artLenCache[url] = len > 80 ? len : -1;
    return artLenCache[url];
  } catch { artLenCache[url]=-1; return -1; }
}

// ─── RSS フェッチ ───
function rss2jsonToXml(j) {
  if (j.status !== "ok" || !j.items?.length) return null;
  const items = j.items.map(i => `<item><title><![CDATA[${i.title}]]></title><link>${i.link}</link><pubDate>${i.pubDate}</pubDate><description><![CDATA[${i.description||""}]]></description>${i.thumbnail?`<enclosure url="${i.thumbnail}" type="image/jpeg"/>`:"" }</item>`).join("");
  return `<?xml version="1.0"?><rss><channel>${items}</channel></rss>`;
}
async function fetchWithProxy(url) {
  const enc = encodeURIComponent(url);
  // 1) 自前Netlify Function（最優先・安定）
  try { const r=await fetch(`/api/proxy?url=${enc}`,{signal:AbortSignal.timeout(12000)}); if(r.ok){const t=await r.text(); if(t?.includes("<item")) return t;} } catch {}
  // 2) news.google.comは直接取れることがある
  if (url.includes("news.google.com")) {
    try { const r=await fetch(url,{signal:AbortSignal.timeout(8000)}); if(r.ok){const t=await r.text(); if(t?.includes("<item")) return t;} } catch {}
  }
  // 3) rss2json（フォールバック）
  try { const r=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${enc}&count=20`,{signal:AbortSignal.timeout(10000)}); if(r.ok){const j=await r.json(); const x=rss2jsonToXml(j); if(x) return x;} } catch {}
  // 4) 野良プロキシ（最終手段）
  try { const r=await fetch(`https://api.allorigins.win/get?url=${enc}`,{signal:AbortSignal.timeout(10000)}); if(r.ok){const j=await r.json(); if(j.contents?.includes("<item")) return j.contents;} } catch {}
  try { const r=await fetch(`https://corsproxy.io/?${enc}`,{signal:AbortSignal.timeout(10000)}); if(r.ok){const t=await r.text(); if(t?.includes("<item")) return t;} } catch {}
  return null;
}
async function fetchSource(src) {
  if (src.scrape) return fetchSourceByScrape(src);
  try {
    const text = await fetchWithProxy(src.url); if (!text) return [];
    const xml = new DOMParser().parseFromString(text,"text/xml");
    if (xml.querySelector("parsererror")) return [];
    const srcDomain = domainOf(src.url);
    return Array.from(xml.querySelectorAll("item")).slice(0,PER_SOURCE).map(item => {
      const g = t => item.querySelector(t)?.textContent?.trim()||"";
      const title = g("title");
      let link = g("link")||g("guid")||"";
      return { id:(link||Math.random().toString(36))+src.id, title, titleLen:title.length, link, pubDate:g("pubDate")||g("date"), rawDesc:stripHtml(g("description")||g("encoded")), thumb:extractThumb(item), domain:extractDomain(link), src:src.id, srcName:src.name, srcColor:src.color, srcEmoji:src.emoji, srcDomain, cat:src.cat, artLen:null };
    });
  } catch { return []; }
}

}
function extractDateFromUrl(href, re) {
  if (re) { const m=href.match(re); if(m){const p=new Date(`${m[1]}-${m[2]}-${m[3]}`); if(!isNaN(p)) return p.toISOString();} }
  const m2=href.match(/\/(\d{4})\/(\d{2})\/(\d{2})\//); if(m2){const p=new Date(`${m2[1]}-${m2[2]}-${m2[3]}`); if(!isNaN(p)) return p.toISOString();}
  const m3=href.match(/\/(\d{4})\/(\d{2})\//); if(m3){const p=new Date(`${m3[1]}-${m3[2]}-01`); if(!isNaN(p)) return p.toISOString();}
  return null;
}
function extractDateFromText(text) {
  let m=text.match(/(\d{4})[\/\-](\d{2})[\/\-](\d{2})[\s　T](\d{2}):(\d{2})/); if(m){const p=new Date(`${m[1]}-${m[2]}-${m[3]}T${m[4]}:${m[5]}:00`); if(!isNaN(p)) return p.toISOString();}
  m=text.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/); if(m){const p=new Date(`${m[1]}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`); if(!isNaN(p)) return p.toISOString();}
  m=text.match(/(\d{4})[\/\-](\d{2})[\/\-](\d{2})/); if(m){const p=new Date(`${m[1]}-${m[2]}-${m[3]}`); if(!isNaN(p)) return p.toISOString();}
  return null;
}
async function fetchSourceByScrape(src) {
  const urls = src.urls || [src.url];
  const htmls = await Promise.all(urls.map(u => fetchHtmlViaProxy(u)));
  const seen = new Set(), items = [];
  const srcDomain = domainOf(src.url);
  for (let ui=0; ui<urls.length; ui++) {
    const html=htmls[ui]; if (!html) continue;
    const origin = src.basePath || new URL(urls[ui]).origin;
    const doc = new DOMParser().parseFromString(html,"text/html");
    for (const el of [...doc.querySelectorAll(src.linkSel||"a[href]")]) {
      if (items.length>=PER_SOURCE) break;
      let href=el.getAttribute("href")||"";
      if (href.startsWith("/")) href=origin+href;
      if (!href.startsWith("http")) continue;
      if (seen.has(href)) continue;
      if (src.linkFilter && !new RegExp(src.linkFilter).test(href)) continue;
      seen.add(href);
      let title = src.titleSel ? (el.querySelector(src.titleSel)?.textContent.trim()||el.textContent.trim()) : el.textContent.trim().replace(/\s+/g," ");
      if (!title||title.length<5) continue;
      let thumb=null;
      if (src.thumbSel) { const ie=el.querySelector(src.thumbSel)||el.closest("li,article,div")?.querySelector(src.thumbSel); if(ie){thumb=ie.getAttribute("src")||ie.getAttribute("data-src")||null; if(thumb?.startsWith("/")) thumb=origin+thumb; if(!goodThumb(thumb)) thumb=null;} }
      let pubDate=null;
      const te=el.closest("li,article,div")?.querySelector("time[datetime]"); if(te){const p=new Date(te.getAttribute("datetime")); if(!isNaN(p)) pubDate=p.toISOString();}
      if (!pubDate) pubDate=extractDateFromUrl(href,src.urlDateRe);
      if (!pubDate) for(const sel of ["li","article","div"]){const c=el.closest(sel); if(!c) continue; const d=extractDateFromText(c.textContent||""); if(d){pubDate=d;break;}}
      if (!pubDate) pubDate=new Date().toISOString();
      if (src.maxAgeDays&&(Date.now()-new Date(pubDate))/86400000>src.maxAgeDays) continue;
      items.push({id:href+src.id, title, titleLen:title.length, link:href, pubDate, rawDesc:"", thumb, domain:extractDomain(href), src:src.id, srcName:src.name, srcColor:src.color, srcEmoji:src.emoji, srcDomain, cat:src.cat, artLen:null});
    }
  }
  return items;
}

async function loadAll() {
  document.getElementById("loading").style.display="block";
  document.getElementById("grid").style.display="none";
  document.getElementById("refresh-btn").textContent="更新中...";
  document.getElementById("refresh-btn").disabled=true;
  const active = getSources().filter(s => selectedSources.has(s.id));
  const fetchLog={};
  const results = await Promise.allSettled(active.map(async src => {
    const items = await fetchSource(src);
    fetchLog[src.id]=items.length;
    const done=Object.keys(fetchLog).length, ok=Object.values(fetchLog).filter(n=>n>0).length;
    document.getElementById("status-bar").textContent=`取得中... ${done}/${active.length}　成功: ${ok}サイト`;
    return items;
  }));
  allArticles = results.filter(r=>r.status==="fulfilled").flatMap(r=>r.value).filter(a=>a.title).sort((a,b)=>new Date(b.pubDate)-new Date(a.pubDate));
  const failed = active.filter(s=>(fetchLog[s.id]||0)===0).map(s=>s.name);
  window._failedSources = failed;
  document.getElementById("loading").style.display="none";
  document.getElementById("grid").style.display="grid";
  document.getElementById("refresh-btn").textContent="🔄 更新";
  document.getElementById("refresh-btn").disabled=false;
  render();
  // バックグラウンドで記事文字数を取得（上位40件）
  allArticles.slice(0,40).forEach(async a => {
    if (!a.link) return;
    const len = await getArticleLen(a.link);
    a.artLen = len;
    const el = document.querySelector(`[data-aid="${CSS.escape(a.id)}"]`);
    if (el) { el.textContent = len>0 ? `本文 ${len.toLocaleString()}字` : ""; el.classList.toggle("ready", len>0); }
  });
}

// ─── サイドバー並び順（localStorage）───
function loadSidebarOrder() { try { return JSON.parse(localStorage.getItem("brief_sidebar_order") || "null"); } catch { return null; } }
function saveSidebarOrder(arr) { try { localStorage.setItem("brief_sidebar_order", JSON.stringify(arr)); } catch {} }
let sidebarOrder = loadSidebarOrder(); // null or string[]

// ─── サイドバー ───
let sbDragId = null;
function buildSidebar() {
  const list = document.getElementById("sidebar-list");
  list.innerHTML = "";
  const srcMap = Object.fromEntries(getSources().map(s=>[s.id,s]));
  // 記事が1件以上あるソースID一覧（表示順: sidebarOrder 優先）
  const hasArticle = [...new Set(allArticles.filter(a=>selectedSources.has(a.src)).map(a=>a.src))];
  let orderedIds;
  if (sidebarOrder) {
    const inOrder = sidebarOrder.filter(id => hasArticle.includes(id));
    const rest = hasArticle.filter(id => !sidebarOrder.includes(id));
    orderedIds = [...inOrder, ...rest];
  } else {
    orderedIds = hasArticle;
  }
  const totalCount = allArticles.filter(a=>selectedSources.has(a.src)).length;

  // ── すべて ──
  const allRow = document.createElement("div");
  allRow.className = "sidebar-src" + (sidebarFilterSrc===null?" active":"");
  allRow.style.setProperty("--sc","#aaa");
  const allFav = document.createElement("img"); allFav.className="sidebar-favicon"; allFav.src=faviconUrl("news.google.com"); allFav.onerror=()=>allFav.remove();
  const allName = document.createElement("span"); allName.className="sidebar-name"; allName.textContent="すべて";
  const allCnt = document.createElement("span"); allCnt.className="sidebar-count"; allCnt.textContent=totalCount;
  allRow.append(allFav, allName, allCnt);
  allRow.onclick = () => { sidebarFilterSrc=null; buildSidebar(); render(); };
  list.appendChild(allRow);

  // ── 各ソース（ドラッグ対応）──
  orderedIds.forEach(id => {
    const s = srcMap[id]; if (!s) return;
    const count = allArticles.filter(a=>a.src===id).length;
    const isActive = sidebarFilterSrc===id;
    const domain = domainOf(s.url);
    const displayName = s.short || s.name;

    const row = document.createElement("div");
    row.className = "sidebar-src" + (isActive?" active":"");
    row.style.setProperty("--sc", s.color);
    row.dataset.sid = id;
    row.draggable = true;

    const fav = document.createElement("img"); fav.className="sidebar-favicon"; fav.src=faviconUrl(domain); fav.onerror=()=>fav.remove();
    const name = document.createElement("span"); name.className="sidebar-name"; name.textContent=displayName;
    const cnt = document.createElement("span"); cnt.className="sidebar-count"; cnt.textContent=count;
    row.append(fav, name, cnt);

    // クリック: フィルタ切り替え
    row.onclick = () => { sidebarFilterSrc = isActive ? null : id; buildSidebar(); render(); };

    // ドラッグ
    row.ondragstart = (e) => {
      sbDragId = id;
      row.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      e.stopPropagation();
    };
    row.ondragend = () => {
      row.classList.remove("dragging");
      document.querySelectorAll(".sidebar-src").forEach(r => r.classList.remove("drag-over"));
      sbDragId = null;
    };
    row.ondragover = (e) => {
      e.preventDefault();
      if (sbDragId && sbDragId !== id) {
        document.querySelectorAll(".sidebar-src[data-sid]").forEach(r => r.classList.remove("drag-over"));
        row.classList.add("drag-over");
      }
    };
    row.ondrop = (e) => {
      e.preventDefault(); row.classList.remove("drag-over");
      if (!sbDragId || sbDragId === id) return;
      // 現在の順番を組み直す
      const cur = [...document.querySelectorAll(".sidebar-src[data-sid]")].map(r => r.dataset.sid);
      const fi = cur.indexOf(sbDragId), ti = cur.indexOf(id);
      if (fi === -1 || ti === -1) return;
      cur.splice(fi, 1); cur.splice(ti, 0, sbDragId);
      sidebarOrder = cur; saveSidebarOrder(cur); buildSidebar();
    };

    list.appendChild(row);
  });
}

// ─── レンダリング ───
function render() {
  const hasCustom = customSources.length>0;
  const visibleCats = hasCustom ? CATEGORIES : CATEGORIES.filter(c=>c!=="カスタム");
  const now = Date.now(), hourMs = 3600000;
  let filtered = allArticles.filter(a => {
    if (currentCat!=="すべて" && a.cat!==currentCat) return false;
    if (!selectedSources.has(a.src)) return false;
    if (sidebarFilterSrc!==null && a.src!==sidebarFilterSrc) return false;
    if (currentTimeFilter!=="all") { const age=(now-new Date(a.pubDate))/hourMs; if(age<parseFloat(currentTimeFilter)) return false; }
    return true;
  });
  if (currentSort==="old") filtered=[...filtered].reverse();

  const thumbCount = filtered.filter(a=>a.thumb).length;
  const srcCount = new Set(filtered.map(a=>a.src)).size;
  const failed = window._failedSources||[];
  document.getElementById("status-bar").innerHTML =
    `${filtered.length}件 / ${srcCount}サイト成功 / サムネ${thumbCount}件` +
    (failed.length ? ` &nbsp;<span style="color:#f55">❌失敗: ${failed.join(" / ")}</span>` : "");

  // タブ
  const tabRow = document.getElementById("tab-row"); tabRow.innerHTML="";
  visibleCats.forEach(cat => {
    const btn=document.createElement("button"); btn.className="cat-tab"+(cat===currentCat?" active":"");
    const count=cat==="すべて"?allArticles.filter(a=>selectedSources.has(a.src)).length:allArticles.filter(a=>a.cat===cat&&selectedSources.has(a.src)).length;
    btn.textContent=`${cat} (${count})`; btn.onclick=()=>{currentCat=cat;render();}; tabRow.appendChild(btn);
  });

  const grid = document.getElementById("grid"); grid.innerHTML="";
  if (filtered.length===0) { grid.innerHTML='<div id="empty">記事が見つかりませんでした</div>'; buildSidebar(); return; }

  if (showDividers && currentSort==="new") {
    const labels=[{h:1,label:"── 1時間以内"},{h:3,label:"── 3時間以内"},{h:6,label:"── 6時間以内"},{h:12,label:"── 12時間以内"},{h:24,label:"── 24時間以内"},{h:Infinity,label:"── それ以前"}];
    let di=0;
    filtered.forEach(a => {
      const age=(now-new Date(a.pubDate))/hourMs;
      while(di<labels.length&&age>labels[di].h){const d=document.createElement("div");d.className="time-divider";d.innerHTML=`<div class="time-divider-line"></div><div class="time-divider-label">${labels[di].label}</div><div class="time-divider-line"></div>`;grid.appendChild(d);di++;}
      grid.appendChild(makeCard(a));
    });
  } else {
    // サムネなし記事を2列にまとめる
    let listBuf=[];
    const flush=()=>{
      if(!listBuf.length) return;
      const wrap=document.createElement("div"); wrap.className="list-row";
      listBuf.forEach(a=>wrap.appendChild(makeCard(a)));
      grid.appendChild(wrap);
      listBuf=[];
    };
    filtered.forEach(a => {
      if (!a.thumb) { listBuf.push(a); }
      else { flush(); grid.appendChild(makeCard(a)); }
    });
    flush();
  }
  buildSidebar();
}

// ─── カード生成 ───
function makeBadge(a) {
  const badge = document.createElement("span");
  badge.className="source-badge";
  badge.style.cssText=`background:${a.srcColor}20;color:${a.srcColor};border:1px solid ${a.srcColor}35`;
  const fav=document.createElement("img"); fav.className="badge-favicon";
  fav.src=faviconUrl(a.srcDomain||a.domain); fav.onerror=()=>fav.remove();
  const nm=document.createElement("span"); nm.textContent=`${a.srcEmoji} ${a.srcName}`;
  badge.append(fav,nm);
  return badge;
}
function makeCard(a) {
  const card=document.createElement("div");
  if (!a.thumb) {
    card.className="card card-list";
    const acc=document.createElement("div"); acc.className="card-list-accent"; acc.style.background=a.srcColor; card.appendChild(acc);
    const body=document.createElement("div"); body.className="card-body";
    const meta=document.createElement("div"); meta.className="card-meta";
    const time=document.createElement("span"); time.className="time-label"; time.textContent=fmtDate(a.pubDate);
    meta.append(makeBadge(a),time);
    const title=document.createElement("a"); title.className="card-title"; title.href=a.link; title.target="_blank"; title.rel="noopener noreferrer"; title.textContent=a.title;
    body.append(meta,title); card.appendChild(body);
    return card;
  }
  card.className="card";
  const thumbDiv=document.createElement("div"); thumbDiv.className="card-thumb";
  const img=document.createElement("img"); img.loading="lazy"; img.src=a.thumb; img.alt="";
  img.onerror=()=>{
    card.className="card card-list"; thumbDiv.remove();
    const acc=document.createElement("div"); acc.className="card-list-accent"; acc.style.background=a.srcColor; card.insertBefore(acc,card.firstChild);
    const bodyEl=card.querySelector(".card-body");
    if(bodyEl){bodyEl.style.cssText=""; bodyEl.querySelector(".cat-label")?.remove(); bodyEl.querySelector(".title-len")?.remove(); bodyEl.querySelector(".art-len")?.remove();
      const tEl=bodyEl.querySelector(".card-title"); if(tEl){tEl.style.fontSize="12px";tEl.style.whiteSpace="nowrap";tEl.style.overflow="hidden";tEl.style.textOverflow="ellipsis";}}
    card.style.gridColumn="1/-1";
  };
  thumbDiv.appendChild(img); card.appendChild(thumbDiv);
  const body=document.createElement("div"); body.className="card-body";
  const meta=document.createElement("div"); meta.className="card-meta";
  const time=document.createElement("span"); time.className="time-label"; time.textContent=fmtDate(a.pubDate);
  const catL=document.createElement("span"); catL.className="cat-label"; catL.textContent=a.cat;
  const tLen=document.createElement("span"); tLen.className="title-len"+(a.titleLen>30?" long":""); tLen.textContent=`${a.titleLen}文字`; tLen.title=a.titleLen>30?"タイトルが長め":"";
  // 記事文字数バッジ
  const artL=document.createElement("span"); artL.className="art-len"; artL.setAttribute("data-aid",a.id);
  if(a.artLen&&a.artLen>0){artL.textContent=`本文 ${a.artLen.toLocaleString()}字`;artL.classList.add("ready");}else{artL.textContent="…";}
  meta.append(makeBadge(a),time,catL,tLen,artL);
  const title=document.createElement("a"); title.className="card-title"; title.href=a.link; title.target="_blank"; title.rel="noopener noreferrer"; title.textContent=a.title;
  body.append(meta,title); card.appendChild(body);
  return card;
}

// ─── フィルター ───
function toggleFilterMenu(){const m=document.getElementById("filter-menu");m.style.display=m.style.display==="none"?"block":"none";}
function setSort(val,btn){currentSort=val;document.querySelectorAll("[data-sort]").forEach(b=>b.classList.remove("active"));btn.classList.add("active");render();}
function setTime(val,btn){currentTimeFilter=val;document.querySelectorAll("[data-time]").forEach(b=>b.classList.remove("active"));btn.classList.add("active");render();}
function toggleDividers(btn){showDividers=!showDividers;btn.textContent=showDividers?"ON":"OFF";btn.classList.toggle("active",showDividers);render();}
document.addEventListener("click",e=>{const w=document.getElementById("filter-menu-wrap");if(w&&!w.contains(e.target))document.getElementById("filter-menu").style.display="none";});

// ─── ソースメニュー ───
let dragSrcId=null;
function buildSourceGrid(){
  const grid=document.getElementById("source-grid"); grid.innerHTML="";
  getOrderedSources().forEach(s=>{
    const card=document.createElement("div"); card.className="source-card"+(selectedSources.has(s.id)?" active":""); card.style.setProperty("--c",s.color); card.id="sc-"+s.id; card.dataset.srcId=s.id; card.onclick=()=>toggleSourceCard(s.id);
    if(currentSourceSort==="default"){
      card.draggable=true;
      card.ondragstart=(e)=>{dragSrcId=s.id;card.classList.add("dragging");e.dataTransfer.effectAllowed="move";};
      card.ondragend=()=>{card.classList.remove("dragging");document.querySelectorAll(".source-card").forEach(c=>c.classList.remove("drag-over"));};
      card.ondragover=(e)=>{e.preventDefault();if(dragSrcId&&dragSrcId!==s.id){document.querySelectorAll(".source-card").forEach(c=>c.classList.remove("drag-over"));card.classList.add("drag-over");}};
      card.ondrop=(e)=>{e.preventDefault();card.classList.remove("drag-over");if(!dragSrcId||dragSrcId===s.id)return;const ids=getOrderedSources().map(x=>x.id);const fi=ids.indexOf(dragSrcId),ti=ids.indexOf(s.id);if(fi===-1||ti===-1)return;ids.splice(fi,1);ids.splice(ti,0,dragSrcId);sourceCustomOrder=ids;saveSourceOrder(ids);buildSourceGrid();};
    }
    const emoji=document.createElement("span");emoji.className="source-card-emoji";emoji.textContent=s.emoji;
    const info=document.createElement("div");info.className="source-card-info";
    const name=document.createElement("div");name.className="source-card-name";name.style.color=s.color;name.textContent=s.name;
    const cat=document.createElement("div");cat.className="source-card-cat";cat.textContent=s.cat;
    info.append(name,cat);
    const check=document.createElement("div");check.className="source-card-check";check.textContent=selectedSources.has(s.id)?"✓":"";
    card.append(emoji,info,check);
    if(s.custom){const del=document.createElement("span");del.className="source-card-del";del.textContent="✕";del.title="削除";del.onclick=(e)=>{e.stopPropagation();removeCustomSource(s.id);};card.appendChild(del);}
    grid.appendChild(card);
  });
}
function toggleSourceCard(id){const card=document.getElementById("sc-"+id);const check=card?.querySelector(".source-card-check");if(selectedSources.has(id)){selectedSources.delete(id);card?.classList.remove("active");if(check)check.textContent="";}else{selectedSources.add(id);card?.classList.add("active");if(check)check.textContent="✓";}}
function selectAll(){getOrderedSources().forEach(s=>{selectedSources.add(s.id);const c=document.getElementById("sc-"+s.id);c?.classList.add("active");const ch=c?.querySelector(".source-card-check");if(ch)ch.textContent="✓";});}
function selectNone(){getOrderedSources().forEach(s=>{selectedSources.delete(s.id);const c=document.getElementById("sc-"+s.id);c?.classList.remove("active");const ch=c?.querySelector(".source-card-check");if(ch)ch.textContent="";});}
function applyAndClose(){document.getElementById("source-menu").classList.remove("open");render();}
function toggleSourceMenu(){document.getElementById("source-menu").classList.toggle("open");}

let pendingDeleteIds=[];
function deleteSelectedSources(){
  if(!selectedSources.size) return;
  const targets=getSources().filter(s=>selectedSources.has(s.id)); if(!targets.length) return;
  pendingDeleteIds=targets.map(s=>s.id);
  document.getElementById("del-confirm-names").textContent=targets.map(s=>`${s.emoji} ${s.name}`).join("\n");
  document.getElementById("del-confirm-overlay").classList.add("open");
}
function closeDelConfirm(){document.getElementById("del-confirm-overlay").classList.remove("open");pendingDeleteIds=[];}
function confirmDelete(){
  for(const id of pendingDeleteIds){customSources=customSources.filter(s=>s.id!==id);hiddenSourceIds.add(id);selectedSources.delete(id);}
  saveCustomSources(customSources);saveHiddenSources([...hiddenSourceIds]);closeDelConfirm();buildSourceGrid();
}
document.getElementById("del-confirm-overlay").addEventListener("click",function(e){if(e.target===this)closeDelConfirm();});
document.addEventListener("click",e=>{const w=document.getElementById("source-menu-wrap");if(!w.contains(e.target))document.getElementById("source-menu").classList.remove("open");});

function buildCustomCatButtons(){
  const row=document.getElementById("custom-cat-row");row.innerHTML="";
  ["国内","テクノロジー","エンタメ","スポーツ","海外","経済","ライフ","地域","カスタム"].forEach(c=>{
    const btn=document.createElement("button");btn.className="custom-cat-btn"+(c===selectedCustomCat?" active":"");btn.textContent=c;btn.onclick=()=>{selectedCustomCat=c;buildCustomCatButtons();};row.appendChild(btn);
  });
}
async function addCustomSource(){
  const name=document.getElementById("ci-name").value.trim(),emoji=document.getElementById("ci-emoji").value.trim()||"📰",color=document.getElementById("ci-color").value||"#4488ff",url=document.getElementById("ci-url").value.trim();
  const msg=document.getElementById("custom-add-msg");
  if(!name||!url){msg.textContent="名前とURLを入力してください";msg.className="err";return;}
  if(!/^https?:\/\//.test(url)){msg.textContent="URLはhttp://かhttps://で始めてください";msg.className="err";return;}
  if(getSources().find(s=>s.url===url)){msg.textContent="このURLはすでに追加されています";msg.className="err";return;}
  const id="custom_"+Date.now();
  customSources.push({id,name,cat:selectedCustomCat,color,emoji,url,custom:true});saveCustomSources(customSources);selectedSources.add(id);
  document.getElementById("ci-name").value="";document.getElementById("ci-emoji").value="";document.getElementById("ci-url").value="";
  msg.textContent=`✅ "${name}" を追加しました！適用ボタンで反映されます`;msg.className="ok";
  buildSourceGrid();
}
function removeCustomSource(id){customSources=customSources.filter(s=>s.id!==id);saveCustomSources(customSources);selectedSources.delete(id);buildSourceGrid();}

buildCustomCatButtons();
buildSourceGrid();
loadAll();
