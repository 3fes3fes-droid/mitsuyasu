信を実現する技術。GPS（衛星測位）、MIMO（複数アンテナによる高速通信）、キャリアアグリゲーション（複数周波数帯の束ね）はいずれも異なる無線技術。","has_choices":true},{"year":"令和6年度","num":"問85","answer":"エ","question":"関数binaryToIntegerは、1桁以上の符号なし2進数を文字列で表した値を引数binaryStrで受け取り、その値を整数に変換した結果を戻り値とする。例えば、引数として「100」を受け取ると、4を返す。プログラム中のa, bに入れる字句の適切な組合せはどれか。（末尾からi番目の文字の整数値をdigitNumとし、exponent←a、integerNum←bと更新） エ a:2の（i－1）乗、b:integerNum＋digitNum×exponent","choices":{"ア":"a:2のi乗、b:integerNum×digitNum×exponent","イ":"a:2のi乗、b:integerNum＋digitNum×exponent","ウ":"a:2の（i－1）乗、b:integerNum×digitNum×exponent","エ":"a:2の（i－1）乗、b:integerNum＋digitNum×exponent"},"explanation":"2進数「100」を変換：末尾から1番目（i=1）：digitNum=0、exponent=2^(1-1)=1、integerNum=0+0×1=0。i=2：digitNum=0、exponent=2^1=2、integerNum=0+0×2=0。i=3：digitNum=1、exponent=2^2=4、integerNum=0+1×4=4。a=2の(i-1)乗、b=integerNum+digitNum×exponent（エ）。","has_choices":true},{"year":"令和6年度","num":"問86","answer":"ウ","question":"PDCAモデルに基づいてISMSを運用している組織において、C（Check）で実施することの例として、適切なものはどれか。","choices":{"ア":"業務内容の監査結果に基づいた是正処置として、サーバの監視方法を変更する。","イ":"具体的な対策と目標を決めるために、サーバ室内の情報資産を洗い出す。","ウ":"サーバ管理者の業務内容を第三者が客観的に評価する。","エ":"定められた運用手順に従ってサーバの動作を監視する。"},"explanation":"PDCA：P（計画）→D（実施）→C（評価・点検）→A（改善）。C（Check）はモニタリング・内部監査・パフォーマンス評価など実施結果の評価活動。ウの「第三者による客観的評価」がCheck（内部監査等）に該当。アはA（改善）、イはP（計画：洗い出し）、エはD（実施：運用監視）。","has_choices":true},{"year":"令和6年度","num":"問87","answer":"エ","question":"通常の検索エンジンでは検索されず匿名性が高いので、サイバー攻撃や違法商品の取引などにも利用されることがあり、アクセスするには特殊なソフトウェアが必要になることもあるインターネット上のコンテンツの総称を何と呼ぶか。","choices":{"ア":"RSS","イ":"SEO","ウ":"クロスサイトスクリプティング","エ":"ダークウェブ"},"explanation":"ダークウェブは、通常のブラウザ・検索エンジンではアクセスできず、Tor等の特殊ソフトウェアが必要なインターネット上の匿名性の高いコンテンツ群。RSS（配信フォーマット）、SEO（検索最適化）、クロスサイトスクリプティング（XSS攻撃）は全て別の概念。","has_choices":true},{"year":"令和6年度","num":"問88","answer":"ア","question":"JavaScriptに関する記述として、適切なものはどれか。","choices":{"ア":"Webブラウザ上に、動的な振る舞いなどを組み込むことができる。","イ":"Webブラウザではなく、WebサーバのみOSで動作する。","ウ":"実行するためには、あらかじめコンパイルする必要がある。","エ":"名前のとおり、Javaのスクリプト版である。"},"explanation":"JavaScriptはWebブラウザ上で動作するスクリプト言語で、動的なWebページ（インタラクティブな操作・アニメーション等）を実現する。イはサーバサイドのみというのは誤り（クライアントサイドで動作）。ウはインタープリタ実行でコンパイル不要。エはJavaとは無関係（名称が似ているが別言語）。","has_choices":true},{"year":"令和6年度","num":"問89","answer":"ウ","question":"システムの利用者認証に関する記述のうち、適切なものはどれか。","choices":{"ア":"1回の認証で、複数のサーバやアプリケーションなどへのログインを実現する仕組みを、チャレンジレスポンス認証という。","イ":"指紋や声紋など、身体的な特徴を利用して本人認証を行う仕組みを、シングルサインオンという。","ウ":"情報システムが利用者の本人確認のために用いる、数字列から成る暗証番号のことを、PINという。","エ":"特定の数字や文字の並びではなく、位置についての情報を覚えておき、認証時には画面に表示された表の中で、自分が覚えている位置に並んでいる数字や文字をパスワードとして入力する方式を、多要素認証という。"},"explanation":"PIN（Personal Identification Number）は数字列から成る個人識別番号（暗証番号）でシステムの本人確認に使用。アはシングルサインオン（SSO）の説明、イはバイオメトリクス認証の説明、エはポジションベース認証（マトリクス認証）の説明。","has_choices":true},{"year":"令和6年度","num":"問90","answer":"ア","question":"セキュリティ対策として使用されるWAFの説明として、適切なものはどれか。","choices":{"ア":"ECなどのWebサイトにおいて、Webアプリケーションソフトウェアの脆弱性を突いた攻撃からの防御や、不審なアクセスのパターンを検知する仕組み","イ":"インターネットなどの公共のネットワークを用いて、専用線のようなセキュアな通信環境を実現する仕組み","ウ":"情報システムにおいて、機密データを特定して監視することによって、機密データの紛失や外部への漏えいを防止する仕組み","エ":"ファイアウォールを用いて、インターネットと企業の内部ネットワークとの間に緩衝領域を作る仕組み"},"explanation":"WAF（Web Application Firewall）は、WebアプリケーションへのSQLインジェクション・XSS等の攻撃を検知・防御し、不審なアクセスパターンをフィルタリングするセキュリティ製品。イはVPN、ウはDLP（Data Loss Prevention）、エはDMZ（非武装地帯）の説明。","has_choices":true},{"year":"令和6年度","num":"問91","answer":"エ","question":"職場で不要になったPCを廃棄する場合の情報漏えい対策として、最も適切なものはどれか。","choices":{"ア":"OSが用意しているファイル削除の機能を使って、PC内のデータファイルを全て削除する。","イ":"PCにインストールされているアプリケーションを、全てアンインストールする。","ウ":"PCに内蔵されている全ての記憶装置を論理フォーマットする。","エ":"専用ソフトなどを使って、PCに内蔵されている全ての記憶装置の内容を消去するために、ランダムなデータを規定回数だけ上書きする。"},"explanation":"PC廃棄時の情報漏えい対策として最適なのは、専用ソフトによるランダムデータの上書き（データ完全消去）。通常のファイル削除（ア）や論理フォーマット（ウ）はデータが復元可能。アプリのアンインストール（イ）はデータ削除にならない。","has_choices":true},{"year":"令和6年度","num":"問92","answer":"ウ","question":"インターネットに接続されているサーバが、1台でメール送受信機能とWebアクセス機能の両方を提供しているとき、端末のアプリケーションプログラムがそのどちらの機能を利用するかをサーバに指定するために用いるものはどれか。","choices":{"ア":"IPアドレス","イ":"ドメイン","ウ":"ポート番号","エ":"ホスト名"},"explanation":"ポート番号は、同一サーバ上の複数のサービス（HTTP:80、HTTPS:443、SMTP:25、POP3:110等）を識別するために使用される番号。IPアドレス・ドメイン・ホスト名はサーバ自体の識別に使用される。","has_choices":true},{"year":"令和6年度","num":"問93","answer":"イ","question":"関係データベースで管理している「従業員」表から、氏名が'%葉_'に該当する従業員を抽出した。抽出された従業員は何名か。ここで、「_」は任意の1文字を表し、「%」は0文字以上の任意の文字列を表すものとする。（従業員：千葉翔、葉山花子、鈴木葉子、佐藤乙葉、秋葉彩葉、稲葉小春）","choices":{"ア":"1","イ":"2","ウ":"3","エ":"4"},"explanation":"'%葉_'のパターン：「葉」で終わる前の任意文字列＋「葉」＋任意1文字。該当するのは「秋葉彩葉」（葉＋彩＋葉で末尾パターン一致）と「稲葉小春」（葉＋小＋春→最後の葉の後に1文字）。実際には'%葉_'は「葉」の後にちょうど1文字あるパターン：秋葉彩葉（葉→彩葉→×）…再確認：%葉_は末尾から2文字目が「葉」のパターン。該当：佐藤乙葉（乙葉→×、最後の文字は葉で_=葉の次文字がない）。正確には：葉山花子（葉_で山が葉の後1文字→%=''、葉、_=山…だが「花子」が余る）。答え2名：鈴木葉子（%=鈴木、葉、_=子）と稲葉小春（%=稲、葉、_=小→春が余る→×）。鈴木葉子と秋葉彩葉（%=秋、葉、_=彩→葉が余る→×）。正解は鈴木葉子と佐藤乙葉→2名（イ）。","has_choices":true},{"year":"令和6年度","num":"問94","answer":"ア","question":"企業において情報セキュリティポリシー策定で行う作業のうち、次の作業の実施順序として、適切なものはどれか。 a 策定する責任者や担当者を決定する。 b 情報セキュリティ対策の基本方針を策定する。 c 保有する情報資産を洗い出し、分類する。 d リスクを分析する。","choices":{"ア":"a → b → c → d","イ":"a → b → d → c","ウ":"b → a → c → d","エ":"b → a → d → c"},"explanation":"情報セキュリティポリシー策定の順序：a（責任者・担当者決定）→b（基本方針策定）→c（情報資産の洗い出し・分類）→d（リスク分析）。まず体制を決め（a）、方針を定め（b）、対象資産を把握し（c）、リスクを評価する（d）という論理的な流れ。","has_choices":true},{"year":"令和6年度","num":"問95","answer":"イ","question":"AIの関連技術であるディープラーニングに用いられる技術として、最も適切なものはどれか。","choices":{"ア":"ソーシャルネットワーク","イ":"ニューラルネットワーク","ウ":"フィージビリティスタディ","エ":"フォールトトレラント"},"explanation":"ディープラーニング（深層学習）は、人間の脳神経回路を模したニューラルネットワークを多層化（深層化）して学習する技術。ソーシャルネットワークは人間関係のネットワーク、フィージビリティスタディは実現可能性調査、フォールトトレラントは障害許容設計。","has_choices":true},{"year":"令和6年度","num":"問96","answer":"ウ","question":"AさんはTo:BさんのメールアドレスCc:CさんのメールアドレスBcc:DさんのメールアドレスEさんのメールアドレスで電子メールを送信した。この電子メールの受信者に関する記述のうち、適切なものだけを全て挙げたものはどれか。 （1）CさんはDさんのメールアドレスを知ることができる。 （2）DさんはCさんのメールアドレスを知ることができる。 （3）EさんはDさんのメールアドレスを知ることができる。 ア（1） イ（1），（3） ウ（2） エ（2），（3）","choices":{"ア":"（1）のみ","イ":"（1），（3）のみ","ウ":"（2）のみ","エ":"（2），（3）のみ"},"explanation":"Bcc受信者（D・E）は他のBcc受信者のアドレスを知れない。To・CC（B・C）にはBccのアドレスが表示されない。DはCC欄のCのアドレスは見える（2が正しい）。CはBcc欄が非表示なのでDを知れない（1は誤り）。EもDのBccは非表示（3は誤り）。正解は（2）のみ→「ウ」。","has_choices":true},{"year":"令和6年度","num":"問97","answer":"イ","question":"次のOSのうち、OSS（Open Source Software）として提供されるものだけを全て挙げたものはどれか。 a Android b FreeBSD c iOS d Linux","choices":{"ア":"a, b","イ":"a, b, d","ウ":"b, d","エ":"c, d"},"explanation":"OSSとして提供されるOS：a（Android：Googleオープンソース）、b（FreeBSD：BSDライセンス）、d（Linux：GPLライセンス）。c（iOS：Appleの独自OS、非OSSで商用ライセンス）は含まれない。","has_choices":true},{"year":"令和6年度","num":"問98","answer":"イ","question":"ランサムウェアに関する記述として、最も適切なものはどれか。","choices":{"ア":"PCに外部から不正にログインするための侵入路をひそかに設置する。","イ":"PCのファイルを勝手に暗号化し、復号のためのキーを提供することなどを条件に金銭を要求する。","ウ":"Webブラウザを乗っ取り、オンラインバンキングなどの通信に割り込んで不正送金などを行う。","エ":"自らネットワークを経由して感染を広げる機能をもち、まん延していく。"},"explanation":"ランサムウェア（Ransomware：身代金ウイルス）は、感染したPCのファイルを暗号化して使用不能にし、復号（身代金）と引き換えに金銭を要求するマルウェア。アはバックドア（侵入経路設置）、ウはMITB（Man-in-the-Browser）攻撃、エはワーム（自己増殖型マルウェア）の説明。","has_choices":true},{"year":"令和6年度","num":"問99","answer":"ウ","question":"GPSの電波を捕捉しにくいビルの谷間や狭い路地などでも位置を計測することができるように、特定の地域の上空に比較的長く留まる軌道をとり、GPSと併用することによって、より高い測位精度を実現するものはどれか。","choices":{"ア":"アシストGPS","イ":"ジャイロセンサー","ウ":"準天頂衛星","エ":"プローブカー"},"explanation":"準天頂衛星（みちびき等）は、日本の上空に長時間留まる特殊な軌道（準天頂軌道）をとる測位衛星で、GPSが届きにくいビル谷間でも高精度な測位を補完する。アシストGPSは通信網を使ったGPS補助技術、ジャイロセンサーは角速度（回転）検出センサー、プローブカーは走行データ収集車両。","has_choices":true},{"year":"令和6年度","num":"問100","answer":"イ","question":"正しいURLを指定してインターネット上のWebサイトへアクセスしようとした利用者が、偽装されたWebサイトに接続されてしまうようになった。原因を調べたところ、ドメイン名とIPアドレスの対応付けを管理するサーバに脆弱性があり、攻撃者によって、ドメイン名とIPアドレスを対応付ける情報が書き換えられていた。このサーバが受けた攻撃はどれか。","choices":{"ア":"DDoS攻撃","イ":"DNSキャッシュポイズニング","ウ":"ソーシャルエンジニアリング","エ":"ドライブバイダウンロード"},"explanation":"DNSキャッシュポイズニングは、DNSサーバのキャッシュに偽の対応情報（ドメイン→偽IPアドレス）を書き込む攻撃で、正規URLでアクセスした利用者を偽サイトに誘導する。DDoS攻撃はサービス不能攻撃、ソーシャルエンジニアリングは人的手法による詐欺、ドライブバイダウンロードはWebサイト閲覧によるマルウェア感染。","has_choices":true},{"year":"令和7年度","num":"問1","answer":"ウ","question":"A社がB社に作業の一部を請負契約で委託している。作業形態a〜cのうち、いわゆる偽装請負とみなされる状態だけを全て挙げたものはどれか。\na B社の従業員が、A社内において、A社の責任者の指揮命令の下で、請負契約で取り決めた作業を行っている。\nb B社の従業員が、A社内において、B社の責任者の指揮命令の下で、請負契約で取り決めた作業を行っている。\nc B社の従業員が、B社内において、A社の責任者の指揮命令の下で、請負契約で取り決めた作業を行っている。","choices":{"ア":"a","イ":"a, b","ウ":"a, c","エ":"b, c"},"explanation":"偽装請負とは、請負契約なのに発注者が受注者の従業員に直接指揮命令を行う状態。aはA社内でA社の責任者が指揮→偽装請負。bはA社内でB社の責任者が指揮→正常な請負。cはB社内でA社の責任者が指揮→偽装請負。よってa, cが該当し「ウ」。","has_choices":true},{"year":"令和7年度","num":"問2","answer":"ウ","question":"従来の情報セキュリティマネジメントシステム規格を基礎に追加で制定されたもので、クラウドサービスに対応した情報セキュリティ管理体制を構築するためのガイドライン規格として、最も適切なものはどれか。","choices":{"ア":"ISO 14001","イ":"JIS Q 15001","ウ":"ISO/IEC 27017","エ":"ISO 9001"},"explanation":"ISO/IEC 27017はクラウドサービスに特化した情報セキュリティ管理のガイドライン規格で、ISO 27001（ISMS）を基礎に追加制定された。ISO 14001は環境、JIS Q 15001は個人情報、ISO 9001は品質管理の規格。","has_choices":true},{"year":"令和7年度","num":"問3","answer":"イ","question":"政府は、官民データ活用推進基本法に定められた『官民データ活用推進基本計画』を策定し、官民データの公開や活用の促進に取り組んでいる。次の組織体のうち、官民データを所有しているものだけを全て挙げたものはどれか。a 県庁 b 大学 c 電力事業者 d 独立行政法人","choices":{"ア":"a, b, c","イ":"a, b, c, d","ウ":"a, b, d","エ":"a, c, d"},"explanation":"官民データ活用推進基本法における官民データは、国・地方公共団体・独立行政法人・民間事業者が保有するデータ全般が対象。県庁（地方公共団体）、大学（法人）、電力事業者（民間事業者）、独立行政法人はいずれも該当。よってa, b, c, d全て「イ」。","has_choices":true},{"year":"令和7年度","num":"問4","answer":"エ","question":"投資の優先度などの経営の戦略を策定するために、経済価値、希少性、模倣困難性及び組織の四つの要素で評価することによって、自社のもつ資源を分析する手法として、最も適切なものはどれか。","choices":{"ア":"4P分析","イ":"PPM","ウ":"SWOT分析","エ":"VRIO分析"},"explanation":"VRIO分析は、Value（経済価値）・Rarity（希少性）・Inimitability（模倣困難性）・Organization（組織）の4要素で自社資源を評価する手法。4Pはマーケティングミックス、PPMは事業ポートフォリオ管理、SWOT分析は内外環境分析。","has_choices":true},{"year":"令和7年度","num":"問5","answer":"ウ","question":"A社ではB商品の仕入れと販売を行っている。ある期のB商品の仕入単価は期首から上昇し続け、期末が最も高くなった。当該期の売上原価を『期首棚卸高＋当期商品仕入高－期末棚卸高』で計算するとき、期末棚卸高の計算に期末の仕入単価を用いると、B商品の期末棚卸高及び売上原価は、期中の仕入単価の平均値を用いる場合に比べてどのようになるか。","choices":{"ア":"期末棚卸高は上がり、売上原価も上がる。","イ":"期末棚卸高は下がり、売上原価も下がる。","ウ":"期末棚卸高は上がり、売上原価は下がる。","エ":"期末棚卸高は下がり、売上原価は上がる。"},"explanation":"仕入単価が上昇し続け期末が最高値の場合、期末単価（最高）で計算した期末棚卸高は平均値より高くなる。売上原価＝期首棚卸高＋当期仕入高－期末棚卸高なので、期末棚卸高が上がると売上原価は下がる。よって「ウ 期末棚卸高は上がり、売上原価は下がる」。","has_choices":true},{"year":"令和7年度","num":"問6","answer":"イ","question":"特定電子メール法は、電子メールによる一方的な広告宣伝メールの送信を規制する法律である。企業担当者が行った次の電子メールの送信事例のうち、特定電子メール法の規制対象となり得るものはどれか。","choices":{"ア":"受信拒否の意思表示がないことを確認し、公表されている企業アドレス宛てに広告宣伝メールを送信した。","イ":"受信者から拒否通知があった場合はそれ以降を禁止すればよいと考え、広告宣伝メールを送信した。","ウ":"内容は事務連絡と料金請求なので問題ないと考え、受信者本人の同意なくメールを送信した。","エ":"長年の取引関係にある企業担当者に、これまで納入してきた製品の新バージョンの広告宣伝メールを送信した。"},"explanation":"特定電子メール法は受信者の事前同意なしに広告宣伝メールを送ることを規制する。イの「拒否通知があった後もまだ送信を続ける」行為が規制対象。アは受信拒否の意思表示がないことを確認した上での送信（オプトアウト方式で一定の条件を満たす）、ウは事務連絡・料金請求は規制外、エは長年の取引関係者への案内は同意が推定される。","has_choices":true},{"year":"令和7年度","num":"問7","answer":"イ","question":"新しい概念やアイデアの実証を目的とした、開発の前段階における検証を表す用語はどれか。","choices":{"ア":"CRM","イ":"PoC","ウ":"RAS","エ":"SLA"},"explanation":"PoC（Proof of Concept：概念実証）は、新しい概念やアイデアが実現可能かどうかを開発前段階で検証すること。CRMは顧客関係管理、RASはリモートアクセスサービス、SLAはサービスレベル合意書。","has_choices":true},{"year":"令和7年度","num":"問8","answer":"イ","question":"AIの機械学習で利用するデータの取扱いに関する記述のうち、バイアスの低減やデータの品質を確保するために考えられる対策として、適切なものだけを全て挙げたものはどれか。a 学習の目的に適したデータであることを確認する。b データの入手元・作成来歴を確認する。c データへのアノテーションの付与は学習目的に合わせて実施する。d 人間の目でも同定が困難と考えられる画像認識用のデータは除外する。","choices":{"ア":"a, b","イ":"a, b, c, d","ウ":"a, d","エ":"b, c, d"},"explanation":"a（目的に適したデータか確認）、b（入手元・作成来歴確認）、c（アノテーションを学習目的に合わせる）はいずれもバイアス低減・品質確保に有効な対策。dは困難なデータも含めることがモデルの汎化性能向上につながるため不適切。よってa, b, cの「イ」。","has_choices":true},{"year":"令和7年度","num":"問9","answer":"ウ","question":"ハッカソンに関する記述として、最も適切なものはどれか。","choices":{"ア":"参加者がディベート形式で意見を戦わせるイベント","イ":"参加者がセキュリティに関する講義を受けるイベント","ウ":"参加チームが与えられたテーマのプロトタイプを短期間で作成し競うイベント","エ":"参加者がゲームで競い合いポイントを獲得するイベント"},"explanation":"ハッカソンとは、プログラマーやデザイナーなど複数の参加チームが、与えられたテーマのプロトタイプを短期間で作成し、成果を発表して競い合うイベント。アはディベート、イはセキュリティキャンプ、エはゲーミフィケーションの説明。","has_choices":true},{"year":"令和7年度","num":"問10","answer":"エ","question":"生成AIにおいて、もっともらしいが事実とは異なる内容が出力されることを表す用語として、最も適切なものはどれか。","choices":{"ア":"エコーチェンバー","イ":"シンギュラリティ","ウ":"ディープフェイク","エ":"ハルシネーション"},"explanation":"ハルシネーション（幻覚）とは、生成AIがもっともらしいが事実と異なる内容を出力する現象。エコーチェンバーは同意見が増幅される現象、シンギュラリティはAIが人知を超える転換点、ディープフェイクはAI生成の偽映像・音声。","has_choices":true},{"year":"令和7年度","num":"問11","answer":"エ","question":"スマートファクトリーにおいても使用されている、FMS（Flexible Manufacturing System）に関する記述として、最も適切なものはどれか。","choices":{"ア":"MOTのこと","イ":"SCMのこと","ウ":"JITのこと","エ":"複数の工作機械や産業用ロボットなどを有機的に結合し生産プロセス全体を統括的に制御・管理するシステム"},"explanation":"FMS（フレキシブル製造システム）とは、複数の工作機械や産業用ロボットなどを有機的に結合し、生産プロセス全体を統括的に制御・管理するシステム。アはMOT（技術経営）、イはSCM（サプライチェーン管理）、ウはJIT（ジャストインタイム）の説明。","has_choices":true},{"year":"令和7年度","num":"問12","answer":"エ","question":"商標法におけるサービスマークを説明したものはどれか。","choices":{"ア":"コーポレートブランドの商標","イ":"製品に付す商標","ウ":"プライベートブランドの商標","エ":"輸送業者・金融業者などがサービスを他社と区別するために表示する商標"},"explanation":"サービスマークとは、輸送業者・金融業者などがサービス（役務）を他社と区別するために表示する商標。アはコーポレートブランド、イは商品商標（製造業者・販売業者）、ウはプライベートブランド商標の説明。","has_choices":true},{"year":"令和7年度","num":"問13","answer":"ウ","question":"新しいITソリューションの活用の是非を判断するために、そのITソリューションの提供者に、活用事例や技術情報などの提供を依頼する文書として、最も適切なものはどれか。","choices":{"ア":"EDI","イ":"KPI","ウ":"RFI","エ":"RFP"},"explanation":"RFI（Request For Information：情報提供依頼書）は、ITソリューション導入検討時に提供者へ活用事例・技術情報の提供を依頼する文書。EDIは電子データ交換、KPIは重要業績評価指標、RFPは提案依頼書（具体的な提案を求める文書）。","has_choices":true},{"year":"令和7年度","num":"問14","answer":"イ","question":"事業、経営情報に知財情報を組み込んで分析し、現状の俯瞰や将来展望などの分析結果を事業責任者、経営者と共有し、事業戦略又は経営戦略に反映させることを表す用語として、最も適切なものはどれか。","choices":{"ア":"CVC","イ":"IPランドスケープ","ウ":"MOT","エ":"SWOT分析"},"explanation":"IPランドスケープ（Intellectual Property Landscape）とは、事業・経営情報に知財情報を組み込んで分析し、現状俯瞰や将来展望を経営者と共有して事業戦略・経営戦略に反映させる活動。CVCは企業主導型VC、MOTは技術経営、SWOT分析は環境分析フレームワーク。","has_choices":true},{"year":"令和7年度","num":"問15","answer":"ア","question":"事業運営における意思決定の迅速化、組織の独立採算の推進を目的とし、一つの企業の中に事業領域ごとに独立した組織を設置する組織形態はどれか。","choices":{"ア":"カンパニー制組織","イ":"機能別組織","ウ":"プロジェクト組織","エ":"マトリックス組織"},"explanation":"カンパニー制組織とは、一企業内に事業領域ごとに独立したカンパニーを設置し、意思決定の迅速化と独立採算を実現する組織形態。機能別組織は機能（営業・製造等）で分割、プロジェクト組織は一時的チーム、マトリックス組織は機能と事業の二重管理。","has_choices":true},{"year":"令和7年度","num":"問16","answer":"イ","question":"他人の電子メールの利用者IDとパスワードの取扱いに関する記述のうち、不正アクセス禁止法で規制されている行為だけを全て挙げたものはどれか。a 正当な理由なく本人に無断で第三者に提供する。b 他人の電子メールの利用者IDとパスワードを無効にするマルウェアを作成する。c 本人に無断で使用して、メールサーバ上の電子メールを閲覧する。","choices":{"ア":"a, b, c","イ":"a, c","ウ":"b, c","エ":"c"},"explanation":"不正アクセス禁止法の規制対象：a（IDとパスワードを不正に第三者提供）とc（本人に無断でログインし閲覧）。bのマルウェア作成は不正競争防止法等の対象。よってa, cの「イ」。","has_choices":true},{"year":"令和7年度","num":"問17","answer":"ア","question":"プロセスマイニングに関する記述として、最も適切なものはどれか。","choices":{"ア":"業務ログを分析して現行業務プロセスを可視化・改善する手法","イ":"業務プロセスを分解・再構築するBPRの手法","ウ":"テキストデータを分析して知識を抽出する手法","エ":"仮想通貨採掘の手法"},"explanation":"プロセスマイニングとは、業務で実際に稼働したシステムの操作ログなどを収集し、現行業務プロセスの可視化・分析・モニタリングによって業務課題を特定して改善を図る手法・ツール。イはBPR（業務プロセス再構築）、ウはテキストマイニング、エはマイニング（暗号資産採掘）の説明。","has_choices":true},{"year":"令和7年度","num":"問18","answer":"ア","question":"ITにおけるアクセシビリティに関する記述として、最も適切なものはどれか。","choices":{"ア":"高齢者や障害者などを含む幅広い利用者が等しく利用できるよう配慮した設計","イ":"顧客との関係を管理するためのシステム","ウ":"利用者体験全体を向上させる設計","エ":"システムへのアクセス権限の管理"},"explanation":"アクセシビリティとは、高齢者や障害者などを含む様々な能力・特性を持つ幅広い層の人が等しく利用できるよう配慮したソフトウェア製品の設計。イはCRM（顧客関係管理）、ウはUX（ユーザー体験）、エはアクセス権限管理の説明。","has_choices":true},{"year":"令和7年度","num":"問19","answer":"ア","question":"仮想環境を用いた技術であるAR又はVRの活用事例のうち、VRの活用事例として、最も適切なものはどれか。","choices":{"ア":"ゴーグルを装着して仮想空間の火災・地震映像を見て避難訓練を行う。","イ":"スマートフォンを向けると史跡に昔あった建物の画像が重なって表示される。","ウ":"スマートフォンのカメラで商品を撮影すると商品情報が重なって表示される。","エ":"スマートグラスで作業手順が現実の映像に重なって表示される。"},"explanation":"VR（Virtual Reality）は完全な仮想空間に没入する技術。アのゴーグルを装着して仮想空間の火災・地震映像を見て避難訓練を行うのがVRの活用例。イ・ウ・エは現実映像に情報を重ねるAR（拡張現実）の活用事例。","has_choices":true},{"year":"令和7年度","num":"問20","answer":"イ","question":"ソフトウェアライフサイクルを企画プロセス、要件定義プロセス、開発プロセス、保守プロセスに分けたとき、企画プロセスのシステム化構想の立案時にベンダー企業から収集する情報として、最も適切なものはどれか。","choices":{"ア":"新システムの開発コスト見積もり","イ":"システム化する業務の分野に関する情報技術動向","ウ":"システム化計画における発注元の役割","エ":"ベンダー社員の技術資格情報"},"explanation":"企画プロセスの立案段階でベンダーから収集すべきは「システム化する業務の分野に関する情報技術動向」（市場のIT動向・最新技術情報）。アの開発コスト見積もりは要件定義後、ウの発注元の役割・エのベンダー技術資格は自社情報。","has_choices":true},{"year":"令和7年度","num":"問21","answer":"イ","question":"基本的な機能やサービスは無償で提供し、追加の機能やサービスを有償で提供することで利益を上げるビジネスモデルを表す用語として、最も適切なものはどれか。","choices":{"ア":"フリーウェア","イ":"フリーミアム","ウ":"フリーライド","エ":"フリーランス"},"explanation":"フリーミアムとは、基本機能を無償提供し追加機能を有償提供して収益を得るビジネスモデル（free + premium の造語）。フリーウェアは無償ソフト全般、フリーライドはただ乗り問題、フリーランスは独立自営。","has_choices":true},{"year":"令和7年度","num":"問22","answer":"ウ","question":"営業部のAさんは、営業担当者10人の営業成績が一目で分かるように、各営業担当者が提出する営業見込みと実績を毎月集約してグラフ化したいと考えている。この問題を解決するために適用する技術やツールとして、最も適切なものはどれか。","choices":{"ア":"AIによる高度な予測分析ツール","イ":"IoTセンサーでデータを自動収集するシステム","ウ":"入力したデータを加工してグラフ化できるオフィスツール","エ":"大量データを統計的に分析するデータサイエンスツール"},"explanation":"10人分のデータを集約してグラフ化するには、「入力したデータを加工して見せるオフィスツール（表計算ソフト等）」が最適。AIはより高度な予測・分析向き、IoTはセンサーデータ自動収集向き、データサイエンスは大量データの統計的分析向き。","has_choices":true},{"year":"令和7年度","num":"問23","answer":"ウ","question":"コーポレートガバナンスの強化に有効な施策だけを全て挙げたものはどれか。a 株式公開買付けによる企業の買収 b 執行役員制度の導入による経営と執行の分離 c 独立性の高い社外取締役の選任","choices":{"ア":"a, bのみ","イ":"a, cのみ","ウ":"b, cのみ","エ":"a, b, cのみ"},"explanation":"コーポレートガバナンス強化に有効なのはb（経営と執行の分離）とc（独立性の高い社外取締役の選任）。aの株式公開買付けによる企業買収はM&A戦略であり、ガバナンス強化とは直接関係しない。よってb,cの「ウ」。","has_choices":true},{"year":"令和7年度","num":"問24","answer":"エ","question":"RPAに関する記述として、最も適切なものはどれか。","choices":{"ア":"企業の一部の業務を外部の組織に委託することによって、自社のリソースを重要な領域に集中したり、コストの最適化や業務の高効率化などを実現したりする。","イ":"組立てや搬送などにハードウェアのロボットを用いることによって、工場の生産活動の自動化を実現する。","ウ":"システムの利用者が、主体的にシステム管理や運用を行うことによって、利用者のITリテラシーの向上や、システムベンダーへの依存の軽減などを実現する。","エ":"ホワイトカラーの定型的な事務作業を、ソフトウェアのロボットに代替させることによって、自動化や効率化を図る。"},"explanation":"RPA（Robotic Process Automation）とは、ホワイトカラーの定型的な事務作業をソフトウェアのロボットに代替させて自動化・効率化を図る技術。アはBPO（業務プロセス外部委託）、イはFA（工場自動化）、ウはエンドユーザーコンピューティングの説明。","has_choices":true},{"year":"令和7年度","num":"問25","answer":"ア","question":"ブロックチェーンを適用した事例として、最も適切なものはどれか。","choices":{"ア":"証券会社がデジタル社債を発行して取引の改ざん・不整合防止を図る。","イ":"DBの応答速度改善のために専用システムを導入する。","ウ":"業務システムをリプレースして新機能を追加する。","エ":"データベースを活用して顧客情報を一元管理する。"},"explanation":"ブロックチェーンは分散型台帳技術で取引の改ざん・不整合を防止する特性を持つ。アの「証券会社がデジタル社債を発行して取引の改ざん・不整合防止を図る」がブロックチェーンの典型的な適用事例。イは応答速度改善（DB高速化）、ウはシステム改修、エはデータベース活用の話。","has_choices":true},{"year":"令和7年度","num":"問26","answer":"ウ","question":"4月1日から5月31日までに、取引①から取引⑤があった。各取引の受注、売上計上、現金回収の状況が表のとおりであるとき、この取引先に対する5月31日時点の売掛金は何万円か。","choices":{"ア":"1,000","イ":"1,400","ウ":"2,300","エ":"2,700"},"explanation":"売掛金は「売上計上済みかつ現金未回収」のもの。取引③（5/10売上1,300万・6/30回収予定）と取引④（5/15売上1,000万・回収未定）が該当。取引⑤は受注のみで売上未計上のため対象外。1,300＋1,000＝2,300万円→「ウ」。","has_choices":true},{"year":"令和7年度","num":"問27","answer":"イ","question":"業務と情報システムを最適にすることを目的として、業務と情報システムの現状の把握と目標とする理想像の設定から現状と理想との乖離を明確にし、目標に向けた改善活動を移行計画として定義したい。このときに用いられる手法として、最も適切なものはどれか。","choices":{"ア":"BI（ビジネスインテリジェンス）","イ":"EA（エンタープライズアーキテクチャ）","ウ":"MOT（技術経営）","エ":"SOA（サービス指向アーキテクチャ）"},"explanation":"EA（Enterprise Architecture：エンタープライズアーキテクチャ）は、業務と情報システムの現状把握・理想像設定・乖離の明確化・改善活動の移行計画定義を体系的に行う手法。BIはビジネスインテリジェンス、MOTは技術経営、SOAはサービス指向アーキテクチャ。","has_choices":true},{"year":"令和7年度","num":"問28","answer":"エ","question":"生成AIに関する記述として、最も適切なものはどれか。","choices":{"ア":"生成AIは学習データなしに文章を生成できる。","イ":"生成AIは既存データから将来を予測するAI。","ウ":"生成AIはシナリオ基盤で定型業務を自動化する。","エ":"生成AIは自然言語の指示に従い事前学習データを基に新しいコンテンツを生成するAI。"},"explanation":"生成AIとは、自然言語で指示された内容に従って、事前に学習したデータを基に新しいコンテンツ（文章・画像・音楽等）を生成するAI。アは「学習不要」が誤り（学習が前提）、イは予測AI、ウはRPA（シナリオ基盤の自動化）の説明。","has_choices":true},{"year":"令和7年度","num":"問29","answer":"イ","question":"企業経営の中核となる考え方を、ミッション、ビジョン、バリューの三つに分けて示す場合、ビジョンとして示すものとして、最も適切なものはどれか。","choices":{"ア":"企業の中長期的な数値目標","イ":"ある時点での企業のありたい姿（将来像）","ウ":"業績評価のための数値指標（KPI）","エ":"目標達成のための重要成功要因（CSF）"},"explanation":"ビジョンとは「企業の存在意義や使命をふまえた、ある時点でのありたい姿（将来像）」。ミッションは企業の存在意義・使命そのもの、バリューは価値観・行動指針。ウはKPI（業績管理指標）、エはCSF（重要成功要因）の説明。","has_choices":true},{"year":"令和7年度","num":"問30","answer":"エ","question":"著作権に関して、次の記述中のa、bに入れる字句の適切な組合せはどれか。『[a]は著作権法による保護の対象になるが、[b]は対象にならない。』","choices":{"ア":"a:アルゴリズム、b:操作マニュアル","イ":"a:操作マニュアル、b:ソースプログラム","ウ":"a:操作マニュアル、b:通信プロトコル","エ":"a:ソースプログラム、b:通信プロトコル"},"explanation":"ソースプログラムは著作権法上「プログラムの著作物」として保護対象。通信プロトコルは技術的な規格・仕様であり思想・アイデアの段階として保護対象外。アルゴリズムも思想として保護対象外。操作マニュアルは著作物として保護される。よって「エ a=ソースプログラム、b=通信プロトコル」。","has_choices":true},{"year":"令和7年度","num":"問31","answer":"イ","question":"ERPシステムの説明として、適切なものはどれか。","choices":{"ア":"顧客情報・商談履歴を蓄積・共有する営業支援システム（SFA）","イ":"経理・人事・生産・販売などの基幹業務を一元管理するシステム","ウ":"原材料の調達から製品納品までのサプライチェーン全体を管理するシステム","エ":"顧客との関係を管理するCRMシステム"},"explanation":"ERP（Enterprise Resource Planning：企業資源計画）とは、経理・人事・生産・販売などの基幹業務と関連情報を一元管理し、経営資源を最適配分することで効率的な経営実現を支援するシステム。アはSFA（営業支援）、ウはSCM（サプライチェーン管理）、エはCRM（顧客管理）の説明。","has_choices":true},{"year":"令和7年度","num":"問32","answer":"ウ","question":"公共交通機関での移動履歴、WebサイトでのWeb商品検索履歴、SNSやブログで発信したデータなど、個人の活動を記録する技術、又は記録そのものを表す用語として、最も適切なものはどれか。","choices":{"ア":"アクティビティ","イ":"トランザクション","ウ":"ライフログ","エ":"レコードキーピング"},"explanation":"ライフログとは、個人の日常活動（移動・購買・閲覧・発信等）を継続的に記録する技術または記録データの総称。アクティビティは活動・作業全般、トランザクションは業務上の取引処理、レコードキーピングは記録の保管・維持管理。","has_choices":true},{"year":"令和7年度","num":"問33","answer":"ア","question":"自動運転の水準は、一般的に『レベル1』から『レベル5』に分けられている。『条件付運転自動化』と呼ばれる『レベル3』が示す自動運転の水準に関する記述として、最も適切なものはどれか。","choices":{"ア":"システムが継続困難な場面では人間が運転に戻らなければならない。","イ":"全ての状況で人間の関与なしに完全自動運転が可能。","ウ":"システムが一部支援するが主体は人間。","エ":"特定条件下でのみシステムが自動運転可能で人間操作は不要。"},"explanation":"レベル3（条件付運転自動化）は、運転の主体はシステムだが、システムが継続困難な場面では人間が運転に戻らなければならないレベル。レベル4は特定条件下で完全自動（人間操作不要）、レベル2は部分自動化（主体は人間）、レベル1はシステムが一部支援（主体は人間）。","has_choices":true},{"year":"令和7年度","num":"問34","answer":"イ","question":"ある商品を5,000個販売したところ、売上げが6,000万円、利益が400万円となった。商品1個当たりの変動費が7,000円であるとき、利益を1,000万円以上にするためには、少なくともあと何個販売すればよいか。","choices":{"ア":"1,000","イ":"1,200","ウ":"1,500","エ":"2,000"},"explanation":"売上6,000万・利益400万→総費用5,600万。変動費=5,000×7,000=3,500万。固定費=5,600-3,500=2,100万。1個あたり売上=6,000万÷5,000=12,000円。1個あたり貢献利益=12,000-7,000=5,000円。利益1,000万→必要総販売数=(2,100+1,000)万÷5,000円=6,200個。追加販売数=6,200-5,000=1,200個→「イ」。","has_choices":true},{"year":"令和7年度","num":"問35","answer":"エ","question":"マーケティング戦略の策定プロセスのうち、自社製品の差別化ポイントを明確化するものはどれか。","choices":{"ア":"セグメンテーション","イ":"ターゲティング","ウ":"プロモーション","エ":"ポジショニング"},"explanation":"マーケティングのSTPプロセスにおいて、ポジショニングとは競合他社と比較した自社製品の差別化ポイントを明確にする工程。セグメンテーションは市場の細分化、ターゲティングは標的市場の選定、プロモーションはマーケティングミックス（4P）の一要素。","has_choices":true},{"year":"令和7年度","num":"問36","answer":"ア","question":"合意したサービス提供時間帯のうち、実際に顧客がITサービスを利用できた時間の割合で表されるものはどれか。","choices":{"ア":"可用性","イ":"機能性","ウ":"効率性","エ":"使用性"},"explanation":"可用性（Availability）とは、合意したサービス提供時間帯のうち実際に顧客が利用できた時間の割合。機能性は要求機能の充足度、効率性はリソース使用量に対する性能、使用性（ユーザビリティ）は使いやすさの品質特性。","has_choices":true},{"year":"令和7年度","num":"問37","answer":"エ","question":"ITサービスマネジメントに関して、次の記述中のa、bに入れる字句の適切な組合せはどれか。『[a]はサービス提供者と顧客との間で合意されたサービス品質に関する合意書である。[a]の遵守状況を確認し、ITサービスの品質を維持・改善させるための活動が[b]である。』","choices":{"ア":"a:NDA、b:SCM","イ":"a:NDA、b:SLM","ウ":"a:SLA、b:SCM","エ":"a:SLA、b:SLM"},"explanation":"SLA（Service Level Agreement）はサービス品質の合意書。SLM（Service Level Management）はSLAの遵守状況を確認してITサービスの品質を維持・改善する活動。NDAは秘密保持契約、SCMはサプライチェーン管理。よって「エ a=SLA、b=SLM」。","has_choices":true},{"year":"令和7年度","num":"問38","answer":"エ","question":"情報セキュリティ監査の説明として、最も適切なものはどれか。","choices":{"ア":"ITガバナンスの評価","イ":"サーバ室への不正侵入を防ぐセキュリティツール","ウ":"IT戦略・方針の策定活動","エ":"情報資産に関わるリスクマネジメントの有効性を検証・評価すること"},"explanation":"情報セキュリティ監査とは、組織の情報資産に関わるリスクマネジメントが効果的に実施されているかどうかの検証または評価を行うこと。アはITガバナンス監査、イはサーバ室等の物理的セキュリティ対策ツール、ウはIT戦略・方針の策定活動。","has_choices":true},{"year":"令和7年度","num":"問39","answer":"ア","question":"ソフトウェア開発モデルであるアジャイルモデルの特徴に関して、次の記述中のa、bに入れる字句の適切な組合せはどれか。『アジャイルモデルとは、要件を確定してから開発を実施するウォーターフォールモデルの[a]する形で提唱された、[b]できるようにソフトウェアを開発するための手法の総称である。』","choices":{"ア":"a:課題を改善、b:開発工程で生じる種々の変更に迅速に対応","イ":"a:課題を改善、b:品質を最優先して開発","ウ":"a:優れた点を取り込み、b:開発工程で生じる種々の変更に迅速に対応","エ":"a:優れた点を取り込み、b:品質を最優先して開発"},"explanation":"アジャイルモデルはウォーターフォールモデルの「課題を改善」する形で提唱された、「開発工程で生じる種々の変更に迅速に対応」できるようにソフトウェアを開発するための手法の総称。よって「ア a=課題を改善、b=開発工程で生じる種々の変更に迅速に対応」。","has_choices":true},{"year":"令和7年度","num":"問40","answer":"エ","question":"変更管理委員会が設置されているプロジェクトで変更要求が発生した場合の記述として、最も適切なものはどれか。","choices":{"ア":"変更管理委員会では、プロジェクトに関わるステークホルダ以外の第三者によって変更要求が審議される。","イ":"変更管理委員会は、コストの増加や期日の延期を理由に変更要求を却下してよい。","ウ":"変更管理委員会は、スコープに変更が発生しない範囲で変更要求を受け付けなければならない。","エ":"変更要求は、全てプロジェクトマネージャが承認した後に変更管理委員会で審議される。"},"explanation":"変更管理委員会（CCB）でのプロセスとして最も適切なのは、エ「変更要求は全てプロジェクトマネージャが承認した後に変更管理委員会で審議される」。アは第三者審議が誤り（ステークホルダが審議）、イはコスト・期日を理由に即却下は誤り（内容を審議して判断）、ウはスコープ変更のない範囲のみ受付は誤り。","has_choices":true},{"year":"令和7年度","num":"問41","answer":"エ","question":"システム開発プロジェクトで使用される技法のうち、スケジュール作成に用いる技法として、適切なものだけを全て挙げたものはどれか。a DFD（Data Flow Diagram）b 回帰分析 c クリティカルパス法 d プレシデンスダイアグラム法","choices":{"ア":"DFD, 回帰分析のみ","イ":"DFD, クリティカルパス法のみ","ウ":"回帰分析, プレシデンスダイアグラム法のみ","エ":"クリティカルパス法, プレシデンスダイアグラム法のみ"},"explanation":"スケジュール作成に用いる技法はc（クリティカルパス法：作業の最長経路で所要期間を算出）とd（プレシデンスダイアグラム法：作業の依存関係をネットワーク図で表現）。aのDFDはデータ流れの分析図、bの回帰分析は統計的な予測手法。よって「エ c, d」。","has_choices":true},{"year":"令和7年度","num":"問42","answer":"ア","question":"床下にネットワーク配線などのために一定の高さの空間をとり、容易に取り外しが可能なパネルを床板として並べたものはどれか。","choices":{"ア":"フリーアクセスフロア","イ":"フリーアドレス","ウ":"フリースペース","エ":"フリースポット"},"explanation":"フリーアクセスフロア（二重床）とは、床下の空間にLANケーブルや電気配線を収納でき、パネルを取り外して自由に配線変更できる床構造。フリーアドレスは固定席なしの座席運用、フリースペースは共用区画、フリースポットは公衆無線LANのアクセスポイント。","has_choices":true},{"year":"令和7年度","num":"問43","answer":"ア","question":"営業部門の営業員が出張する際の出張旅費の手続に関して、組織間でけん制を日常的に実施している状況の記述として、最も適切なものはどれか。","choices":{"ア":"営業担当者が提出した経費申請を経理担当者が審査し経理課長が承認する。","イ":"出張旅費の申請は所属長だけが承認する。","ウ":"旅費規程に基づき担当者が申請すれば自動承認される。","エ":"内部監査人が抜き取り検査で不正を検出する。"},"explanation":"内部統制のけん制（相互牽制）とは、異なる組織・担当者が互いにチェックし合う仕組み。アの「経理担当者が審査→経理課長が承認」は営業部門と経理部門の間でけん制が働いている。イは上長承認のみで部門間けん制なし、ウは事前承認のみ、エは事後の監査人サンプリング。","has_choices":true},{"year":"令和7年度","num":"問44","answer":"エ","question":"システム開発の早い段階で、目に見える形で利用者の要求が確認できるように確認用のソフトウェアを作成するソフトウェア開発モデルとして、最も適切なものはどれか。","choices":{"ア":"アジャイル","イ":"ウォーターフォール","ウ":"スパイラル","エ":"プロトタイピング"},"explanation":"プロトタイピングモデルとは、開発初期段階で確認用ソフトウェア（プロトタイプ）を作成してユーザーの要求を早期に可視化・確認する開発手法。アジャイルは反復開発、ウォーターフォールは順次工程型開発、スパイラルはリスク分析を繰り返す開発。","has_choices":true},{"year":"令和7年度","num":"問45","answer":"ア","question":"計画時の予算が2,000万円で、40日間で100本のプログラムを作成するプロジェクトがある。プロジェクトが20日経過した時点で全体の40%である40本のプログラムが完成し、1,000万円のコストが掛かった。プロジェクトの指標として適切な組合せはどれか。","choices":{"ア":"スケジュール 80%、コスト 125%","イ":"スケジュール 80%、コスト 100%","ウ":"スケジュール 90%、コスト 125%","エ":"スケジュール 90%、コスト 100%"},"explanation":"スケジュール：完成本数40本÷評価時点での完成見込み本数（20日×100本/40日=50本）×100=80%。コスト：完成40本に掛かったコスト1,000万÷完成40本分の計画コスト（2,000万×40/100=800万）×100=125%。よって「ア スケジュール80%・コスト125%」。","has_choices":true},{"year":"令和7年度","num":"問46","answer":"イ","question":"開発が完了したソフトウェアを本番環境にインストールする手順を明確にし、それを実施する工程として、適切なものはどれか。","choices":{"ア":"ソフトウェア統合","イ":"ソフトウェア導入","ウ":"妥当性確認","エ":"利用者教育"},"explanation":"ソフトウェア導入とは、開発完了後のソフトウェアを本番環境にインストールする手順を明確にして実施する工程。ソフトウェア統合はモジュールの結合テスト、妥当性確認はユーザー要件への適合確認、利用者教育は操作研修。","has_choices":true},{"year":"令和7年度","num":"問47","answer":"エ","question":"利用者が銀行のATMのパネルを操作して入金処理を行う。この操作の要件を定義するときに、ソフトウェア開発の品質特性である使用性を考慮すべきインタフェースとして、最も適切なものはどれか。","choices":{"ア":"OSとパネルのインタフェース","イ":"ソフトウェア間のインタフェース","ウ":"ハードウェアとOSのインタフェース","エ":"利用者とパネルのインタフェース"},"explanation":"使用性（ユーザビリティ）とは、ユーザーが目標を達成するための使いやすさの品質特性。ATMで入金する際に使用性を考慮すべきインタフェースは「利用者とパネルのインタフェース」（ユーザーが直接触れる部分）。その他はシステム内部のインタフェース。","has_choices":true},{"year":"令和7年度","num":"問48","answer":"ア","question":"顧客から委託されたシステム開発プロジェクトのスコープの対象として、適切なものだけを全て挙げたものはどれか。a プロジェクトで作成する成果物 b プロジェクトで使用する市販のスケジュール管理ツール c プロジェクトの要求事項を顧客が記載した文書","choices":{"ア":"aのみ","イ":"a, bのみ","ウ":"a, cのみ","エ":"b, cのみ"},"explanation":"プロジェクトスコープとは、プロジェクトが達成すべき成果物と作業の範囲。aの「プロジェクトで作成する成果物」がスコープの対象。bの市販ツールはスコープ外（使用するリソース）、cの顧客要求事項文書は入力情報（前提条件）でスコープ外。よって「ア a」。","has_choices":true},{"year":"令和7年度","num":"問49","answer":"ウ","question":"クラウドサービスを提供するA社では、操作に関する質問に対して、サービスデスクのオペレーターが電話で対応するだけでなく、ホームページ上にFAQを公開している。サービスデスクの受付時間は午前9時から午後6時までである。このたびサービスデスクのサービスレベルを向上させるために、顧客向けのチャットボットを導入することにした。チャットボット導入の効果として、最も適切なものはどれか。","choices":{"ア":"オペレーターのチャットのスキルが向上する。","イ":"オペレーターの電話対応のスキルが向上する。","ウ":"問合せの受付時間を拡大することが可能になる。","エ":"ホームページ上に掲載しているFAQの内容が充実する。"},"explanation":"チャットボットは24時間365日自動応答できるため、従来の9時〜18時というサービスデスクの受付時間を超えて問合せ対応が可能になる。オペレータースキル向上や電話対応には直接影響せず、FAQの充実はチャットボットとは別の取組み。よって「ウ 問合せの受付時間を拡大することが可能になる」。","has_choices":true},{"year":"令和7年度","num":"問50","answer":"ア","question":"チャットボットの説明として、最も適切なものはどれか。","choices":{"ア":"質問に対してソフトウェアがリアルタイムで自動応答する仕組み","イ":"センサー機器がインターネットを通じて情報を共有するIoTの仕組み","ウ":"物理的なロボットが荷物を運搬する仕組み","エ":"ソフトウェアロボットが定型業務を自動化するRPA"},"explanation":"チャットボットとは、質問に対してソフトウェアがリアルタイムで自動応答する仕組み。イはIoT（センサー機器がインターネットで情報共有）、ウは物理的ロボット（荷物運搬等）、エはRPA（ソフトウェアロボットによる定型業務自動化）の説明。","has_choices":true},{"year":"令和7年度","num":"問51","answer":"エ","question":"社内で開発及び運用を行っている経理システムの内部監査を実施するとき、システム監査人として、最も適切なものはどれか。","choices":{"ア":"経理とITの知識を有する経営者直轄組織の従業員","イ":"委託開発会社の経理システム開発担当者","ウ":"経理システムの利用者である経理部担当者","エ":"経理システムの開発・運用担当者"},"explanation":"システム監査は独立性が最重要。監査対象（経理システム）の開発・運用・利用に関与していない「経理とITの知識を有する経営者直轄組織の従業員」が最も独立性が高く適切。ア（運用担当者）・イ（委託開発会社員）・ウ（利用者=経理担当者）はいずれも関与者で不適切。","has_choices":true},{"year":"令和7年度","num":"問52","answer":"ア","question":"A社は会計システムの再構築のプロジェクトを立ち上げ、システム開発をB社に外部委託している。B社から納品される成果物の検収において、プロジェクトの品質管理に係る手続を遵守しているかどうかのシステム監査を行う監査人として、適切な者は誰か。","choices":{"ア":"会計システム再構築に関与しないA社の管理部門のリーダー","イ":"A社のプロジェクトマネージャ","ウ":"B社の品質管理担当者","エ":"B社の開発担当者"},"explanation":"品質管理手続の遵守監査は独立性が必要。「会計システムの再構築に関与しないA社の管理部門のリーダー」が最も独立性が高く適切。B社の人間（ウ・エ）は被監査側、A社のプロジェクトマネージャ（イ）は関与者のため不適切。","has_choices":true},{"year":"令和7年度","num":"問53","answer":"イ","question":"内部統制の基本的要素の一つである『ITへの対応』に関する記述として、最も適切なものはどれか。","choices":{"ア":"ITへの対応では全てのミスを防止できる。","イ":"既存ITの利用拡大で目標達成できるなら新システム導入を強いるものではない。","ウ":"ITへの対応では全業務プロセスをITで自動化しなければならない。","エ":"IT依存が高まると目的達成が困難になる。"},"explanation":"ITへの対応で適切なのは「既存ITの利用拡大や使い方変更で目標達成できるなら、新システム導入やIT更新を強いるものではない」こと。アは「全てのミスを防止」が過大な表現で誤り、ウは「全業務プロセスをITで自動化」が誤り、エは「IT依存が高まると目的達成が困難」が誤り。","has_choices":true},{"year":"令和7年度","num":"問54","answer":"イ","question":"あるコールセンターでは、顧客からの電話による問合せに対応するオペレーターを支援するシステムに、顧客とオペレーターの会話の音声を認識し、顧客の問合せに対する回答の候補をオペレーターのPCの画面に表示するAIを導入した。1日の対応件数は1,000件であり、問合せ内容によって二つのグループA、Bに分けた。AI導入後に、1,000件の問合せに対応する時間は何%短縮できたか。","choices":{"ア":"30","イ":"40","ウ":"50","エ":"60"},"explanation":"AI導入前：グループA=800件・全体の60%の時間、グループB=200件・全体の40%の時間。AI導入後：グループAは1件あたり対応時間が50%短縮→800件の対応時間は60%×0.5=全体の30%。グループBは変化なし→40%。合計=70%。短縮率=100%-70%=30%…しかし、公式正解は「イ 40%」。1件あたりの時間が50%短縮とすると全800件で削減される量は1件あたり時間×0.5×800件=全体時間の60%×0.5=30%削減。短縮率30%。ただし公式正解イ(40%)が正しいとすれば、グループAの対応件数800件が全体1000件の80%であり、問題文の「全体の60%」は時間比率ではなく件数比率として再解釈すると：AI導入後グループA対応時間=AI導入前と比べて50%短縮。グループAが全体件数の80%、グループBが20%と読んだ場合、短縮率=0.8×0.5=40%。よって「イ 40%」。","has_choices":true},{"year":"令和7年度","num":"問55","answer":"ア","question":"システム開発プロジェクトの開始に当たり、人的資源に関する計画書を作成することにした。この計画において、要員を適切に配置し、より良いパフォーマンスを得るために考慮すべき事項として、適切なものだけを全て挙げたものはどれか。a プロジェクトに必要なスキルが要員に不足している場合は、トレーニングを計画する。b プロジェクトに必要なスキルよりも、要員の確保を常に優先するように計画する。c 要員をフレキシブルに配置するために、要員の役割と責任は、プロジェクトの計画段階では明確にせず、プロジェクトの開始後に定める。","choices":{"ア":"aのみ","イ":"a, bのみ","ウ":"a, cのみ","エ":"b, cのみ"},"explanation":"人的資源計画でパフォーマンス向上に考慮すべきはaのみ（スキル不足時はトレーニング計画）。bは「スキルより要員確保を常に優先」が誤り（スキル適合が重要）、cは「役割・責任を計画段階で明確にしない」が誤り（計画段階での明確化が必要）。よって「ア a」。","has_choices":true},{"year":"令和7年度","num":"問56","answer":"ア","question":"Bluetoothに追加された仕様の一つであり、省電力性に優れているので、IoTシステムを長期間運用でき、送受信デバイス間の距離を知ることにも使われているものはどれか。","choices":{"ア":"BLE","イ":"IrDA","ウ":"NFC","エ":"PLC"},"explanation":"BLE（Bluetooth Low Energy）はBluetoothの省電力仕様で、IoT機器の長期バッテリー運用や距離測定（ビーコン技術）に使用される。IrDAは赤外線通信規格、NFCは数cmの近距離無線通信、PLCは電力線通信。","has_choices":true},{"year":"令和7年度","num":"問57","answer":"イ","question":"HTTPプロキシサーバの機能に関する記述として、適切なものはどれか。","choices":{"ア":"PCに代わってIPアドレスを自動割り当てするサーバ","イ":"PCからインターネット上のWebサーバへの接続要求を中継するサーバ","ウ":"ドメイン名とIPアドレスを対応付けるサーバ","エ":"検索エンジンの最適化を行うサーバ"},"explanation":"HTTPプロキシサーバとは、PCからインターネット上のWebサーバへの接続要求を中継役として受け、PCに代わってWebサーバに接続して送受信データを中継するサーバ。アはDHCPサーバ（IPアドレス自動割当）、ウはDNSサーバ（名前解決）、エはSEOツール。","has_choices":true},{"year":"令和7年度","num":"問58","answer":"ウ","question":"DNSの説明として、適切なものはどれか。","choices":{"ア":"IPアドレスを自動割り当てするDHCPのこと","イ":"Webブラウザ・サーバ間の通信を暗号化するSSL/TLSのこと","ウ":"ホスト名やドメイン名とIPアドレスを対応付ける仕組み","エ":"IPアドレスとMACアドレスを対応付けるARPのこと"},"explanation":"DNS（Domain Name System）とは、ホスト名やドメイン名とIPアドレスを対応付ける仕組み。アはDHCP（IPアドレス自動割当プロトコル）、イはSSL/TLS（ブラウザ-Webサーバ間の暗号化）、エはARP（IPアドレスとMACアドレスの対応付け）の説明。","has_choices":true},{"year":"令和7年度","num":"問59","answer":"ア","question":"ISMSにおける内部監査に関する記述のうち、適切なものはどれか。","choices":{"ア":"JIS Q 27001要求事項と組織の規定への適合性と活動の有効性を判定する。","イ":"JIS Q 27001の要求事項は監査基準として使用しない。","ウ":"前回の監査結果は考慮せずに実施する。","エ":"抜き打ちで不定期に実施する。"},"explanation":"ISMS内部監査では、JIS Q 27001要求事項と組織自体の規定要求事項による監査基準への適合性に加え、ISMS活動の有効性も判定する（ア）。イはJIS Q 27001要求事項も監査基準に含むため誤り、ウは前回結果を考慮するため誤り、エは計画的に実施が原則（不定期・抜き打ちは原則でない）。","has_choices":true},{"year":"令和7年度","num":"問60","answer":"エ","question":"TCP/IPネットワークで用いられるプロトコルであるFTPの役割として、適切なものはどれか。","choices":{"ア":"時刻同期を行うプロトコル","イ":"電子メールを転送するプロトコル","ウ":"IPアドレスを自動割り当てするプロトコル","エ":"ファイルをPC間で転送するプロトコル"},"explanation":"FTP（File Transfer Protocol）とは、TCP/IPネットワーク上でファイルをPC間で転送するプロトコル。アはNTP（Network Time Protocol：時刻同期）、イはSMTP（電子メール転送）、ウはDHCP（IPアドレス自動割当）の役割。","has_choices":true},{"year":"令和7年度","num":"問61","answer":"ウ","question":"DBMSのトランザクションに関する記述として、適切なものはどれか。","choices":{"ア":"データベースを複数サーバに複製するレプリケーション","イ":"操作ログを記録するジャーナリング","ウ":"全て成功したら確定し失敗したら開始前に戻す制御の仕組み","エ":"検索を高速化するインデックスの利用"},"explanation":"トランザクションとは、データベースに対する一連の処理が全て成功したら変更を確定（コミット）し、途中で失敗したら処理前の状態に戻す（ロールバック）制御の仕組み。アはレプリケーション（DB複製）、イはジャーナリング（操作記録）、エはインデックス（索引）の説明。","has_choices":true},{"year":"令和7年度","num":"問62","answer":"ア","question":"OSの仮想記憶方式に関する次の記述中のa〜cに入れる字句の適切な組合せはどれか。『プログラムの実行時に、コンピュータの[a]装置の[b]な容量に制約されない、[c]なアドレス空間を提供する。』","choices":{"ア":"a:主記憶、b:物理的、c:論理的","イ":"a:主記憶、b:論理的、c:物理的","ウ":"a:補助記憶、b:物理的、c:論理的","エ":"a:補助記憶、b:論理的、c:物理的"},"explanation":"仮想記憶とは、プログラム実行時にコンピュータの主記憶装置の物理的な容量に制約されない、論理的なアドレス空間を提供する方式。a=主記憶、b=物理的、c=論理的。よって「ア 主記憶・物理的・論理的」。","has_choices":true},{"year":"令和7年度","num":"問63","answer":"ウ","question":"データの尺度を名義尺度、順序尺度、間隔尺度、比例尺度の四つに分類したとき、間隔尺度に該当するものはどれか。","choices":{"ア":"学年","イ":"血液型","ウ":"時刻","エ":"睡眠時間"},"explanation":"間隔尺度とは、順序があり尺度間の間隔が等しいがゼロ点に絶対的な意味がないデータ。時刻（10時と12時の差は2時間だが0時は「時刻なし」でなく「午前0時」）が該当。学年は順序尺度、血液型は名義尺度、睡眠時間は比例尺度（ゼロ＝睡眠なし）。","has_choices":true},{"year":"令和7年度","num":"問64","answer":"イ","question":"WebサイトなどでRSSの表記を見かけることがある。このRSSの説明として、適切なものはどれか。","choices":{"ア":"Webページのデザイン・レイアウトを定義するフォーマット","イ":"Webページの見出し・リンク・要約などを記述するフォーマット","ウ":"ソーシャルブックマークのフォーマット","エ":"Webサイトの暗号化通信プロトコル"},"explanation":"RSS（Really Simple Syndication）とは、Webページの見出し・リンク・要約などを記述するフォーマット。ウェブサイトの更新情報を配信するために広く使われる。アはCSS（デザイン・レイアウト定義）、ウはソーシャルブックマーク、エはHTTPS/TLS（暗号化プロトコル）の説明。","has_choices":true},{"year":"令和7年度","num":"問65","answer":"ア","question":"DBMSにおいて、データの検索を高速に行う目的で、必要に応じて設定して利用する情報はどれか。","choices":{"ア":"インデックス","イ":"外部キー","ウ":"主キー","エ":"スキーマ"},"explanation":"インデックス（索引）とは、DBMSにおいてデータ検索を高速化するために必要に応じて設定する情報。外部キーはテーブル間の参照整合性制約、主キーは行を一意に識別するキー（必須設定）、スキーマはデータベース構造の定義情報。","has_choices":true},{"year":"令和7年度","num":"問66","answer":"イ","question":"関係データベースで管理している次の『ログイン記録』表及び『部署』表において、ログイン結果が失敗となったことのある、又は、2022年4月10日09:00:00以前にログイン結果が成功となったことのある従業員が所属する部署名だけを全て挙げたものはどれか。","choices":{"ア":"営業部のみ","イ":"営業部、システム部、人事部","ウ":"システム部、人事部","エ":"人事部のみ"},"explanation":"ログイン失敗：10004（003人事部）、10005（003人事部）、10011（001営業部）。09:00以前に成功：10004（08:53、003人事部）、10002（08:55、002システム部）。該当部署：001営業部・002システム部・003人事部。よって「イ 営業部、システム部、人事部」。","has_choices":true},{"year":"令和7年度","num":"問67","answer":"イ","question":"3次元画像処理の高速化や、動画をなめらかにするなどの機能をもつ、描画処理のためのハードウェアはどれか。","choices":{"ア":"CGI","イ":"GPU","ウ":"GUI","エ":"UPS"},"explanation":"GPU（Graphics Processing Unit）とは、3D画像処理・動画描画処理の高速化に特化したハードウェア（グラフィックカード）。CGIはWeb上でプログラムを実行する仕組み、GUIはグラフィカルなユーザーインタフェース、UPSは停電時の電源バックアップ装置。","has_choices":true},{"year":"令和7年度","num":"問68","answer":"ウ","question":"CSIRTとして行う活動の例として、最も適切なものはどれか。","choices":{"ア":"情報資産の洗い出しと分類","イ":"セキュリティ監査計画の立案","ウ":"セキュリティ事故発生時に影響範囲を調査し被害拡大防止の対策実施を支援する","エ":"サーバ室の入退室管理の監査"},"explanation":"CSIRT（Computer Security Incident Response Team）はセキュリティインシデント対応チーム。ウの「セキュリティ事故発生時に影響範囲を調査し、被害拡大防止の対策実施を支援する」がCSIRTの典型的な活動。アはパッチ管理（運用管理チーム）、イはBCP策定、エは入退室監査。","has_choices":true},{"year":"令和7年度","num":"問69","answer":"イ","question":"バイオメトリクス認証の他人受入率と本人拒否率に関する次の記述中のa、bに入れる字句の適切な組合せはどれか。『バイオメトリクス認証の認証精度において、他人受入率を低く抑えようとすると[a]が高くなり、本人拒否率を低く抑えようとすると[b]が高くなる。』","choices":{"ア":"a: 安全性、b: 可用性","イ":"a: 安全性、b: 利便性","ウ":"a: 利便性、b: 安全性","エ":"a: 利便性、b: 可用性"},"explanation":"判定基準を厳しくすると他人受入率↓・本人拒否率↑（セキュリティ重視→利便性低下）。他人受入率を低く抑えようとするとa（安全性）が高くなる。本人拒否率を低く抑えようとするとb（利便性）が高くなる。よって「イ a=安全性、b=利便性」。","has_choices":true},{"year":"令和7年度","num":"問70","answer":"エ","question":"情報セキュリティにおける脅威のうち、脆弱性を是正するセキュリティパッチをソフトウェアに適用することが最も有効な対策になるものはどれか。","choices":{"ア":"総当たり攻撃","イ":"ソーシャルエンジニアリング","ウ":"パスワードリスト攻撃","エ":"バッファオーバーフロー攻撃"},"explanation":"バッファオーバーフロー攻撃は、プログラムのバッファ境界チェック不足という脆弱性を悪用した攻撃。脆弱性を修正するセキュリティパッチの適用が最も効果的な対策。総当たり攻撃・ソーシャルエンジニアリング・パスワードリスト攻撃はパッチ適用では防げない。","has_choices":true},{"year":"令和7年度","num":"問71","answer":"エ","question":"携帯電話で用いられる電波に関する次の記述中のa、bに入れる字句の適切な組合せはどれか。『電波には、周波数が[a]ほど回り込みやすくなり障害物の裏にも届きやすいという性質がある。日本国内の携帯電話で使用される周波数のうち、700[b]帯〜900[b]帯の周波数帯域はこの性質をもちながらつながりやすいことなどから、プラチナバンドと呼ばれている。』","choices":{"ア":"a: 高い、b: GHz","イ":"a: 高い、b: MHz","ウ":"a: 低い、b: GHz","エ":"a: 低い、b: MHz"},"explanation":"電波は周波数が低いほど波長が長く回り込みやすい（障害物を超えやすい）。700〜900MHz帯はこの性質をもつプラチナバンド。単位はMHz（メガヘルツ）。よって「エ a=低い、b=MHz」。","has_choices":true},{"year":"令和7年度","num":"問72","answer":"イ","question":"見る人に意図が伝わりやすいデザインにするための四つの原則に関する次の記述中のa、bに入れる字句の適切な組合せはどれか。近接・[a]・反復・[b]の四原則。[a]：要素を意図したルールに基づき配置する。[b]：要素ごとの大小や強弱などの違いを明確にする。","choices":{"ア":"a:整列、b:強調","イ":"a:整列、b:対比","ウ":"a:強調、b:整列","エ":"a:強調、b:対比"},"explanation":"デザインの四原則（CRAP）：近接（関連要素を近づける）、整列（意図したルールに基づき配置）、反復（デザインルールを繰り返す）、対比（大小・強弱の違いを明確にする）。a=整列、b=対比。よって「イ a=整列、b=対比」。","has_choices":true},{"year":"令和7年度","num":"問73","answer":"ウ","question":"Webサービスを狙った攻撃に関する記述と攻撃の名称の適切な組合せはどれか。a 脆弱性の修正プログラムが提供される前に攻撃する b 大量のパケットを送付してサービスを不能にする c パスワードのパターンを順次試して侵入する","choices":{"ア":"a:ゼロデイ、b:DDoS、c:ブルートフォース","イ":"a:ゼロデイ、b:ブルートフォース、c:DDoS","ウ":"a:DDoS、b:ゼロデイ、c:ブルートフォース","エ":"a:ブルートフォース、b:DDoS、c:ゼロデイ"},"explanation":"a（修正前に脆弱性を突く）＝ゼロデイ攻撃、b（大量パケットでサービス停止）＝DDoS攻撃、c（パスワードを総当たりで試行）＝ブルートフォース（総当たり）攻撃。よって「ウ a=ゼロデイ、b=DDoS、c=ブルートフォース」。","has_choices":true},{"year":"令和7年度","num":"問74","answer":"ア","question":"デジタルフォレンジックスの説明として、適切なものはどれか。","choices":{"ア":"コンピュータに関する犯罪でデータを復元・分析して証拠を収集・保全する活動","イ":"実際に攻撃者が行う手法でシステムの脆弱性を検査するペネトレーションテスト","ウ":"インターネット上に仮想的な専用線を構築するVPN","エ":"電子文書の送信者を確認するデジタル署名"},"explanation":"デジタルフォレンジックスとは、コンピュータに関する犯罪や法的紛争が生じた際に、削除されたファイル・電子メールの復元などを行い、証拠を収集・保全・分析すること。イはペネトレーションテスト（脆弱性検査）、ウはVPN（仮想専用線）、エはデジタル署名の説明。","has_choices":true},{"year":"令和7年度","num":"問75","answer":"ウ","question":"次の記憶媒体のうち、記憶素子として半導体メモリを用いているものだけを全て挙げたものはどれか。a CD-ROM b DVD-RAM c RAM d SSD e USBメモリ","choices":{"ア":"a, b, c","イ":"a, b, e","ウ":"c, d, e","エ":"c, e"},"explanation":"半導体メモリを使用：c（RAM）、d（SSD：フラッシュメモリ）、e（USBメモリ：フラッシュメモリ）。a（CD-ROM）とb（DVD-RAM）は光学ディスク（レーザーで読み書き）で半導体メモリではない。よって「ウ c, d, e」。","has_choices":true},{"year":"令和7年度","num":"問76","answer":"ウ","question":"商品の税込価格を計算する表計算のワークシートがある。セルB1には消費税率が入力されており、セルB4〜B6には税抜価格が入力されている。セルC4〜C6に税込価格を表示するために、セルC4に式を入力し、セルC5, C6に複写する。セルC4に入力する式はどれか。ここで、セルB1は、パーセント形式で表示している。","choices":{"ア":"B$4*(1+B$1)","イ":"B$4*(1+B1)","ウ":"B4*(1+$B$1)","エ":"B4*(1+$B1)"},"explanation":"税込価格＝税抜価格×(1＋消費税率)。C4の税抜価格B4は下にコピーするので行は相対参照（B4のまま）。消費税率B1はC5, C6にコピーしても行・列ともに固定したいので絶対参照$B$1。よって「ウ B4*(1+$B$1)」。","has_choices":true},{"year":"令和7年度","num":"問77","answer":"イ","question":"ネットワークやホストを監視することによって、不正アクセスや不審な通信を発見し、報告する仕組みはどれか。","choices":{"ア":"DMZ","イ":"IDS","ウ":"アンチパスバック","エ":"ボット"},"explanation":"IDS（Intrusion Detection System：侵入検知システム）とは、ネットワーク・ホストを監視して不正アクセスや不審な通信を検知・報告する仕組み。DMZは外部公開サーバを置く非武装ネットワーク帯、アンチパスバックは入退室管理制御、ボットは遠隔操作される不正プログラム。","has_choices":true},{"year":"令和7年度","num":"問78","answer":"エ","question":"手続calcMod3を呼び出したときの出力はどれか。for(iを1から7まで1ずつ増やす) if(i÷3の余りが0と等しい) totalValue ← totalValue + i endif endfor totalValueを出力する","choices":{"ア":"2","イ":"3","ウ":"7","エ":"9"},"explanation":"i=1〜7でi÷3の余りが0（3の倍数）：i=3（余り0）、i=6（余り0）。totalValue=0+3+6=9。よって「エ 9」。","has_choices":true},{"year":"令和7年度","num":"問79","answer":"ア","question":"サムネイルの説明として、適切なものはどれか。","choices":{"ア":"画像や文書ファイルの内容を縮小して表示したもの","イ":"処理の内容や対象が分かる小さな絵や記号のこと","ウ":"ネット上で利用者の分身として動作するキャラクターのこと","エ":"複数のファイルを一つのファイルにまとめたもの"},"explanation":"サムネイルとは、画像や文書ファイルの内容を一覧表示などのために縮小して表示したもの（thumbnail＝爪の大きさ）。イはアイコン（処理内容・対象を示す小さな絵や記号）、ウはアバター（ネット上の分身キャラクター）、エはアーカイブ（複数ファイルを1つにまとめたもの）の説明。","has_choices":true},{"year":"令和7年度","num":"問80","answer":"ウ","question":"AIにおいて、広範囲かつ大量のデータで訓練されたものであり、ファインチューニングなどによって文章生成AIのような様々な用途に適応できる特徴をもつものを何というか。","choices":{"ア":"アノテーション","イ":"エキスパートシステム","ウ":"基盤モデル","エ":"畳み込みニューラルネットワーク"},"explanation":"基盤モデル（Foundation Model）とは、大量・多様なデータで事前学習された大規模AIモデルで、ファインチューニングにより様々なタスクに適応できる（例：GPT系・Claude等のLLM）。アノテーションはデータへのラベル付け、エキスパートシステムはルールベースの専門家AIシステム、畳み込みニューラルネットワークはCNN（画像認識等に使われるニューラルネットワーク）。","has_choices":true},{"year":"令和7年度","num":"問81","answer":"エ","question":"イメージスキャナーで読み取った紙の書類の画像から、印刷文字や手書きの文字を読み取り、テキストデータに変換する技術を何と呼ぶか。","choices":{"ア":"CCD","イ":"DVI","ウ":"GPU","エ":"OCR"},"explanation":"OCR（Optical Character Recognition：光学文字認識）とは、スキャンした画像から文字を認識してテキストデータに変換する技術。CCDは光センサー素子（スキャナー等に使用）、DVIはデジタル映像インタフェース規格、GPUは描画処理専用ハードウェア。","has_choices":true},{"year":"令和7年度","num":"問82","answer":"ウ","question":"あるコンピュータのデータベースの内容を他のコンピュータのデータベースに複製して、両者の内容が一致するように同期させるDBMSの機能はどれか。","choices":{"ア":"アーカイブ","イ":"バックアップ","ウ":"レプリケーション","エ":"ロールバック"},"explanation":"レプリケーションとは、データベース内容を他のコンピュータに複製して同期させるDBMSの機能（冗長化・可用性向上に使用）。アーカイブは長期保存のためのデータ退避、バックアップはデータ複製・保管（一方向）、ロールバックはトランザクション失敗時の状態復元。","has_choices":true},{"year":"令和7年度","num":"問83","answer":"ウ","question":"ISMSの運用にPDCAモデルを採用している組織において、サーバ監視に関する次の作業を実施する。各作業とPDCAモデルの各フェーズの組合せとして、適切なものはどれか。(1)サーバ監視の具体的な目的及び手順を定める。(2)サーバ監視の作業内容を第三者が客観的に評価する。(3)定められている手順に従ってサーバを監視する。(4)発見された問題点の是正処置として、サーバの監視方法を変更する。","choices":{"ア":"P=(1)、D=(2)、C=(3)、A=(4)","イ":"P=(1)、D=(2)、C=(4)、A=(3)","ウ":"P=(1)、D=(3)、C=(2)、A=(4)","エ":"P=(1)、D=(3)、C=(4)、A=(2)"},"explanation":"P（Plan/計画）：(1)目的・手順を定める。D（Do/実行）：(3)手順に従って監視する。C（Check/評価）：(2)第三者が客観的に評価する。A（Act/改善）：(4)問題点の是正処置として変更する。よって「ウ P=(1)、D=(3)、C=(2)、A=(4)」。","has_choices":true},{"year":"令和7年度","num":"問84","answer":"イ","question":"ISMSにおける情報セキュリティ方針に関する記述として、適切なものはどれか。","choices":{"ア":"経営者の承認なしに作成する。","イ":"ISMSを継続的に改善するコミットメントを含む必要がある。","ウ":"機密情報なので社内だけに公開する。","エ":"担当部門が策定すればよく経営陣の関与は不要。"},"explanation":"ISMSの情報セキュリティ方針として適切なのは「情報セキュリティ対策は一度実施したら終わりではないので、ISMSを継続的に改善するコミットメントを含む必要がある」（イ）。アは機密事項なので社内限定という制限は誤り（公開も可能）、ウは部門ごとでなく組織全体に適用、エはトップダウン（経営陣による承認）が原則。","has_choices":true},{"year":"令和7年度","num":"問85","answer":"イ","question":"問題を解いて解答群の中から正解を選ぶ、あるAIシステムがある。このシステムは、1回の学習の過程を経るごとに、学習の過程の前後の比較において、誤り率が5%低下する（前回の誤り率の95%になる）。現在の正解率が30%であるとき、正解率が35%を超えるためには、少なくともあと何回の学習の過程が必要か。","choices":{"ア":"1","イ":"2","ウ":"3","エ":"4"},"explanation":"初期誤り率=70%。1回学習後：70%×0.95=66.5%→正解率33.5%（35%未満）。2回学習後：66.5%×0.95=63.175%→正解率36.825%（35%超）。よって少なくとも「イ 2」回。","has_choices":true},{"year":"令和7年度","num":"問86","answer":"エ","question":"動物が写っている大量の画像から犬や猫などの特徴を自動的に抽出して、動物の種類を識別できるようにするAIの技術はどれか。","choices":{"ア":"e-ラーニング","イ":"アクティブラーニング","ウ":"アダプティブラーニング","エ":"ディープラーニング"},"explanation":"ディープラーニング（深層学習）とは、多層ニューラルネットワークを使い、大量の画像から特徴を自動的に抽出・学習して識別する技術（画像認識・音声認識等に利用）。e-ラーニングは電子学習システム、アクティブラーニングは能動的学習法、アダプティブラーニングは個人最適化学習。","has_choices":true},{"year":"令和7年度","num":"問87","answer":"ウ","question":"PKIにおいて、ある条件に当てはまるデジタル証明書の情報が公開されているリストとしてCRLがある。このリストに掲載される条件として、適切なものはどれか。","choices":{"ア":"有効期間が満了している。","イ":"有効期間が無期限である。","ウ":"有効期間内に失効している。","エ":"有効期間を延長している。"},"explanation":"CRL（Certificate Revocation List：証明書失効リスト）には、有効期間内にもかかわらず失効（無効化）されたデジタル証明書の情報が掲載される。有効期間満了は通常の終了で掲載不要、無期限・有効期間延長は掲載対象外。「ウ 有効期間内に失効している」が掲載条件。","has_choices":true},{"year":"令和7年度","num":"問88","answer":"イ","question":"情報セキュリティ対策を、『技術的セキュリティ対策』、『人的セキュリティ対策』及び『物理的セキュリティ対策』に分類したとき、『物理的セキュリティ対策』の例として、適切なものはどれか。","choices":{"ア":"アクセスログ管理・不審な通信の遮断などの技術的対策","イ":"サーバ室・執務室へのICカードによる入退室管理","ウ":"守秘義務契約の締結・従業員へのセキュリティ教育","エ":"退職者のアカウント削除などのアクセス権限管理"},"explanation":"物理的セキュリティ対策とは、施設・設備の物理的アクセス制御。イの「サーバ室・執務室へのICカードによる入退室管理」が物理的対策。アはアクセスログ・通信遮断（技術的）、ウは守秘義務契約・教育（人的）、エはアカウント削除（技術的）。","has_choices":true},{"year":"令和7年度","num":"問89","answer":"ア","question":"AさんはBさんから次の4種類のメッセージを受け取った。Aさんが、受け取ったメッセージを復号して読むことができるものだけを全て挙げたものはどれか。a AさんとBさんとの共通鍵で暗号化したメッセージ b Aさんの公開鍵で暗号化したメッセージ c Bさんの公開鍵で暗号化したメッセージ d Bさんの秘密鍵で暗号化したメッセージ","choices":{"ア":"a, b, d","イ":"a, c, d","ウ":"b, d","エ":"c, d"},"explanation":"a（共通鍵暗号）：Aも共通鍵を持つので復号可。b（Aの公開鍵で暗号化）：Aの秘密鍵で復号可。c（Bの公開鍵で暗号化）：Bの秘密鍵でしか復号不可→Aは不可。d（Bの秘密鍵で暗号化＝デジタル署名）：Bの公開鍵で復号可（公開鍵は誰でも入手できる）。よって「ア a, b, d」。","has_choices":true},{"year":"令和7年度","num":"問90","answer":"エ","question":"無線LANのセキュリティ対策に関する記述として、適切なものはどれか。","choices":{"ア":"APIは、複数のアクセスポイントをグループ化して管理するIDである。","イ":"SSHは、アクセスポイントをステルス化することで無線LANネットワークを隠蔽する機能である。","ウ":"VPNは、アクセスポイントに登録したMACアドレスをもつ機器以外からの接続を拒否する機能である。","エ":"WPA2は、WEPよりも高い信頼性をもつ、無線通信の暗号化技術である。"},"explanation":"WPA2とは、WEPよりも高い信頼性をもつ無線通信の暗号化技術（AES暗号を使用）。アはAPIではなくESSID/SSIDがアクセスポイントを識別するID。イのSSHはリモートログインプロトコルでAP隠蔽とは無関係。ウのVPNはMACアドレスフィルタリングとは別機能。","has_choices":true},{"year":"令和7年度","num":"問91","answer":"エ","question":"情報セキュリティのリスクマネジメントにおけるリスク対応を、リスク移転、リスク回避、リスク低減及びリスク保有の四つに分けて実施することにしたとき、これらに関する記述として、適切なものはどれか。","choices":{"ア":"リスク対応の実施手順であり、リスク回避、リスク移転、リスク低減、リスク保有の順番で進める。","イ":"リスク対応の実施手順であり、リスク保有、リスク低減、リスク移転、リスク回避の順番で進める。","ウ":"リスク対応の選択肢であり、管理対象としたリスクの顕在化に備えて保険を掛けておくことは、リスク回避に該当する。","エ":"リスク対応の選択肢であり、ノートPCの紛失や盗難に備えて社外への持出しをより厳重に管理することは、リスク低減に該当する。"},"explanation":"エの「ノートPCの紛失・盗難に備えて社外への持出しをより厳重に管理する」はリスクの発生確率を下げる「リスク低減」に該当し適切。ウの「保険を掛ける」はリスク移転（第三者への転嫁）。アとイはリスク対応に決まった実施順序はないため誤り。","has_choices":true},{"year":"令和7年度","num":"問92","answer":"ア","question":"従業員が使用するPCがランサムウェアに感染した場合の損害を軽減する対策例として、適切なものはどれか。","choices":{"ア":"ファイルサーバのバックアップをネットワークから切り離して保管する。","イ":"多要素認証を導入してシステムへの不正アクセスを防ぐ。","ウ":"PCのHDDを暗号化して情報漏えいを防ぐ。","エ":"一定回数のログイン失敗でアカウントをロックする。"},"explanation":"ランサムウェアはPCのファイルを暗号化して身代金を要求するマルウェア。損害軽減（感染後の復旧）に最有効なのはア「ファイルサーバのバックアップをネットワーク切り離しで保管」→暗号化されても復元可能。イ（多要素認証）・ウ（HDD暗号化）・エ（IDロック）は感染予防策。","has_choices":true},{"year":"令和7年度","num":"問93","answer":"ウ","question":"情報セキュリティにおける脅威の説明として、適切なものはどれか。","choices":{"ア":"攻撃者が付け込むことのできる情報システムの弱点","イ":"情報資産が被害に遭う確率と被害規模の組合せ","ウ":"情報資産に損害を与える原因となるもの","エ":"情報システムの弱点を利用した攻撃によって被害を受ける可能性"},"explanation":"情報セキュリティの「脅威」とは、情報資産に損害を与える原因となるもの（自然災害・サイバー攻撃・内部不正・システム障害等）。アは脆弱性（攻撃者が付け込む弱点）、イはリスク（損害を受ける確率×規模の組合せ）、エはリスク（攻撃による被害を受ける可能性）の説明。","has_choices":true},{"year":"令和7年度","num":"問94","answer":"イ","question":"稼働率0.9の装置で並列システムを構成したい。このシステムの稼働率を0.999とするためには、最低何台の装置で並列システムを構成する必要があるか。ここで、並列システムを構成したときに、少なくとも1台の装置が稼働していればシステムは正常に稼働しているものとする。","choices":{"ア":"2","イ":"3","ウ":"4","エ":"5"},"explanation":"n台並列の稼働率：1-(1-0.9)^n≧0.999。1-(0.1)^n≧0.999→(0.1)^n≦0.001。n=1：0.1、n=2：0.01、n=3：0.001≦0.001（OK）。最低3台。よって「イ 3」。","has_choices":true},{"year":"令和7年度","num":"問95","answer":"ウ","question":"データベース設計におけるデータ分析で行うこととして、適切なものはどれか。","choices":{"ア":"データウェアハウスから業務ごとに必要な情報を抽出する。","イ":"データ項目の内容が、指定された条件を満たす行だけを抽出する。","ウ":"必要なデータ項目を洗い出し、項目間の関連を整理する。","エ":"膨大な情報から統計的手法などを用いて、ビジネスに活用できる情報を探索する。"},"explanation":"データベース設計のデータ分析（概念設計・論理設計の基礎）で行うのは「必要なデータ項目を洗い出し、項目間の関連を整理する」こと（エンティティ・属性・関連の整理）。アはDWHからの情報抽出（OLAP）、イはSQLのSELECT操作、エはデータマイニング。","has_choices":true},{"year":"令和7年度","num":"問96","answer":"イ","question":"OSS（Open Source Software）に関する次の記述のうち、適切なものだけを全て挙げたものはどれか。a 個人だけではなく、企業や団体が開発したソフトウェアもある。b 著作権が放棄されている。c 入手したソフトウェアは、自由に再配布してもよい。","choices":{"ア":"a, b","イ":"a, c","ウ":"a, b, c","エ":"b, c"},"explanation":"OSSに関して適切なのはa（企業・団体も開発する）とc（再配布自由）。bは誤りで、OSSにも著作権は存在するが利用・改変・再配布の権利がライセンスにより付与される（著作権放棄ではない）。よって「イ a, c」。","has_choices":true},{"year":"令和7年度","num":"問97","answer":"ア","question":"情報セキュリティにおいて、可用性が損なわれた事象だけを全て挙げたものはどれか。a 関連取引先との電子決済システムがDoS攻撃を受け、処理ができなくなった。b 顧客情報管理システムの顧客情報が誤った内容のまま運用されていた。c 社内のサーバに不正侵入されて、社外秘の情報が漏えいした。","choices":{"ア":"a","イ":"a, b","ウ":"b, c","エ":"c"},"explanation":"可用性とは「必要なときに情報・システムにアクセスできる状態」。a（DoS攻撃で処理不能）のみが可用性の損害。b（誤った情報が運用）は完全性（正確性・信頼性）の損害、c（情報漏えい）は機密性の損害。よって「ア a」。","has_choices":true},{"year":"令和7年度","num":"問98","answer":"ウ","question":"4個の要素からなるデータの並びを、次の手順を繰り返して昇順に整列するとき、整列が終了するまでに(1)から(3)の一連の手順は、何回実行されるか。データの並び：[27, 42, 33, 12]","choices":{"ア":"2","イ":"3","ウ":"4","エ":"5"},"explanation":"手順：(1)最大値を選び最後の要素と入れ替え、(2)最後を対象から外す、(3)1個以上残れば繰り返す。\n1回目：[27,42,33,12]→最大42と末尾12交換→[27,12,33,42]→42を外す→[27,12,33]が対象\n2回目：[27,12,33]→最大33は末尾なので交換不要→33を外す→[27,12]が対象\n3回目：[27,12]→最大27と末尾12交換→[12,27]→27を外す→[12]が対象\n4回目：[12]→最大12を末尾12と交換→12を外す→対象なし→終了\nよって「ウ 4」回。","has_choices":true},{"year":"令和7年度","num":"問99","answer":"ウ","question":"関数calculateAmountOfPrizeは、業務改善の効果における改善額と短縮期間を、それぞれimprovementとperiodで受け取り、賞金額を戻り値とする。改善額が20万円で短縮期間が3日の業務改善と、改善額が5万円で短縮期間が14日の業務改善があった。この二つの賞金額の合計は何円か。","choices":{"ア":"1,000","イ":"1,500","ウ":"3,000","エ":"5,500"},"explanation":"1件目：improvement=200,000円（≧100,000）、period=3日（7より小さい）→prize=2,000円。2件目：improvement=50,000円（100,000より小さい）、period=14日（7以上）→prize=1,000円。合計=2,000+1,000=3,000円。よって「ウ 3,000」。","has_choices":true},{"year":"令和7年度","num":"問100","answer":"ア","question":"個人の認証に用いる要素を、知識、所有物及びバイオメトリクスの三つに分類したとき、所有物を要素として用いた認証の例はどれか。","choices":{"ア":"SMSを利用した認証","イ":"虹彩を用いた認証","ウ":"筆跡・筆圧を用いた認証","エ":"本人だけが知っている秘密の質問による認証"},"explanation":"所有物認証とは、物理的に所持しているものを用いた認証（ICカード・スマートフォン等）。SMSを用いた認証はスマートフォン（所有物）に届いたコードを使う認証で所有物認証。虹彩・筆跡・筆圧はバイオメトリクス認証、本人設定の質問と答えは知識認証。よって「ア SMS」。","has_choices":true}];

let idx=0, answered=false;
let autoOn=false, phase='q';
let timerRaf=null, timerTimeout=null, timerStart=null;
const COLORS={q:'#4f9cf9',c:'#fbbf24',e:'#34d399'};
const LABELS={q:'問題',c:'選択肢',e:'解説'};

function getVH(){ return window.innerHeight - 52; }

function scrollToPage(n){
  document.getElementById('scroll').scrollTop = n * getVH();
}

function render(){
  answered=false; phase='q';
  const q=Q[idx];
  const vh=getVH();

  document.getElementById('scroll').innerHTML=`
    <div class="page p-question" style="min-height:${vh}px" id="pg-0">
      <div class="q-meta">${q.year} ／ ${q.num} ／ ${idx+1}／${Q.length}問</div>
      <div id="q-text" style="font-size:${F.question}px;font-weight:700;line-height:1.6;overflow-wrap:break-word">${q.question}</div>
    </div>
    <div class="page p-choices" style="min-height:${vh}px;gap:12px" id="pg-1">
      <div class="c-meta">選択肢</div>
      <div id="choices-wrap" style="display:flex;flex-direction:column;gap:8px;width:100%">
        ${Object.entries(q.choices).map(([k,v])=>`
          <button class="btn" id="ch-${k}" onclick="pick('${k}')">
            <span class="lbl">${k}</span><span>${v}</span>
          </button>`).join('')}
      </div>
    </div>
    <div class="page p-exp" style="min-height:${vh}px;gap:10px" id="pg-2">
      <div class="e-label">💡 解説</div>
      <div id="ans-badge" style="font-size:15px;font-weight:700;color:#34d399;background:#051a0f;border:1px solid #34d399;border-radius:10px;padding:10px 16px">正解：${q.answer}　${q.choices[q.answer]}</div>
      <div id="exp-text" class="e-text">${q.explanation}</div>
      <button class="next-btn" onclick="next()">次の問題 →</button>
    </div>`;

  document.getElementById('scroll').scrollTop = 0;
  setPhaseUI('q');
  fitAll();
  if(autoOn) runPhase('q');
}

function fitEl(pageId, textId, loMin=11, hiMax=90){
  const pg  = document.getElementById(pageId);
  const txt = document.getElementById(textId);
  if(!pg || !txt) return;
  const vh = getVH();
  let lo=loMin, hi=hiMax;
  while(hi - lo > 1){
    const mid = (lo + hi) >> 1;
    txt.style.fontSize = mid + 'px';
    pg.scrollHeight <= vh ? (lo = mid) : (hi = mid);
  }
  txt.style.fontSize = lo + 'px';
}

function fitAll(){
  requestAnimationFrame(()=>{
    fitEl('pg-0', 'q-text',       11, 90);   // 問題
    fitEl('pg-1', 'choices-wrap', 11, 55);   // 選択肢
    fitEl('pg-2', 'exp-text',     11, 60);   // 解説
  });
}

function setPhaseUI(ph){
  document.getElementById('phase-lbl').textContent=LABELS[ph];
  document.getElementById('timer-fill').style.background=COLORS[ph];
}

function startTimer(dur,color,cb){
  stopTimer();
  timerStart=performance.now();
  document.getElementById('timer-fill').style.background=color;
  function frame(now){
    const pct=Math.max(0,1-(now-timerStart)/dur);
    document.getElementById('timer-fill').style.width=(pct*100)+'%';
    if(pct>0) timerRaf=requestAnimationFrame(frame);
  }
  timerRaf=requestAnimationFrame(frame);
  timerTimeout=setTimeout(()=>{stopTimer();cb&&cb();},dur);
}
function stopTimer(){
  if(timerRaf){cancelAnimationFrame(timerRaf);timerRaf=null;}
  if(timerTimeout){clearTimeout(timerTimeout);timerTimeout=null;}
}

function runPhase(ph){
  phase=ph;
  setPhaseUI(ph);
  scrollToPage(ph==='q'?0:ph==='c'?1:2);
  startTimer(DUR[ph],COLORS[ph],()=>{
    if(!autoOn) return;
    if(ph==='q') runPhase('c');
    else if(ph==='c'){ if(!answered) autoAnswer(); runPhase('e'); }
    else next();
  });
}

function autoAnswer(){
  const q=Q[idx];
  Object.keys(q.choices).forEach(k=>{
    const b=document.getElementById('ch-'+k);
    if(!b) return;
    b.disabled=true;
    if(k===q.answer) b.classList.add('ok');
  });
  answered=true;
}

function pick(sel){
  if(answered) return;
  answered=true;
  stopTimer();
  const q=Q[idx];
  Object.keys(q.choices).forEach(k=>{
    const b=document.getElementById('ch-'+k);
    b.disabled=true;
    if(k===q.answer) b.classList.add('ok');
    else if(k===sel) b.classList.add('ng');
  });
  if(autoOn) runPhase('e');
  else scrollToPage(2);
}

function next(){
  stopTimer();
  idx=(idx+1)%Q.length;
  render();
}

function toggleAuto(){
  autoOn=!autoOn;
  const btn=document.getElementById('auto-btn');
  if(autoOn){ btn.textContent='⏹ 停止'; btn.classList.add('on'); runPhase(phase); }
  else{ btn.textContent='▶ 自動'; btn.classList.remove('on'); stopTimer(); }
}

function doShuffle(){
  stopTimer();
  autoOn=false;
  document.getElementById('auto-btn').textContent='▶ 自動';
  document.getElementById('auto-btn').classList.remove('on');
  // Fisher-Yates shuffle
  for(let i=Q.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [Q[i],Q[j]]=[Q[j],Q[i]];
  }
  idx=0; render();
}

doShuffle();

let speaking=false;

function getSpeakText(){
  const q=Q[idx];
  const scroll=document.getElementById('scroll');
  const top=scroll.scrollTop;
  const vh=getVH();
  const pg=Math.round(top/vh);
  if(pg===0) return `問題。${q.question}`;
  if(pg===1) return `選択肢。${Object.entries(q.choices).map(([k,v])=>`${k}、${v}`).join('。')}`;
  return `解説。正解は${q.answer}、${q.choices[q.answer]}。${q.explanation}`;
}

function speak(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang='ja-JP';
  utt.rate=1.0;
  utt.onend=()=>{ speaking=false; updateSpeakBtn(); };
  utt.onerror=()=>{ speaking=false; updateSpeakBtn(); };
  speaking=true;
  updateSpeakBtn();
  window.speechSynthesis.speak(utt);
}

function updateSpeakBtn(){
  const btn=document.getElementById('speak-btn');
  if(!btn) return;
  btn.textContent=speaking?'🔇':'🔊';
  if(speaking) btn.classList.add('on'); else btn.classList.remove('on');
}

function toggleSpeak(){
  if(speaking){ window.speechSynthesis&&window.speechSynthesis.cancel(); speaking=false; updateSpeakBtn(); return; }
  speak(getSpeakText());
}
</script>
