<title>IT過去問題 令和5〜7年度</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#080c14;color:#eef2ff;font-family:-apple-system,'Hiragino Sans',sans-serif;overflow:hidden;position:fixed;width:100%;height:100%}
#scroll{width:100%;height:calc(100% - 40px);overflow-y:scroll;-webkit-overflow-scrolling:touch;}
#scroll::-webkit-scrollbar{display:none}
.page{display:flex;flex-direction:column;justify-content:center;padding:12px 14px;position:relative;}
.p-question{background:#080c14}
.q-meta{font-size:12px;color:#4a5a80;margin-bottom:10px}
.p-choices{background:#0c1220;gap:12px}
.c-meta{font-size:12px;color:#4a5a80;margin-bottom:4px}
.btn{background:#080c14;border:1.5px solid #1a2035;border-radius:14px;color:#eef2ff;padding:10px 14px;font-family:inherit;font-size:inherit;text-align:left;cursor:pointer;display:flex;gap:10px;align-items:flex-start;line-height:1.5;}
.lbl{font-weight:900;color:#4f9cf9;min-width:22px;flex-shrink:0}
.btn.ok{border-color:#34d399;background:#051a0f;color:#34d399}
.btn.ok .lbl{color:#34d399}
.btn.ng{border-color:#f87171;background:#1a0505;color:#f87171}
.btn.ng .lbl{color:#f87171}
.btn:disabled{cursor:default}
.p-exp{background:#080c14;gap:20px}
.e-label{font-size:12px;font-weight:700;color:#fbbf24}
.e-text{color:#8898c0;line-height:1.9}
.next-btn{background:#4f9cf9;border:none;border-radius:10px;color:#000;font-weight:900;font-size:13px;padding:10px 16px;cursor:pointer;font-family:inherit;margin-top:4px;min-height:44px;}
#bar{height:40px;background:#0c1220;border-top:1px solid #1a2035;display:flex;align-items:center;padding:0 12px;gap:8px;}
#timer-track{flex:1;height:3px;background:#1a2035;border-radius:99px;overflow:hidden}
#timer-fill{height:100%;width:100%;border-radius:99px;transition:background .3s}
.phase-label{font-size:10px;color:#4a5a80;min-width:30px}
.auto-btn{background:transparent;border:1px solid #1a2035;border-radius:6px;color:#4a5a80;font-size:11px;font-weight:700;font-family:inherit;padding:4px 9px;cursor:pointer;}
.auto-btn.on{border-color:#4f9cf9;color:#4f9cf9}
</style>
</head>
<body>
<div id="scroll"></div>
<div id="bar">
  <span class="phase-label" id="phase-lbl">問題</span>

  <button class="auto-btn" id="auto-btn" onclick="toggleAuto()">▶ 自動</button>
  <button class="auto-btn" onclick="doShuffle()">⇄ シャッフル</button>

</div>

const DUR = {

/* ===================================================== */


const Q = [{"year":"令和5年度","num":"問1","answer":"エ","question":"新しいビジネスモデルや製品を開発する際に、仮説に基づいて実用に向けた最小限のサービスや製品を作り、短期に顧客価値の検証を繰り返すことによって、新規事業などを成功させる可能性を高める手法を示す用語はどれか。","choices":{"ア":"カニバリゼーション","イ":"業務モデリング","ウ":"デジタルトランスフォーメーション","エ":"リーンスタートアップ"},"explanation":"リーンスタートアップは、仮説に基づきMVP（Minimum Viable Product）を作成し、短期間で顧客価値を検証しながら改善を繰り返す手法。カニバリゼーションは自社製品が自社の他製品を浸食する現象、業務モデリングは業務プロセスの可視化、DXはデジタル技術によるビジネス変革。","has_choices":true},{"year":"令和5年度","num":"問2","answer":"ア","question":"次のa〜cのうち、著作権法によって定められた著作物に該当するものだけを全て挙げたものはどれか。a 原稿なしで話した講演の録音 b 時刻表に掲載されたバスの到着時刻 c 創造性の高い技術の発明","choices":{"ア":"aのみ","イ":"a, c","ウ":"bのみ","エ":"b, c"},"explanation":"著作物とは「思想又は感情を創作的に表現したもの」。aの講演の録音は著作権法上「言語の著作物」に該当。bの時刻データは創作性がなく著作物外。cの発明は特許の保護対象。よってaのみが著作物。","has_choices":true},{"year":"令和5年度","num":"問3","answer":"エ","question":"観光などで訪日した外国人が国内にもたらす経済効果を示す言葉として、最も適切なものはどれか。","choices":{"ア":"アウトソーシング","イ":"アウトバウンド需要","ウ":"インキュベーター","エ":"インバウンド需要"},"explanation":"インバウンド需要とは、訪日外国人が日本国内で消費することによって生じる経済効果・需要。アウトソーシングは外部委託、アウトバウンド需要は日本人が海外で消費する需要、インキュベーターは新規事業育成施設。","has_choices":true},{"year":"令和5年度","num":"問4","answer":"イ","question":"ASP利用方式と自社開発の自社センター利用方式（自社方式）の採算性を比較する。次の条件のとき、ASP利用方式の期待利益（効果額－費用）が自社方式よりも大きくなるのは、自社方式の初期投資額が何万円を超えたときか。比較期間は5年。","choices":{"ア":"500","イ":"1,000","ウ":"1,500","エ":"2,000"},"explanation":"ASP5年間の利益＝(500-300)×5＝1,000万円。自社方式5年間の利益＝(500-100)×5－初期投資額＝2,000－初期投資額。ASP>自社より1,000>2,000－初期投資額、初期投資額>1,000万円。","has_choices":true},{"year":"令和5年度","num":"問5","answer":"エ","question":"企業でのRPAの活用方法として、最も適切なものはどれか。","choices":{"ア":"M&Aによる事業拡大を図る。","イ":"個人の嗜好に合わせた最適なサービスを提供する。","ウ":"大量のデータから規則性や関係性を抽出する。","エ":"繰り返し行われるPC上の定型的な事務作業を自動化する。"},"explanation":"RPA（ロボティックプロセスオートメーション）は、PC上の定型的・反復的な事務作業をソフトウェアロボットで自動化する技術。M&Aは経営戦略、個人の嗜好に合わせたサービスはレコメンドシステム、大量データからの規則性抽出はAI・データマイニングの活用。","has_choices":true},{"year":"令和5年度","num":"問6","answer":"ウ","question":"A社では、顧客の行動や天候、販売店のロケーションなどの多くの項目から成るデータを取得している。これらのデータを分析することによって販売数量の変化を説明することを考える。その際、説明に使用するパラメータをできるだけ少数に絞りたい。このときに用いる分析法として、最も適切なものはどれか。","choices":{"ア":"ABC分析","イ":"クラスター分析","ウ":"主成分分析","エ":"相関分析"},"explanation":"主成分分析は、多くの変数（パラメータ）を少数の主成分に集約して情報を圧縮する統計手法。ABC分析は重要度ランキング、クラスター分析はグループ分け、相関分析は2変数の関係性分析。","has_choices":true},{"year":"令和5年度","num":"問7","answer":"ア","question":"経営戦略に基づいて策定される情報システム戦略の責任者として、最も適切なものはどれか。","choices":{"ア":"CIO","イ":"基幹システムの利用部門の部門長","ウ":"システム開発プロジェクトマネージャ","エ":"システム企画担当者"},"explanation":"CIO（Chief Information Officer：最高情報責任者）は、経営戦略に基づいて情報システム戦略を策定・推進する責任者。基幹システムの部門長は利用側、システム開発PMはプロジェクト単位、システム企画担当者は実務レベル。","has_choices":true},{"year":"令和5年度","num":"問8","answer":"イ","question":"A社の営業部門では、成約件数を増やすことを目的として、営業担当者が企画を顧客に提案する活動を始めた。この営業活動の達成度を測るための指標としてKGIとKPIを定めたい。本活動におけるKGIとKPIの組合せとして、最も適切なものはどれか。","choices":{"ア":"KGI：成約件数　KPI：売上高","イ":"KGI：成約件数　KPI：提案件数","ウ":"KGI：提案件数　KPI：提案件数","エ":"KGI：提案件数　KPI：売上高"},"explanation":"KGI（Key Goal Indicator）は最終目標指標、KPI（Key Performance Indicator）は中間プロセス指標。目的が「成約件数を増やす」ことなのでKGI＝成約件数。営業担当者が行う提案活動の指標としてKPI＝提案件数が適切。","has_choices":true},{"year":"令和5年度","num":"問9","answer":"イ","question":"ソーシャルメディアポリシーを制定する目的として、適切なものだけを全て挙げたものはどれか。a 企業がソーシャルメディアを使用する際の心得やルールなどを取り決めて、社外の人々が理解できるようにするため b 企業に属する役員や従業員が、公私限らずにソーシャルメディアを使用する際のルールを示すため c ソーシャルメディアが企業に対して取材や問合せを行う際の条件や窓口での取扱いのルールを示すため","choices":{"ア":"aのみ","イ":"a, b","ウ":"a, b, c","エ":"b, c"},"explanation":"ソーシャルメディアポリシーの制定目的はaとb。aは対外的な企業の姿勢明示、bは従業員のSNS利用ルール。cは報道・取材対応は「メディアポリシー」の領域であり、ソーシャルメディアポリシーの目的には含まれない。","has_choices":true},{"year":"令和5年度","num":"問10","answer":"エ","question":"フォーラム標準に関する記述として、最も適切なものはどれか。","choices":{"ア":"工業製品の品質保証を目的として公的機関が制定した規格である。","イ":"特定の企業が開発し業界で広く使われるようになった規格である。","ウ":"特定分野の標準化を目指す企業が集まり設立した団体が策定した規格である。","エ":"特定分野に関心ある複数の企業などが集まり結成した組織で作った規格である。"},"explanation":"フォーラム標準とは、特定の分野に関心のある複数の企業などが集まって結成した組織が、規格として作ったもの（例：W3C、OASISなど）。工業製品の品質保証は規格認証、公的機関が制定するのはデジュール標準、企業が開発し広まったものはデファクトスタンダード。","has_choices":true},{"year":"令和5年度","num":"問11","answer":"ウ","question":"IoTやAIといったITを活用し、戦略的にビジネスモデルの刷新や新たな付加価値を生み出していくことなどを示す言葉として、最も適切なものはどれか。","choices":{"ア":"デジタルサイネージ","イ":"デジタルディバイド","ウ":"デジタルトランスフォーメーション","エ":"デジタルネイティブ"},"explanation":"デジタルトランスフォーメーション（DX）は、デジタル技術を活用してビジネスモデル・組織・プロセスを変革し新たな価値を創出すること。デジタルサイネージは電子看板、デジタルディバイドはIT格差、デジタルネイティブはデジタル環境で育った世代。","has_choices":true},{"year":"令和5年度","num":"問12","answer":"ウ","question":"スマートフォンに内蔵された非接触型ICチップと外部のRFIDリーダーによって、実現しているサービスの事例だけを全て挙げたものはどれか。a 移動中の通話の際に基地局を自動的に切り替えて通話を保持する b 駅の自動改札を通過する際の定期券として利用する c 海外でも国内と同じ電子メールなどのサービスを利用する d 決済手続情報を得るためにQRコードを読み込む","choices":{"ア":"a, b, c, d","イ":"a, b, d","ウ":"b","エ":"b, d"},"explanation":"非接触型ICチップとRFIDリーダーを組み合わせたサービスはbの電子定期券のみ。aはハンドオーバー（基地局切替）、cはローミング、dはQRコード（光学読取）でいずれもRFID技術ではない。","has_choices":true},{"year":"令和5年度","num":"問13","answer":"エ","question":"ある製品の今月の売上高と費用は表のとおりであった。販売単価を1,000円から800円に変更するとき、赤字にならないためには少なくとも毎月何個を販売する必要があるか。固定費及び製品1個当たりの変動費は変化しないものとする。（固定費600,000円、1個当たりの変動費700円）","choices":{"ア":"3,000","イ":"4,000","ウ":"5,000","エ":"6,000"},"explanation":"新単価800円の場合、1個当たり貢献利益＝800－700＝100円。損益分岐点個数＝固定費÷貢献利益＝600,000÷100＝6,000個。","has_choices":true},{"year":"令和5年度","num":"問14","answer":"ア","question":"AIの活用領域の一つである自然言語処理が利用されている事例として、適切なものだけを全て挙げたものはどれか。a Webサイト上で、日本語の文章を入力すると即座に他言語に翻訳される。b 災害時にSNSに投稿された文字情報をリアルタイムで収集し、地名と災害情報などを解析して被災状況を把握する。c スマートスピーカーを利用して、音声によって家電の操作や音楽の再生を行う。d 駐車場の出入口に設置したカメラでナンバープレートを撮影して、文字認識処理をし、精算済みの車両がゲートに近付くと自動で開く。","choices":{"ア":"a, b, c","イ":"a, b, d","ウ":"a, c, d","エ":"b, c, d"},"explanation":"自然言語処理（NLP）が利用されているのはa（機械翻訳）、b（テキスト解析）、c（音声認識＋自然言語理解）。dはOCR（光学文字認識）であり自然言語処理ではない。","has_choices":true},{"year":"令和5年度","num":"問15","answer":"イ","question":"パスワードに関連した不適切な行為a〜dのうち、不正アクセス禁止法で規制されている行為だけを全て挙げたものはどれか。a 業務を代行してもらうために、社内データベースアクセス用の自分のIDとパスワードを同僚に伝えた。b 自分のPCに、社内データベースアクセス用の自分のパスワードのメモを貼り付けた。c 電子メールに添付されていた文書をPCに取り込んだ。その文書の閲覧用パスワードを、その文書を見る権利のない人に教えた。d 人気のショッピングサイトに登録されている他人のIDとパスワードを、無断で第三者に伝えた。","choices":{"ア":"a, b, c, d","イ":"a, c, d","ウ":"a, d","エ":"d"},"explanation":"不正アクセス禁止法で規制されているのはa（識別符号の不正提供：同僚へID・パスワードを伝えた）、c（アクセス制御に係る識別符号の不正提供：権限外の人に文書パスワードを教えた）、d（他人の識別符号の不正提供：他人のID・パスワードを第三者に伝えた）。bは自分のパスワード管理の問題で同法の規制対象外。","has_choices":true},{"year":"令和5年度","num":"問16","answer":"エ","question":"コールセンターにおける電話応対業務において、AIを活用し、より有効なFAQシステムを実現する事例として、最も適切なものはどれか。","choices":{"ア":"FAQシステムで新入社員の研修コンテンツを作成する。","イ":"IVRで問合せを特定の担当グループへ振り分ける。","ウ":"顧客DBと連携して顧客情報を画面に表示する。","エ":"音声認識で顧客の質問と感情を把握し最適な回答候補を提示する。"},"explanation":"AIを活用した有効なFAQシステムは、電話応対時に質問の音声から感情と内容を読み取って解析し、FAQから最適な回答候補を選び出す確度を高めるもの。アは研修用コンテンツ、イはIVRによる振分け、ウはCTIによる顧客情報表示で、いずれもAI活用のFAQシステムではない。","has_choices":true},{"year":"令和5年度","num":"問17","answer":"ウ","question":"ITの進展や関連するサービスの拡大によって、様々なデータやツールを自社のビジネスや日常の業務に利用することが可能となっている。このようなデータやツールを課題解決などのために適切に活用できる能力を示す用語として、最も適切なものはどれか。","choices":{"ア":"アクセシビリティ","イ":"コアコンピタンス","ウ":"情報リテラシー","エ":"デジタルディバイド"},"explanation":"情報リテラシーとは、情報を正しく収集・分析・活用する能力。アクセシビリティはITの利用しやすさ、コアコンピタンスは企業の中核的強み、デジタルディバイドはIT格差。","has_choices":true},{"year":"令和5年度","num":"問18","answer":"ウ","question":"EUの一般データ保護規則（GDPR）に関する記述として、適切なものだけを全て挙げたものはどれか。a EU域内に拠点がある事業者が、EU域内に対してデータやサービスを提供している場合は、適用の対象となる。b EU域内に拠点がある事業者が、アジアや米国などEU域外に対してデータやサービスを提供している場合は、適用の対象とならない。c EU域内に拠点がない事業者が、アジアや米国などEU域外に対してだけデータやサービスを提供している場合は、適用の対象とならない。d EU域内に拠点がない事業者が、アジアや米国などから EU域内に対してデータやサービスを提供している場合は、適用の対象とならない。","choices":{"ア":"aのみ","イ":"a, b","ウ":"a, c","エ":"a, b, c, d"},"explanation":"GDPRはEU域内の個人データ保護規則。aは正しい（EU拠点→EU向けは適用）。cは正しい（EU域外拠点→EU域外のみは適用外）。bは誤り（EU拠点事業者はEU域外向けサービスも対象となりうる）。dは誤り（EU域外拠点でもEU域内向けサービスは対象）。","has_choices":true},{"year":"令和5年度","num":"問19","answer":"ウ","question":"住宅地に設置してある飲料の自動販売機に組み込まれた通信機器と、遠隔で自動販売機を監視しているコンピュータが、ネットワークを介してデータを送受信することによって在庫管理を実現するような仕組みがある。このように、機械同士がネットワークを介して互いに情報をやり取りすることによって、自律的に高度な制御や動作を行う仕組みはどれか。","choices":{"ア":"MOT","イ":"MRP","ウ":"M2M","エ":"O2O"},"explanation":"M2M（Machine to Machine）は、機械同士がネットワークを介して自律的に情報をやり取りし、高度な制御・動作を行う仕組み。MOTは技術経営、MRPは資材所要量計画、O2Oはオンラインとオフラインの連携マーケティング。","has_choices":true},{"year":"令和5年度","num":"問20","answer":"ウ","question":"資本活用の効率性を示す指標はどれか。","choices":{"ア":"売上高営業利益率","イ":"自己資本比率","ウ":"総資本回転率","エ":"損益分岐点比率"},"explanation":"総資本回転率（＝売上高÷総資産）は、投下した資本（総資産）を使って売上をどれだけ効率よく上げているかを示す指標。売上高営業利益率は収益性指標、自己資本比率は財務安全性指標、損益分岐点比率も収益性指標。","has_choices":true},{"year":"令和5年度","num":"問21","answer":"ウ","question":"フリーミアムの事例として、適切なものはどれか。","choices":{"ア":"一定期間の交通機関の定額乗り放題パス","イ":"インターネット上のコンテンツの無料ダウンロード","ウ":"名刺管理サービスの基本機能を無料・上位機能を有料で提供","エ":"広告収入のみで運用する無料Webサービス"},"explanation":"フリーミアムは、基本機能を無料提供し追加機能を有料提供するビジネスモデル。名刺管理サービスの基本機能無料・追加機能有料がフリーミアムの典型例。定額パスは完全有料、無料ダウンロードのみは別モデル、広告収入型は別モデル。","has_choices":true},{"year":"令和5年度","num":"問22","answer":"ウ","question":"資金決済法における前払式支払手段に該当するものはどれか。","choices":{"ア":"インターネットバンキングから振り込む","イ":"業務用システムで管理する暗号資産で支払う","ウ":"全国の商店などで使える使用期限のない商品券で支払う","エ":"ポイントカードのポイントで支払う"},"explanation":"前払式支払手段とは、代金を前払いして発行される支払手段。全国のデパートや商店などで共通に利用可能な使用期限のない商品券が該当。Webサイト振込はインターネットバンキング、暗号資産は別種、ポイントは後払い・後給付。","has_choices":true},{"year":"令和5年度","num":"問23","answer":"イ","question":"OMG（Object Management Group）によって維持されており、国際規格ISO/IEC 19510として標準化されているビジネスプロセスのモデリング手法及び表記法はどれか。","choices":{"ア":"BABOK","イ":"BPMN","ウ":"BPO","エ":"BPR"},"explanation":"BPMN（Business Process Model and Notation）は、OMGが策定しISO/IEC 19510として標準化されたビジネスプロセスのモデリング・表記法。BABOKはビジネスアナリシスの知識体系、BPOは業務外部委託、BPRは業務改革。","has_choices":true},{"year":"令和5年度","num":"問24","answer":"ア","question":"需要量が年間を通じて安定している場合において、定量発注方式に関する記述として、最も適切なものはどれか。","choices":{"ア":"最適な発注量は、発注費用と在庫維持費用の総額が最小となる場合である。","イ":"発注回数が多いほど商品を保管するスペースを広くする必要がある。","ウ":"発注は毎週金曜日、毎月末など、決められた同じサイクルで行われる。","エ":"毎回需要予測に基づき発注が行われる。"},"explanation":"定量発注方式の最適発注量（EOQ：Economic Order Quantity）は、発注費用と在庫維持費用の合計が最小となる発注量。イは誤り（発注回数が多いほど在庫量は少なくなり保管スペースは小さくてよい）。ウ・エは定期発注方式の特徴。","has_choices":true},{"year":"令和5年度","num":"問25","answer":"イ","question":"企業の行為に関する記述a〜cのうち、コンプライアンスにおいて問題となるおそれのある行為だけを全て挙げたものはどれか。a 新商品の名称を消費者に浸透させるために、誰でも応募ができて、商品名の一部を答えさせるだけの簡単なクイズを新聞や自社ホームページ、雑誌などに広く掲載し、応募者の中から抽選で現金10万円が当たるキャンペーンを実施した。b 人気のあるWebサイトを運営している企業が、広告主から宣伝の依頼があった特定の商品を好意的に評価する記事を、広告であることを表示することなく一般の記事として掲載した。c フランスをイメージしてデザインしたバッグを国内で製造し、原産国の国名は記載せず、パリの風景写真とフランス国旗だけを印刷したタグを添付して、販売した。","choices":{"ア":"aのみ","イ":"a, b, c","ウ":"b, c","エ":"cのみ"},"explanation":"コンプライアンス違反のおそれがあるのはaとb、c。aは景品表示法（過大景品規制）、bはステルスマーケティング（景品表示法）、cは原産国の誤認を招く不当表示（景品表示法・不正競争防止法）。","has_choices":true},{"year":"令和5年度","num":"問26","answer":"イ","question":"組立製造販売業A社では経営効率化の戦略として、部品在庫を極限まで削減するためにかんばん方式を導入することにした。この戦略実現のために、A社が在庫管理システムとオンラインで連携させる情報システムとして、最も適切なものはどれか。","choices":{"ア":"生産管理システム","イ":"部品購買システム","ウ":"販売管理システム","エ":"給与システム"},"explanation":"かんばん方式（JIT）では、生産指示と部品調達を連携させる必要がある。部品購買システムと在庫管理システムを連携させることで、適時適量の部品発注が可能になる。","has_choices":true},{"year":"令和5年度","num":"問27","answer":"イ","question":"ファミリーレストランチェーンA社では、店舗の運営戦略を検討するために、店舗ごとの座席数、客単価及び売上高の三つの要素の関係を分析することにした。各店舗の三つの要素を、一つの図表で全店舗分可視化するときに用いる図表として、最も適切なものはどれか。","choices":{"ア":"ガントチャート","イ":"バブルチャート","ウ":"マインドマップ","エ":"ロードマップ"},"explanation":"バブルチャートは、x軸・y軸・円の大きさの3変数を一つの図で可視化できる図表。3要素の関係を全店舗分一目で把握するのに最適。ガントチャートはスケジュール管理、マインドマップは思考整理、ロードマップは計画表示。","has_choices":true},{"year":"令和5年度","num":"問28","answer":"ア","question":"AIを開発するベンチャー企業のA社が、資金調達を目的に、金融商品取引所に初めて上場することになった。このように、企業の未公開の株式を、新たに公開することを表す用語として、最も適切なものはどれか。","choices":{"ア":"IPO","イ":"LBO","ウ":"TOB","エ":"VC"},"explanation":"IPO（Initial Public Offering：新規株式公開）は、未上場企業が初めて証券取引所に株式を公開すること。LBOは借入による買収、TOBは株式公開買い付け、VCはベンチャーキャピタル（投資会社）。","has_choices":true},{"year":"令和5年度","num":"問29","answer":"エ","question":"不正な販売行為を防ぐために、正当な理由なく映像ソフトのコピープロテクトを無効化するプログラムの販売行為を規制している法律はどれか。","choices":{"ア":"商標法","イ":"特定商取引法","ウ":"不正アクセス禁止法","エ":"不正競争防止法"},"explanation":"コピープロテクトの無効化プログラムの販売を規制しているのは不正競争防止法（技術的制限手段の無効化）。商標法は商標保護、特定商取引法は通信販売規制、不正アクセス禁止法は不正アクセス行為規制。","has_choices":true},{"year":"令和5年度","num":"問30","answer":"ア","question":"犯罪によって得た資金を正当な手段で得たように見せかける行為を防ぐために、金融機関などが実施する取組を表す用語として、最も適切なものはどれか。","choices":{"ア":"AML","イ":"インサイダー取引規制","ウ":"スキミング","エ":"フィッシング"},"explanation":"AML（Anti-Money Laundering：マネーロンダリング対策）は、犯罪収益を合法的な資金に見せかける行為（マネーロンダリング）を防止する取り組み。インサイダー取引規制は内部者取引規制、スキミングはカード情報窃取、フィッシングは詐欺メール。","has_choices":true},{"year":"令和5年度","num":"問31","answer":"ア","question":"様々な企業のシステム間を連携させる公開されたインタフェースを通じて、データやソフトウェアを相互利用し、それらの企業との協業を促進しながら新しいサービスを創出することなどで、ビジネスを拡大していく仕組みを表す用語として、最も適切なものはどれか。","choices":{"ア":"APIエコノミー","イ":"アウトソーシング","ウ":"シェアリングエコノミー","エ":"プロセスイノベーション"},"explanation":"APIエコノミーは、企業が公開したAPIを通じてデータ・機能を相互利用し、協業・新サービス創出によりビジネスを拡大するエコシステム。アウトソーシングは外部委託、シェアリングエコノミーは遊休資産共有、プロセスイノベーションは業務プロセス革新。","has_choices":true},{"year":"令和5年度","num":"問32","answer":"エ","question":"新システムの導入を予定している企業や官公庁などが作成するRFPの説明として、最も適切なものはどれか。","choices":{"ア":"ベンダー企業から情報収集を行い、システムの技術的な課題や実現性を把握するもの","イ":"ベンダー企業と発注者で新システムに求められる性能要件などを定義するもの","ウ":"ベンダー企業と発注者との間でサービス品質のレベルに関する合意事項を列挙したもの","エ":"ベンダー企業にシステムの導入目的や機能概要などを示し、提案書の提出を求めるもの"},"explanation":"RFP（Request For Proposal：提案依頼書）は、システム導入目的・機能概要・要件などをベンダー企業に提示し、提案書の提出を依頼する文書。アはRFI（情報提供依頼書）、イは要件定義書、ウはSLA（サービスレベル合意書）の説明。","has_choices":true},{"year":"令和5年度","num":"問33","answer":"イ","question":"製品Aを1個生産するのに部品aが2個、部品bが1個必要である。部品aは1回の発注数量150個、調達期間1週間、部品bは1回の発注数量100個、調達期間2週間の購買部品である。製品Aの6週間の生産計画と、部品a、部品bの1週目の手持在庫が表のとおりであるとき、遅くとも何週目に部品を発注する必要があるか。（部品aの手持在庫250個、部品bの手持在庫150個）","choices":{"ア":"2週目","イ":"3週目","ウ":"4週目","エ":"5週目"},"explanation":"部品b（調達期間2週間）の発注タイミング分析：1週目手持在庫150個。2週目から生産開始で毎週40個×1個＝40個消費。150個÷40個＝3.75週分の在庫。3週目末に在庫が不足するため、2週目発注が必要（調達期間2週間後の4週目に納品）。3週目に発注すると5週目納品で4週目に在庫切れ。よって遅くとも3週目に発注。","has_choices":true},{"year":"令和5年度","num":"問34","answer":"エ","question":"記述a〜cのうち、「人間中心のAI社会原則」において、AIが社会に受け入れられ、適正に利用されるために、社会が留意すべき事項として記されているものだけを全て挙げたものはどれか。a AIの利用に当たっては、人が利用方法を判断し決定するのではなく、AIが自律的に判断決定できるように、AIそのものを高度化しなくてはならない。b AIの利用は、憲法及び国際的な規範の保障する基本的人権を侵すものであってはならない。c AIを早期に普及させるために、まず高度な情報リテラシーを保有する者に向けたシステムを実現し、その後、情報弱者もAIの恩恵を享受できるシステムを実現するよう、段階的に発展させていかなくてはならない。","choices":{"ア":"a, b","イ":"a, b, c","ウ":"b","エ":"b, c"},"explanation":"「人間中心のAI社会原則」の留意事項として適切なのはbとc。aは誤り（AIが自律判断するのではなく人間が判断・決定することが原則）。bは正しい（基本的人権の尊重）。cは正しい（情報弱者も含めた段階的な普及）。","has_choices":true},{"year":"令和5年度","num":"問35","answer":"ア","question":"第4次産業革命に関する記述として、最も適切なものはどれか。","choices":{"ア":"医療・インフラ・交通などでIoTやAIを活用してサービスの自動化や向上を図る。","イ":"産業用ロボット導入などで工場の生産ラインを大きく変革する。","ウ":"ベルトコンベア導入などで作業の分業化・効率化を図る。","エ":"蒸気機関の発明などで手工業から機械工業へと工業化が進んだ。"},"explanation":"第4次産業革命は、IoT・AI・ビッグデータなどのデジタル技術による産業変革。医療・インフラ・交通などでインターネットやAIを活用してサービスの自動化・質の向上を図ることが特徴。産業用ロボットは第3次産業革命、ベルトコンベアは第2次産業革命、蒸気機関は第1次産業革命。","has_choices":true},{"year":"令和5年度","num":"問36","answer":"ア","question":"サービスデスクの業務改善に関する記述のうち、最も適切なものはどれか。","choices":{"ア":"問合せの内容と回答・所要時間などを記録して分析する。","イ":"障害への一時的な回避策として同じ処置を繰り返す。","ウ":"問合せの種類に応じて受付窓口を細分化する。","エ":"重要度にかかわらず受付順に優先度を設ける。"},"explanation":"サービスデスクの業務改善として、問合せ内容・回答・所要時間などを記録して分析することが有効。障害への一時的回避策は根本原因の解決の妨げになりうる、窓口の細分化は混乱を招く可能性がある、重要度より受付順は非効率。","has_choices":true},{"year":"令和5年度","num":"問37","answer":"ア","question":"システム監査人の行動規範に関して、次の記述中のa, bに入れる字句の適切な組合せはどれか。システム監査人は、監査対象となる組織と同一の指揮命令系統に属していないなど、[a]上の独立性が確保されている必要がある。また、システム監査人は[b]立場で公正な判断を行うという精神的な態度が求められる。","choices":{"ア":"a:外観、b:客観的な","イ":"a:外観、b:主観的な","ウ":"a:精神、b:客観的な","エ":"a:精神、b:主観的な"},"explanation":"システム監査人の独立性に関する記述。a＝外観（組織上の独立性）、b＝客観的な（精神的独立性）。システム監査人は「外観上の独立性」と「客観的な立場での公正な判断」が求められる。","has_choices":true},{"year":"令和5年度","num":"問38","answer":"イ","question":"システム開発プロジェクトの品質目標を検討するために、複数の類似プロジェクトのプログラムステップ数と不良件数の関係性を示す図として、適切なものはどれか。","choices":{"ア":"管理図","イ":"散布図","ウ":"特性要因図","エ":"パレート図"},"explanation":"散布図（相関図）は、2つの変数の関係性を点で表した図。プログラムステップ数と不良件数の相関関係を可視化するのに適切。管理図はプロセスの変動管理、特性要因図は原因分析、パレート図は不良の頻度順整理。","has_choices":true},{"year":"令和5年度","num":"問39","answer":"ウ","question":"運用中のソフトウェアの仕様書がないので、ソースコードを解析してプログラムの仕様書を作成した。この手法を何というか。","choices":{"ア":"コードレビュー","イ":"デザインレビュー","ウ":"リバースエンジニアリング","エ":"リファクタリング"},"explanation":"リバースエンジニアリングとは、既存のソフトウェア・製品を解析して仕様・設計情報を復元する手法。コードレビューはコード品質確認、デザインレビューは設計品質確認、リファクタリングは機能を変えずにコードを改善。","has_choices":true},{"year":"令和5年度","num":"問40","answer":"ウ","question":"ソフトウェア開発におけるDevOpsに関する記述として、最も適切なものはどれか。","choices":{"ア":"確認用ソフトウェアを作成し利用者の評価を受けながら開発を進める。","イ":"共通フレーム適用で要件定義・設計などの工程名と作成文書を定義する。","ウ":"開発側と運用側が密接に連携し自動化ツールなどを活用して仕様変更に迅速対応する。","エ":"2人1組で1つのプログラムを作成するなどチームワークを重視して開発する。"},"explanation":"DevOpsは、開発（Development）と運用（Operations）チームが密接に連携し、CI/CDなどの自動化ツールを活用して仕様変更要求などに迅速かつ柔軟に対応する手法。プロトタイプ作成は要件定義手法、ウォーターフォールは順次開発、ペアプログラミングはXPの手法。","has_choices":true},{"year":"令和5年度","num":"問41","answer":"ウ","question":"次のアローダイアグラムに基づき作業を行った結果、作業Dが2日遅延し、作業Fが3日前倒しで完了した。作業全体の所要日数は予定と比べてどれくらい変化したか。","choices":{"ア":"3日遅延","イ":"1日前倒し","ウ":"2日前倒し","エ":"3日前倒し"},"explanation":"元のクリティカルパス：A→C→F＝2+4+5＝11日。作業D2日遅延：B→D→F＝3+(3+2)+(5-3)＝10日。作業F3日前倒し：A→C→F＝2+4+(5-3)＝8日。B→E→G＝3+1+5＝9日が新クリティカルパス。元11日→9日で2日前倒し。","has_choices":true},{"year":"令和5年度","num":"問42","answer":"エ","question":"ソフトウェア開発における、テストに関する記述a〜cとテスト工程の適切な組合せはどれか。a 運用予定時間内に処理が終了することを確認する。b ソフトウェア間のインタフェースを確認する。c プログラムの内部パスを網羅的に確認する。","choices":{"ア":"a:単体テスト、b:結合テスト、c:システムテスト","イ":"a:結合テスト、b:単体テスト、c:システムテスト","ウ":"a:単体テスト、b:システムテスト、c:結合テスト","エ":"a:システムテスト、b:結合テスト、c:単体テスト"},"explanation":"単体テスト＝c（プログラム内部パスの確認）、結合テスト＝b（ソフトウェア間インタフェースの確認）、システムテスト＝a（運用要件・性能の確認）。","has_choices":true},{"year":"令和5年度","num":"問43","answer":"エ","question":"ソフトウェア導入作業に関する記述a〜dのうち、適切なものだけを全て挙げたものはどれか。a 新規開発の場合、導入計画書の作成はせず、期日までに速やかに導入する。b ソフトウェア導入作業を実施した後、速やかに導入計画書と導入報告書を作成し、合意を得る必要がある。c ソフトウェアを自社開発した場合、影響範囲が社内になるので導入計画書の作成後に導入し、導入計画書の合意は導入後に行う。d 本番稼働中のソフトウェアに機能追加する場合、機能追加したソフトウェアの導入計画書を作成し、合意を得てソフトウェア導入作業を実施する。","choices":{"ア":"aのみ","イ":"a, b","ウ":"b, c","エ":"dのみ"},"explanation":"適切なのはdのみ。本番稼働中への機能追加は、導入計画書作成・合意取得後に実施するのが正しい手順。aは導入計画書省略は不適切、bは事後報告書作成は正しいが「速やかに計画書作成」は事後では不適切、cは合意後に導入するのが正しい順序。","has_choices":true},{"year":"令和5年度","num":"問44","answer":"ウ","question":"A社のIT部門では、ヘルプデスクのサービス可用性の向上を図るために、対応時間を24時間に拡大することを検討している。ヘルプデスク業務をA社から受託しているB社は、これを実現するためにチャットボットをB社に導入して活用することによって、深夜時間帯は自動応答で対応する旨を提案したところ、A社は24時間対応が可能であるのでこれに合意した。この合意に用いる文書として、最も適切なものはどれか。","choices":{"ア":"BCP","イ":"NDA","ウ":"SLA","エ":"SLM"},"explanation":"SLA（Service Level Agreement：サービスレベル合意書）は、ITサービスの提供者と顧客が、サービス品質・提供条件（可用性・応答時間等）について合意した文書。BCP（事業継続計画）、NDA（秘密保持契約）、SLM（サービスレベル管理）とは異なる。","has_choices":true},{"year":"令和5年度","num":"問45","answer":"ア","question":"プロジェクトマネジメントでは、スケジュール、コスト、品質といった競合する制約条件のバランスをとることが求められる。計画していた開発スケジュールを短縮することになった場合の対応として、適切なものはどれか。","choices":{"ア":"開発に必要な要員を追加する。","イ":"開発するシステムをより高機能にする。","ウ":"スコープを拡大して開発機能を増やす。","エ":"プロジェクトメンバーを削減してコストを削減する。"},"explanation":"スケジュール短縮の典型的対応は、コストを増加させてでも（資源追加）スケジュールを遵守する「クラッシング」。システムの高機能化・スコープ拡大・メンバー削減はいずれもスケジュール短縮に逆効果。","has_choices":true},{"year":"令和5年度","num":"問46","answer":"ウ","question":"ITサービスに関する指標には、ITサービスが利用できなくなるインシデントの発生間隔の平均時間であるMTBSI（Mean Time Between Service Incidents）があり、サービスの中断の発生しにくさを表す。ITサービスにおいてMTBSIの改善を行っている事例として、最も適切なものはどれか。","choices":{"ア":"インシデントへの対応記録をデータベース化する。","イ":"オペレーターの対応メニューを増やす。","ウ":"ネットワークを二重化してネットワーク障害の発生頻度を低下させる。","エ":"問合せへの対応要員を増やす。"},"explanation":"MTBSI改善（インシデント発生間隔を延ばす）には、根本的な障害の減少が必要。ネットワークの二重化でネットワーク障害の発生頻度を低下させることがMTBSI改善に直結。インシデント対応データベース整備はMTTR（修復時間）改善、メニュー増加は可用性指標と無関係、要員増加は応答時間改善。","has_choices":true},{"year":"令和5年度","num":"問47","answer":"ア","question":"あるホスティングサービスのSLAの内容にa〜cがある。これらと関連するITサービスマネジメントの管理との適切な組合せはどれか。a サーバが稼働している時間 b ディスクの使用量が設定したしきい値に達したことを検出した後に、指定された担当者に通知するまでの時間 c 不正アクセスの検知後に、指定された担当者に通知するまでの時間","choices":{"ア":"a:サービス可用性管理、b:容量・能力管理、c:情報セキュリティ管理","イ":"a:サービス可用性管理、b:情報セキュリティ管理、c:容量・能力管理","ウ":"a:情報セキュリティ管理、b:サービス可用性管理、c:容量・能力管理","エ":"a:容量・能力管理、b:情報セキュリティ管理、c:サービス可用性管理"},"explanation":"a（サーバ稼働時間）→サービス可用性管理、b（ディスク使用量しきい値の通知時間）→容量・能力管理、c（不正アクセス検知後の通知時間）→情報セキュリティ管理。","has_choices":true},{"year":"令和5年度","num":"問48","answer":"エ","question":"システム環境整備に関する次の記述中のa, bに入れる字句の適切な組合せはどれか。企業などがシステム環境である建物や設備などの資源を最善の状態に保つ考え方として[a]がある。その考え方を踏まえたシステム環境整備の施策として、突発的な停電が発生したときにサーバに一定時間電力を供給する機器である[b]の配備などがある。","choices":{"ア":"a:サービスレベルマネジメント、b:IPS","イ":"a:サービスレベルマネジメント、b:UPS","ウ":"a:ファシリティマネジメント、b:IPS","エ":"a:ファシリティマネジメント、b:UPS"},"explanation":"a＝ファシリティマネジメント（施設・設備を最善の状態に維持管理する考え方）、b＝UPS（Uninterruptible Power Supply：無停電電源装置）。サービスレベルマネジメントはSLAの管理。IPS（不正侵入防止システム）はセキュリティ機器。","has_choices":true},{"year":"令和5年度","num":"問49","answer":"ア","question":"リファクタリングの説明として、適切なものはどれか。","choices":{"ア":"機能仕様を変えずに内部プログラムを改善する。","イ":"ソースコードを解析して仕様書を作成する。","ウ":"バグを修正してソフトウェアを仕様通りの動作に改善する。","エ":"利用者の要求に基づいてソフトウェアに機能を追加する。"},"explanation":"リファクタリングとは、ソフトウェアが提供する機能仕様を変えずに、内部構造（コードの可読性・保守性）を改善すること。リバースエンジニアリングは仕様の逆解析、バグ修正は仕様通りに動くための修正、機能追加は仕様変更を伴う。","has_choices":true},{"year":"令和5年度","num":"問50","answer":"ア","question":"内部統制において、不正防止を目的とした職務分掌に関する事例として、最も適切なものはどれか。","choices":{"ア":"申請者は自身の申請を承認できないようにする。","イ":"申請部署と承認部署の役員を兼務させる。","ウ":"一つの業務を複数の担当者が手分けして行う。","エ":"一つの業務を複数の部署で分散して行う。"},"explanation":"職務分掌（Segregation of Duties）は、不正防止のため申請・承認などを別々の担当者・部署に分離すること。申請者が自身の申請を承認できないようにすることが典型例。イの兼務は職務分掌に反する。","has_choices":true},{"year":"令和5年度","num":"問51","answer":"エ","question":"ITサービスマネジメントにおいて、過去のインシデントの内容をFAQとしてデータベース化した。それによって改善が期待できる項目に関する記述a〜cのうち、適切なものだけを全て挙げたものはどれか。a ITサービスに関連する構成要素の情報を必要な場合にいつでも確認できる。b 要員候補の業務経歴を確認し、適切な要員配置計画を立案できる。c 利用者からの問合せに対する一次回答率が高まる。","choices":{"ア":"aのみ","イ":"a, b","ウ":"b, c","エ":"cのみ"},"explanation":"FAQデータベース化により改善が期待できるのはcのみ。過去インシデントのFAQ化によりオペレーターが問合せに即答できるようになり一次回答率が向上。aは構成管理DB（CMDB）、bは人材管理システムの役割。","has_choices":true},{"year":"令和5年度","num":"問52","answer":"ウ","question":"会計監査の目的として、最も適切なものはどれか。","choices":{"ア":"財務諸表の監査を行うこと","イ":"IT統制の有効性を評価すること","ウ":"会計業務が組織の方針に従って合理的かつ効率的に運用されているか確認すること","エ":"情報セキュリティリスクを評価すること"},"explanation":"会計監査は、組織内の会計業務などを含む諸業務が組織の方針に従って、合理的かつ効率的な運用が実現されていることを確認することが目的。IT監査はITリスク管理、情報セキュリティ監査はセキュリティリスク管理が目的。","has_choices":true},{"year":"令和5年度","num":"問53","answer":"ア","question":"ITが適切に活用されるために企業が実施している活動を、ルールを決める活動と、ルールに従って行動する活動に分けたとき、ルールを決める活動に該当するものはどれか。","choices":{"ア":"IT投資に関する判断基準の確立","イ":"SLAを遵守するための日常のオペレーション管理","ウ":"システム開発プロジェクトの予算管理","エ":"システムの運用担当者によるプロジェクト推進"},"explanation":"ITガバナンスで「ルールを決める活動」に該当するのはIT投資判断基準の確立（方針・基準の策定）。SLA遵守のためのオペレーション管理・予算管理・プロジェクト推進はいずれも「ルールに従って行動する活動」。","has_choices":true},{"year":"令和5年度","num":"問54","answer":"エ","question":"システム開発のプロジェクトマネジメントに関する記述a〜dのうち、スコープのマネジメントの失敗事例だけを全て挙げたものはどれか。a 開発に必要な人件費を過少に見積もったので、予算を超過した。b 開発の作業に必要な期間を短く設定したので、予定期間で開発を完了させることができなかった。c 作成する機能の範囲をあらかじめ決めずにプロジェクトを開始したので、開発期間を超過した。d プロジェクトで実施すべき作業が幾つか計画から欠落していたので、システムを完成できなかった。","choices":{"ア":"a, b","イ":"a, c","ウ":"b, c","エ":"c, d"},"explanation":"スコープマネジメント（成果物・作業範囲の管理）の失敗はcとd。c（機能範囲未定義）とd（作業の欠落）がスコープ管理の失敗。aはコスト見積りの失敗、bはスケジュール管理の失敗。","has_choices":true},{"year":"令和5年度","num":"問55","answer":"イ","question":"ソフトウェア開発の仕事に対し、10名が15日間で完了する計画を立てた。しかし、仕事開始日から5日間は、8名しか要員を確保できないことが分かった。計画どおり15日間で仕事を完了させるためには、6日目以降は何名の要員が必要か。ここで、各要員の生産性は同じものとする。","choices":{"ア":"10","イ":"11","ウ":"12","エ":"14"},"explanation":"総工数＝10名×15日＝150人日。最初5日分＝8名×5日＝40人日。残り工数＝150－40＝110人日。残り日数＝15－5＝10日。必要人数＝110÷10＝11名。","has_choices":true},{"year":"令和5年度","num":"問56","answer":"イ","question":"ISMSクラウドセキュリティ認証に関する記述として、適切なものはどれか。","choices":{"ア":"IaaS事業者のみが認証の対象となる。","イ":"クラウドサービス固有の管理策が実施されていることを認証する制度である。","ウ":"プライバシーマークと同じ制度である。","エ":"SaaS事業者のみが認証の対象となる。"},"explanation":"ISMSクラウドセキュリティ認証（ISO/IEC 27017ベース）は、クラウドサービス固有の情報セキュリティ管理策が適切に導入・実施されていることを認証する制度。PaaS・SaaS・IaaSいずれも対象となりうる。プライバシーマークとは別制度。","has_choices":true},{"year":"令和5年度","num":"問57","answer":"エ","question":"IoTデバイスにおけるセキュリティ対策のうち、耐タンパ性をもたせる対策として、適切なものはどれか。","choices":{"ア":"通信の認証を強化し正規のサーバだけが接続できるようにする。","イ":"通信データを暗号化し傍受されても解読できないようにする。","ウ":"ソフトウェアを自動でアップデートし脆弱性対策を迅速に行う。","エ":"内蔵ソフトウェアを難読化して解読に要する時間を増大させる。"},"explanation":"耐タンパ性とは、物理的・論理的解析への耐性。内蔵ソフトウェアを難読化し解読に要する時間を増大させることが耐タンパ性対策。接続認証はアクセス制御、暗号化は通信保護、自動アップデートは脆弱性対策。","has_choices":true},{"year":"令和5年度","num":"問58","answer":"ウ","question":"Webサイトなどに不正なソフトウェアを潜ませておき、PCやスマートフォンなどのWebブラウザからこのサイトにアクセスしたとき、利用者が気付かないうちにWebブラウザなどの脆弱性を突いてマルウェアを送り込む攻撃はどれか。","choices":{"ア":"DDoS攻撃","イ":"SQLインジェクション","ウ":"ドライブバイダウンロード","エ":"フィッシング"},"explanation":"ドライブバイダウンロードは、Webブラウザの脆弱性を利用して、サイト閲覧時に利用者が気づかないうちにマルウェアをダウンロード・実行させる攻撃。DDoS攻撃はサービス妨害、SQLインジェクションはDB攻撃、フィッシングは詐欺サイト誘導。","has_choices":true},{"year":"令和5年度","num":"問59","answer":"エ","question":"関係データベースで管理された「会員管理」表を正規化して、「店舗」表、「会員種別」表及び「会員」表に分割した。「会員」表として、適切なものはどれか。ここで、表中の下線は主キーを表し、一人の会員が複数の店舗に登録した場合は、会員番号を店舗ごとに付与するものとする。","choices":{"ア":"会員番号　会員名","イ":"会員番号　会員名　会員種別コード","ウ":"会員番号　店舗コード　会員名","エ":"会員番号　店舗コード　会員名　会員種別コード"},"explanation":"一人の会員が複数店舗に登録できる場合、主キーは（会員番号＋店舗コード）の複合キー。会員表には（会員番号、店舗コード、会員名、会員種別コード）が必要。店舗名は店舗表、会員種別名は会員種別表で管理するため会員表には含めない。","has_choices":true},{"year":"令和5年度","num":"問60","answer":"ア","question":"手続printArrayは、配列integerArrayの要素を並べ替えて出力する。手続printArrayを呼び出したときの出力はどれか。（配列{2, 4, 1, 3}を昇順バブルソートするプログラム）","choices":{"ア":"1, 2, 3, 4","イ":"2, 1, 3, 4","ウ":"2, 4, 1, 3","エ":"4, 3, 2, 1"},"explanation":"バブルソートで{2,4,1,3}を昇順ソート。1パス目：{2,1,3,4}→{1,2,3,4}。最終出力は1,2,3,4。","has_choices":true},{"year":"令和5年度","num":"問61","answer":"イ","question":"IoTシステムなどの設計、構築及び運用に際しての基本原則とされ、システムの企画・設計段階から情報セキュリティを確保するための方策を何と呼ぶか。","choices":{"ア":"セキュアコーディング","イ":"セキュリティバイデザイン","ウ":"セキュアブート","エ":"ユニバーサルデザイン"},"explanation":"セキュリティバイデザインは、IoTシステムなどの企画・設計段階から情報セキュリティ対策を組み込む考え方・方策。セキュアブートはOS起動時のソフトウェア検証、ユニバーサルデザインはアクセシビリティ設計。","has_choices":true},{"year":"令和5年度","num":"問62","answer":"エ","question":"情報セキュリティにおける認証要素は3種類に分類できる。認証要素の3種類として、適切なものはどれか。","choices":{"ア":"個人情報、所持情報、生体情報","イ":"個人情報、所持情報、知識情報","ウ":"個人情報、生体情報、知識情報","エ":"所持情報、生体情報、知識情報"},"explanation":"認証の3要素：知識情報（パスワード・暗証番号）、所持情報（ICカード・ワンタイムトークン）、生体情報（指紋・虹彩）。個人情報は認証要素ではなく、所持情報・生体情報・知識情報の3つが正しい認証要素の分類。","has_choices":true},{"year":"令和5年度","num":"問63","answer":"ア","question":"容量が500GバイトのHDDを2台使用して、RAID0、RAID1を構成したとき、実際に利用可能な記憶容量の組合せとして、適切なものはどれか。","choices":{"ア":"RAID0:1Tバイト、RAID1:500Gバイト","イ":"RAID0:500Gバイト、RAID1:1Tバイト","ウ":"RAID0:1Tバイト、RAID1:1Tバイト","エ":"RAID0:500Gバイト、RAID1:500Gバイト"},"explanation":"RAID0（ストライピング）：2台分の合計容量＝500G×2＝1Tバイト。RAID1（ミラーリング）：片方がミラーなので実効容量＝500Gバイト。","has_choices":true},{"year":"令和5年度","num":"問64","answer":"ウ","question":"関数sigmaは、正の整数を引数maxで受け取り、1からmaxまでの整数の総和を戻り値とする。プログラム中のaに入れる字句として、適切なものはどれか。","choices":{"ア":"calcX × n","イ":"calcX + 1","ウ":"calcX + n","エ":"n"},"explanation":"1からmaxまでの整数の総和を求めるアルゴリズム。calcXに累積加算するため、ループ内でcalcX ← calcX + n が正解。calcX×nは積、+1は連番カウント、←nは代入のみ。","has_choices":true},{"year":"令和5年度","num":"問65","answer":"ア","question":"Wi-FiのセキュリティであるWPA2を用いて、PCを無線LANルータと接続するときに設定するPSKの説明として、適切なものはどれか。","choices":{"ア":"パスフレーズに基づいて接続するPCごとに暗号化の鍵が生成される。","イ":"接続するPCのMACアドレスを登録して認証する。","ウ":"接続するPCにIPアドレスを割り当てる。","エ":"無線LANアクセスポイントを識別するIDである。"},"explanation":"PSK（Pre-Shared Key：事前共有鍵）はWPA2で使用するパスフレーズ。このパスフレーズに基づいて接続するPCごとに暗号化鍵が生成される。IPアドレス割り当てはDHCPの機能。SSIDはアクセスポイント識別名。","has_choices":true},{"year":"令和5年度","num":"問66","answer":"イ","question":"トランザクション処理におけるコミットの説明として、適切なものはどれか。","choices":{"ア":"障害発生時にデータベースを以前の状態に戻す操作","イ":"トランザクションが正常処理されたときデータベースへの更新を確定させること","ウ":"複数ユーザーが同一データを同時に更新しないよう制御すること","エ":"複数の表を組み合わせて新たな表を生成すること"},"explanation":"コミットとは、トランザクションが正常に処理されたときにデータベースへの更新を確定させること。ロールバックは失敗時の巻き戻し、ロックは並行制御、結合は複数表の統合。","has_choices":true},{"year":"令和5年度","num":"問67","answer":"ウ","question":"ネットワーク環境で利用されるIDSの役割として、適切なものはどれか。","choices":{"ア":"ドメイン名とIPアドレスを変換する。","イ":"時刻を管理する。","ウ":"不正アクセスや攻撃の予兆を検知し管理者に通知する。","エ":"電子メールの送受信を行う。"},"explanation":"IDS（Intrusion Detection System：侵入検知システム）は、ネットワーク上の不正アクセスや攻撃の予兆を検知して管理者に通知するシステム。DNSはIPアドレス変換、NTPは時刻同期、SMTPはメール送信プロトコル。","has_choices":true},{"year":"令和5年度","num":"問68","answer":"エ","question":"インターネット上のコンピュータでは、Webや電子メールなど様々なアプリケーションプログラムが動作し、それぞれに対応したアプリケーション層の通信プロトコルが使われている。これらの通信プロトコルの下位にあり、基本的な通信機能を実現するものとして共通に使われる通信プロトコルはどれか。","choices":{"ア":"FTP","イ":"POP","ウ":"SMTP","エ":"TCP/IP"},"explanation":"TCP/IP（Transmission Control Protocol/Internet Protocol）はインターネットの基盤プロトコル。FTP・POP・SMTPなどのアプリケーション層プロトコルの下位に位置し、基本的な通信機能を提供する共通プロトコル。","has_choices":true},{"year":"令和5年度","num":"問69","answer":"イ","question":"配列に格納されているデータを探索するときの、探索アルゴリズムに関する記述のうち、適切なものはどれか。","choices":{"ア":"2分探索法は先頭のデータから順番に探索する。","イ":"線形探索法は計算量が探索対象の要素数に比例する。","ウ":"線形探索法はデータがソートされていなければ使えない。","エ":"同一の配列に対して2分探索法より線形探索法の方が少ない計算量で済む。"},"explanation":"線形探索法の計算量は探索対象配列の要素数に比例する（O(n)）。2分探索法は先頭から順に探索するのではなく中間から。線形探索はソートが不要。2分探索はソート済みの場合に有効だが、同一配列なら2分探索の方が少ない計算量で済む。","has_choices":true},{"year":"令和5年度","num":"問70","answer":"ア","question":"Webサービスなどにおいて、信頼性を高め、かつ、利用者からの多量のアクセスを処理するために、複数のコンピュータを連携させて全体として一つのコンピュータであるかのように動作させる技法はどれか。","choices":{"ア":"クラスタリング","イ":"スプーリング","ウ":"バッファリング","エ":"ミラーリング"},"explanation":"クラスタリングは、複数のコンピュータを連携させて一つのシステムとして動作させる技術。高可用性と負荷分散を実現。スプーリングは印刷待ち行列管理、バッファリングは一時データ保存、ミラーリングはデータ複製。","has_choices":true},{"year":"令和5年度","num":"問71","answer":"ア","question":"IoTシステムにおけるエッジコンピューティングに関する記述として、最も適切なものはどれか。","choices":{"ア":"IoTデバイスの近くでデータを処理しサーバへの負荷を軽減する。","イ":"データの改ざんを防ぐためブロックチェーン技術を用いる。","ウ":"ネットワーク上に仮想的なサーバを構築してリソースを提供する。","エ":"大量のデータから規則性や関係性を見つけ出す。"},"explanation":"エッジコンピューティングは、IoTデバイスに近いところでデータ処理を行うことで、サーバへの負荷軽減・遅延低減を実現する技術。ブロックチェーンはデータ改ざん防止、クラウドコンピューティングはネットワーク越しのリソース利用、機械学習はデータからルール獲得。","has_choices":true},{"year":"令和5年度","num":"問72","answer":"ウ","question":"情報セキュリティのリスクマネジメントにおけるリスク対応を、リスク回避、リスク共有、リスク低減及びリスク保有の四つに分類したとき、リスク共有の説明として、適切なものはどれか。","choices":{"ア":"リスクの原因となる活動を停止すること","イ":"リスクが顕在化する可能性を下げる対策を実施すること","ウ":"保険加入などリスクが顕在化したときの損害を他の組織と分散すること","エ":"リスクの発生確率と影響が小さいと評価し特別な対策なしに受け入れること"},"explanation":"リスク共有（移転）は、保険への加入など、リスクを一定の合意の下に別の組織へ移転または分散することによって、リスクが顕在化したときの損害を低減すること。リスク回避は活動停止、リスク低減は対策実施、リスク保有は受容。","has_choices":true},{"year":"令和5年度","num":"問73","answer":"イ","question":"攻撃者がコンピュータに不正侵入したとき、再侵入を容易にするためにプログラムや設定の変更を行うことがある。この手口を表す用語として、最も適切なものはどれか。","choices":{"ア":"盗聴","イ":"バックドア","ウ":"フィッシング","エ":"ポートスキャン"},"explanation":"バックドアは、攻撃者が不正侵入後に再侵入を容易にするために設置する隠れた入口（抜け道）。盗聴は通信傍受、フィッシングは詐欺サイト誘導、ポートスキャンは開放ポート探索。","has_choices":true},{"year":"令和5年度","num":"問74","answer":"エ","question":"ニューラルネットワークに関する記述として、最も適切なものはどれか。","choices":{"ア":"CSIRTのこと","イ":"住民基本台帳ネットワークのこと","ウ":"ユビキタスのこと","エ":"人間の脳神経系を模してコンピュータ上に実現したモデル"},"explanation":"ニューラルネットワークは、ディープラーニングなどで用いられる、人間の脳神経系の仕組みをコンピュータで模したモデル。ユビキタスはいつでもどこでもネットワーク接続、CSIRTはセキュリティインシデント対応チーム、住民基本台帳ネットワークは行政システム。","has_choices":true},{"year":"令和5年度","num":"問75","answer":"ウ","question":"表計算ソフトを用いて、二つの科目X、Yの点数を評価して合否を判定する。それぞれの点数はワークシートのセルA2、B2に入力する。合格判定条件(1)又は(2)に該当するときはセルC2に「合格」、それ以外のときは「不合格」を表示する。セルC2に入力する式はどれか。（条件：(1)科目XとYの合計が120点以上 (2)科目X又はYのうち少なくとも一つが100点）","choices":{"ア":"IF(論理積((A2+B2)≧120, A2=100, B2=100), \"合格\", \"不合格\")","イ":"IF(論理積((A2+B2)≧120, A2=100, B2=100), \"不合格\", \"合格\")","ウ":"IF(論理和((A2+B2)≧120, A2=100, B2=100), \"合格\", \"不合格\")","エ":"IF(論理和((A2+B2)≧120, A2=100, B2=100), \"不合格\", \"合格\")"},"explanation":"条件(1)：A2+B2≧120、条件(2)：A2=100またはB2=100の少なくとも一方。(1)または(2)の少なくとも一方が成立すれば合格→OR条件（論理和）。IF(論理和((A2+B2)≧120, A2=100, B2=100), '合格', '不合格')が正解。","has_choices":true},{"year":"令和5年度","num":"問76","answer":"ウ","question":"品質管理担当者が行っている検査を自動化することを考えた。10,000枚の製品画像と、それに対する品質管理担当者による不良品かどうかの判定結果を学習データとして与えることによって、製品が不良品かどうかを判定する機械学習モデルを構築した。品質管理担当者が不良品と判定した製品画像数に占める、機械学習モデルの判定が不良品と判定した製品画像数の割合を再現率としたとき、このテストにおける再現率は幾らか。（不良品×不良品:5枚、不良品×良品:5枚、良品×不良品:15枚、良品×良品:75枚）","choices":{"ア":"0.05","イ":"0.25","ウ":"0.50","エ":"0.80"},"explanation":"再現率＝真陽性÷（真陽性＋偽陰性）＝5÷（5+5）＝5÷10＝0.50。品質管理担当者が「不良品」と判定した10枚のうち、機械学習モデルも「不良品」と判定したのは5枚。よって再現率は0.50。","has_choices":true},{"year":"令和5年度","num":"問77","answer":"ウ","question":"受験者10,000人の4教科の試験結果は表のとおりであり、いずれの教科の得点分布も正規分布に従っていたとする。ある受験者の4教科の得点が全て71点であったとき、この受験者が最も高い偏差値を得た教科はどれか。（国語:平均62/標準偏差5、社会:平均55/標準偏差9、数学:平均58/標準偏差6、理科:平均60/標準偏差7）","choices":{"ア":"国語","イ":"社会","ウ":"数学","エ":"理科"},"explanation":"偏差値＝(得点－平均)÷標準偏差×10+50。国語:(71-62)÷5×10+50=68.0、社会:(71-55)÷9×10+50≒67.8、数学:(71-58)÷6×10+50≒71.7、理科:(71-60)÷7×10+50≒65.7。最高偏差値は数学(≒71.7)。","has_choices":true},{"year":"令和5年度","num":"問78","answer":"イ","question":"関係データベースの主キーの設定に関する記述として、適切なものだけを全て挙げたものはどれか。a 値が他のレコードと重複するものは主キーとして使用できない。b インデックスとの重複設定はできない。c 主キーの値は数値でなければならない。d 複数のフィールドを使って主キーを構成できる。","choices":{"ア":"aのみ","イ":"a, d","ウ":"b, c","エ":"c, d"},"explanation":"関係データベースの主キーの性質：aは正しい（一意性の制約）、dは正しい（複合主キーが可能）。bは誤り（主キーにインデックスを設定できる）、cは誤り（文字列・数値いずれも主キーになれる）。","has_choices":true},{"year":"令和5年度","num":"問79","answer":"イ","question":"PDCAモデルに基づいてISMSを運用している組織の活動において、次のような調査報告があった。この調査はPDCAモデルのどのプロセスで実施されるか。（マルウェア検知システムの有効性確認と社外メール送信のセキュリティ対策不備の発見）","choices":{"ア":"Act（改善）","イ":"Check（確認）","ウ":"Do（実施）","エ":"Plan（計画）"},"explanation":"PDCAのC（Check：評価・点検）フェーズ。ISMSの運用状況を評価し、対策の有効性確認や問題点の発見を行うのがCheckの役割。P（Plan）は計画策定、D（Do）は実施・運用、A（Act）は改善活動。","has_choices":true},{"year":"令和5年度","num":"問80","answer":"エ","question":"USBメモリなどの外部記憶媒体をPCに接続したときに、その媒体中のプログラムや動画などを自動的に実行したり再生したりするOSの機能であり、マルウェア感染の要因ともなるものはどれか。","choices":{"ア":"オートコレクト","イ":"オートコンプリート","ウ":"オートフィルタ","エ":"オートラン"},"explanation":"オートランとは、USBメモリなどの外部記憶媒体をPCに接続したときに、媒体内のプログラムを自動実行するOSの機能。マルウェア感染経路となるため現在は無効化が推奨される。オートコレクトは文字入力補正、オートコンプリートは入力補完、オートフィルタはデータ絞り込み。","has_choices":true},{"year":"令和5年度","num":"問81","answer":"ア","question":"HDDを廃棄するときに、HDDからの情報漏えい防止策として、適切なものだけを全て挙げたものはどれか。a データ消去用ソフトウェアを利用し、ランダムなデータをHDDの全ての領域に複数回書き込む。b ドリルやメディアシュレッダーなどを用いてHDDを物理的に破壊する。c ファイルを消去した後、HDDの論理フォーマットを行う。","choices":{"ア":"a, b","イ":"a, c","ウ":"b, c","エ":"cのみ"},"explanation":"HDD廃棄時の情報漏えい防止策として有効なのはaとb。aのデータ上書きとbの物理的破壊はデータの復元を困難にする確実な方法。cの論理フォーマットはデータ管理情報のみ削除でデータ本体は復元可能なため不十分。","has_choices":true},{"year":"令和5年度","num":"問82","answer":"ア","question":"OSS（Open Source Software）に関する記述a〜cのうち、適切なものだけを全て挙げたものはどれか。a ソースコードに手を加えて再配布することができる。b ソースコードの入手は無償だが、有償の保守サポートを受けなければならない。c 著作権が放棄されており、無断で利用することができる。","choices":{"ア":"aのみ","イ":"a, b","ウ":"b, c","エ":"a, b, c"},"explanation":"OSSに関して正しいのはaのみ。OSSはライセンス条件に従い改変・再配布可能（a）。bは誤り（有償サポートは必須ではない）。cは誤り（著作権は保持されており、OSSライセンスに従う必要がある）。","has_choices":true},{"year":"令和5年度","num":"問83","answer":"エ","question":"スマートフォンなどで、相互に同じアプリケーションを用いて、インターネットを介した音声通話を行うときに利用される技術はどれか。","choices":{"ア":"MVNO","イ":"NFC","ウ":"NTP","エ":"VoIP"},"explanation":"VoIP（Voice over Internet Protocol）は、インターネット（IP網）を介してデジタル化した音声データを送受信する技術。MVNOは仮想移動体通信事業者、NFCは近距離無線通信、NTPは時刻同期プロトコル。","has_choices":true},{"year":"令和5年度","num":"問84","answer":"エ","question":"メッセージダイジェストを利用した送信者のデジタル署名が付与された電子メールに関する記述のうち、適切なものはどれか。","choices":{"ア":"デジタル署名を受信者が検証することによって、不正なメールサーバから送信された電子メールであるかどうかを判別できる。","イ":"デジタル署名を送信側メールサーバのサーバ証明書で受信者が検証することによって、送信者のなりすましを検知できる。","ウ":"デジタル署名を付与すると、同時に電子メール本文の暗号化も行われるので、電子メールの内容の漏えいを防ぐことができる。","エ":"電子メール本文の改ざんの防止はできないが、デジタル署名をすることによって、受信者は改ざんが行われたことを検知することはできる。"},"explanation":"デジタル署名により、受信者は電子メール本文の改ざんが行われたことを検知できる（改ざん防止ではなく改ざん検知）。アは誤り（サーバの正当性はSPF等で確認）、イは誤り（なりすまし検知には公開鍵証明書が必要）、ウは誤り（署名と暗号化は別機能）。","has_choices":true},{"year":"令和5年度","num":"問85","answer":"ウ","question":"IoT機器におけるソフトウェアの改ざん対策にも用いられ、OSやファームウェアなどの起動時に、それらのデジタル署名を検証し、正当であるとみなされた場合にだけそのソフトウェアを実行する技術はどれか。","choices":{"ア":"GPU","イ":"RAID","ウ":"セキュアブート","エ":"ハイバネーション"},"explanation":"セキュアブートとは、OS・ファームウェア起動時にデジタル署名を検証し、正当と確認されたものだけ実行する技術。改ざんされたソフトウェアの起動を防止する。GPUはグラフィック処理装置、RAIDはディスク冗長化。","has_choices":true},{"year":"令和5年度","num":"問86","answer":"ア","question":"ハイブリッド暗号方式を用いてメッセージを送信したい。メッセージと復号用の鍵の暗号化手順を表した図において、メッセージの暗号化に使用する鍵を（1）とし、（1）の暗号化に使用する鍵を（2）としたとき、図のa, bに入れる字句の適切な組合せはどれか。","choices":{"ア":"a:共通鍵、b:公開鍵","イ":"a:共通鍵、b:秘密鍵","ウ":"a:公開鍵、b:共通鍵","エ":"a:秘密鍵、b:公開鍵"},"explanation":"ハイブリッド暗号：メッセージを高速な共通鍵(a)で暗号化し、その共通鍵を受信者の公開鍵(b)で暗号化して送信。a＝共通鍵、b＝公開鍵。","has_choices":true},{"year":"令和5年度","num":"問87","answer":"ア","question":"IoTエリアネットワークでも用いられ、電気を供給する電力線に高周波の通信用信号を乗せて伝送させることによって、電力線を伝送路としても使用する技術はどれか。","choices":{"ア":"PLC","イ":"PoE","ウ":"エネルギーハーベスティング","エ":"テザリング"},"explanation":"PLC（Power Line Communication：電力線搬送通信）は、電力線に高周波の通信信号を重畳させてデータ通信を行う技術。PoEはLANケーブルで電力供給、エネルギーハーベスティングは環境発電、テザリングはスマートフォン経由のインターネット接続共有。","has_choices":true},{"year":"令和5年度","num":"問88","answer":"ウ","question":"読出し専用のDVDはどれか。","choices":{"ア":"DVD-R","イ":"DVD-RAM","ウ":"DVD-ROM","エ":"DVD-RW"},"explanation":"DVD-ROM（Read Only Memory）は製造時にデータが記録された読み出し専用DVD。DVD-Rは1回書き込み可能、DVD-RAMは繰り返し書き込み可能、DVD-RWも繰り返し書き込み可能。","has_choices":true},{"year":"令和5年度","num":"問89","answer":"イ","question":"企業の従業員になりすましてIDやパスワードを聞き出したり、くずかごから機密情報を入手したりするなど、技術的手法を用いない攻撃はどれか。","choices":{"ア":"ゼロデイ攻撃","イ":"ソーシャルエンジニアリング","ウ":"ソーシャルメディア","エ":"トロイの木馬"},"explanation":"ソーシャルエンジニアリングは、技術的手段ではなく人間の心理・行動を悪用してパスワードや機密情報を入手する攻撃手法。ゼロデイ攻撃は未知脆弱性の悪用、ソーシャルメディアは情報発信ツール、トロイの木馬はマルウェアの一種。","has_choices":true},{"year":"令和5年度","num":"問90","answer":"ア","question":"情報セキュリティにおける物理的及び環境的セキュリティ管理策であるクリアデスクを職場で実施する例として、適切なものはどれか。","choices":{"ア":"従業員に固定された机がなく、空いている机で業務を行う。","イ":"情報を記録した書類などを机の上に放置したまま離席しない。","ウ":"机の上のLANケーブルを撤去して、暗号化された無線LANを使用する。","エ":"離席時は、PCをパスワードロックする。"},"explanation":"クリアデスクとは、離席時に机の上に書類・記憶媒体を放置しないセキュリティ管理策。フリーアドレス（固定席なし）は、常に机を片付けた状態にする必要があるためクリアデスクの実践例となる。エのPCロックはクリアスクリーンの例。","has_choices":true},{"year":"令和5年度","num":"問91","answer":"エ","question":"AIに利用されるニューラルネットワークにおける活性化関数に関する記述として、適切なものはどれか。","choices":{"ア":"入力された値の信頼度を出力する。","イ":"ニューロン数を計算する。","ウ":"最適なニューロン数を出力する。","エ":"入力された値を基に計算し次のニューロンに渡す値を出力する。"},"explanation":"活性化関数とは、ニューラルネットワークの各ニューロンにおいて、入力された値を基に計算し、次のニューロンに渡す値を出力する関数。信頼度出力はソフトマックス関数、ニューロン数計算は設計パラメータ、最適ニューロン数出力は別機能。","has_choices":true},{"year":"令和5年度","num":"問92","answer":"エ","question":"電子メールに関する記述のうち、適切なものはどれか。","choices":{"ア":"電子メールのプロトコルには、受信にSMTP、送信にPOP3が使われる。","イ":"メーリングリストによる電子メールを受信すると、その宛先には全ての登録メンバーのメールアドレスが記述されている。","ウ":"メールアドレスの「@」の左側部分に記述されているドメイン名に基づいて、電子メールが転送される。","エ":"メール転送サービスを利用すると、自分名義の複数のメールアドレス宛に届いた電子メールを一つのメールボックスに保存することができる。"},"explanation":"メール転送サービスを使うと、複数のアドレス宛のメールを一つのメールボックスに集約できる。アは誤り（SMTPが送信、POP3/IMAPが受信）、イは誤り（メーリングリストの宛先はMLアドレスのみ）、ウは誤り（電子メールは@の右側のドメイン名に基づいてルーティング）。","has_choices":true},{"year":"令和5年度","num":"問93","answer":"エ","question":"フールプルーフの考え方を適用した例として、適切なものはどれか。","choices":{"ア":"HDDをRAIDで構成する。","イ":"システムに障害が発生しても、最低限の機能を維持して処理を継続する。","ウ":"システムを二重化して障害に備える。","エ":"利用者がファイルの削除操作をしたときに、「削除してよいか」の確認メッセージを表示する。"},"explanation":"フールプルーフ（Fool proof）は、誤操作があっても事故・障害が起きにくい設計。ファイル削除時の確認メッセージ表示が典型例（誤削除を防ぐ）。アのRAIDはフォールトトレラント、イはフェールセーフ、ウのシステム二重化はフォールトトレラント。","has_choices":true},{"year":"令和5年度","num":"問94","answer":"エ","question":"ISMSにおける情報セキュリティ方針に関する記述として、適切なものはどれか。","choices":{"ア":"経営者の承認なしに作成する。","イ":"部門ごとに異なる内容を定める。","ウ":"IT部門のみが遵守すればよい。","エ":"組織の情報セキュリティに対する意図を示し方向付けをするものである。"},"explanation":"情報セキュリティ方針（Information Security Policy）は、情報セキュリティに対する組織の意図を示し、方向付けするもの（ISO/IEC 27001）。セキュリティ製品の設定値ではなく、個人情報取扱手順でもなく、取引先との合意書でもない。","has_choices":true},{"year":"令和5年度","num":"問95","answer":"ア","question":"情報セキュリティにおける機密性、完全性及び可用性に関する記述のうち、完全性が確保されなかった例だけを全て挙げたものはどれか。a オペレーターが誤ったデータを入力し、顧客名簿に矛盾が生じた。b ショッピングサイトがシステム障害で一時的に利用できなかった。c データベースで管理していた顧客の個人情報が漏えいした。","choices":{"ア":"aのみ","イ":"a, b","ウ":"a, c","エ":"b, c"},"explanation":"完全性（Integrity）とは情報が正確・完全である特性。aの誤入力によるデータ矛盾のみが完全性の侵害。bはサービス停止で可用性の問題、cは情報漏えいで機密性の問題。","has_choices":true},{"year":"令和5年度","num":"問96","answer":"イ","question":"CPUのクロック周波数や通信速度などを表すときに用いられる国際単位系（SI）接頭語に関する記述のうち、適切なものはどれか。","choices":{"ア":"kの1,000倍はMである。","イ":"Mの1,000倍はGである。","ウ":"Gの100万倍はTである。","エ":"Tの1,000倍はPである。"},"explanation":"SI接頭語：k(10^3)、M(10^6)、G(10^9)、T(10^12)。Mの10^3倍はG（イ）。Gの10^6倍はP（ア）、Mの10^6倍はT（ウ）、Tの10^3倍はP（エ）。","has_choices":true},{"year":"令和5年度","num":"問97","answer":"イ","question":"サブネットマスクの役割として、適切なものはどれか。","choices":{"ア":"IPアドレスから、利用しているLAN上のMACアドレスを導き出す。","イ":"IPアドレスの先頭から何ビットをネットワークアドレスに使用するかを定義する。","ウ":"コンピュータをLANに接続するだけで、TCP/IPの設定情報を自動的に取得する。","エ":"通信相手のドメイン名とIPアドレスを対応付ける。"},"explanation":"サブネットマスクは、IPアドレスの先頭から何ビットをネットワークアドレスに使用するかを定義する（ネットワーク部とホスト部の境界を示す）。アはARPの役割、ウはDHCPの役割、エはDNSの役割。","has_choices":true},{"year":"令和5年度","num":"問98","answer":"イ","question":"IoT機器であるスマートメーターに関する記述として、適切なものはどれか。","choices":{"ア":"加速度センサーを搭載しており移動距離を計測する機能をもつ。","イ":"住宅などに設置され電気などの使用量を自動計測して供給事業者に送信する機器である。","ウ":"遠隔からデータを消去できる機能をもつ。","エ":"GPS機能を搭載しており設置場所の位置情報を常時送信する。"},"explanation":"スマートメーターは、住宅などに設置され電気・ガスなどの使用量を自動的に計測し、携帯電話回線などを利用して供給事業者にデータを送信するIoT機器。加速度センサーはIMU、遠隔データ消去はMDM、歩数計・GPS機能はウェアラブルデバイスの説明。","has_choices":true},{"year":"令和5年度","num":"問99","answer":"ウ","question":"バイオメトリクス認証の例として、適切なものはどれか。","choices":{"ア":"CAPTCHAを使ったWebページアクセス時の認証","イ":"利用者が設定したパスワードによる認証","ウ":"タッチペンを用いた署名の筆跡・筆圧などの特徴による認証","エ":"本人だけが知っている秘密の質問とその答えによる認証"},"explanation":"バイオメトリクス認証（生体認証）は、人間の生体的・行動的特徴を用いた認証。タッチペンを用いて署名する際の筆跡・筆圧など動作の特徴を読み取る認証がバイオメトリクス（行動的生体認証）。CAPTCHAは人間確認、パスワードは知識認証、秘密の質問は知識認証。","has_choices":true},{"year":"令和5年度","num":"問100","answer":"エ","question":"関係データベースにおける結合操作はどれか。","choices":{"ア":"表から、特定の条件を満たすレコードを抜き出した表を作る。","イ":"表から、特定のフィールドを抜き出した表を作る。","ウ":"二つの表から、同じ値をもつレコードを抜き出した表を作る。","エ":"二つの表から、フィールドの値によって関連付けした表を作る。"},"explanation":"関係データベースの結合（JOIN）操作は、二つの表からフィールドの値によって関連付けした表を作る操作。アは選択（selection）、イは射影（projection）、ウは積（intersection）。","has_choices":true},{"year":"令和6年度","num":"問1","answer":"エ","question":"マーケティングオートメーション（MA）に関する記述として、最も適切なものはどれか。","choices":{"ア":"企業内に蓄積された大量のデータを分析して、事業戦略などに有効活用する。","イ":"小売業やサービス業において、販売した商品単位の情報の収集・蓄積及び分析を行う。","ウ":"これまで人間が手作業で行っていた定型業務を、AIや機械学習などを取り入れたソフトウェアのロボットが代行することによって自動化や効率化を図る。","エ":"見込み顧客の抽出、獲得、育成などの営業活動を効率化する。"},"explanation":"MA（マーケティングオートメーション）は、見込み顧客の抽出・獲得・育成などのマーケティング活動を自動化・効率化するツール・仕組みを指す。ア はBI（ビジネスインテリジェンス）、イはPOS（販売時点情報管理）、ウはRPA（ロボティックプロセスオートメーション）の説明。","has_choices":true},{"year":"令和6年度","num":"問2","answer":"イ","question":"情報システムに不正に侵入し、サービスを停止させて社会的混乱を生じさせるような行為に対して、国全体で体系的に防御施策を講じるための基本理念を定め、国の責務などを明らかにした法律はどれか。","choices":{"ア":"公益通報者保護法","イ":"サイバーセキュリティ基本法","ウ":"不正アクセス禁止法","エ":"プロバイダ責任制限法"},"explanation":"サイバーセキュリティ基本法は、情報システムへの不正侵入などのサイバー攻撃に対して、国全体で体系的に防御施策を講じるための基本理念・国の責務等を定めた法律。公益通報者保護法は内部告発者保護、不正アクセス禁止法は不正アクセス行為の禁止、プロバイダ責任制限法はプロバイダの責任範囲を規定する法律。","has_choices":true},{"year":"令和6年度","num":"問3","answer":"ウ","question":"未来のある時点に目標を設定し、そこを起点に現在を振り返り、目標実現のために現在すべきことを考える方法を表す用語として、最も適切なものはどれか。","choices":{"ア":"PoC（Proof of Concept）","イ":"PoV（Proof of Value）","ウ":"バックキャスティング","エ":"フォアキャスティング"},"explanation":"バックキャスティングは、将来の目標・ありたい姿を先に設定し、そこから逆算して現在取るべき行動を導く思考法。フォアキャスティングは現状から将来を予測する順方向の手法。PoCは概念実証、PoVは価値実証。","has_choices":true},{"year":"令和6年度","num":"問4","answer":"イ","question":"従来の金融情報システムは堅ろう性が高い一方、柔軟性に欠け、モバイル技術などの情報革新に追従したサービスの迅速な提供が難しかった。これを踏まえて、インターネット関連技術の取込みやそれらを活用するベンチャー企業と組むなどして、新たな価値や革新的なサービスを提供していく潮流を表す用語として、最も適切なものはどれか。","choices":{"ア":"オムニチャネル","イ":"フィンテック","ウ":"ブロックチェーン","エ":"ワントゥワンマーケティング"},"explanation":"フィンテック（FinTech）は、金融（Finance）と技術（Technology）を組み合わせた造語で、IT・インターネット技術を活用した革新的な金融サービスや事業の潮流を表す。オムニチャネルは複数販売チャネルの統合戦略、ブロックチェーンは分散型台帳技術、ワントゥワンマーケティングは個客対応マーケティング。","has_choices":true},{"year":"令和6年度","num":"問5","answer":"イ","question":"ベンチャーキャピタルに関する記述として、最も適切なものはどれか。","choices":{"ア":"新しい技術の獲得や、規模の経済性の追求などを目的に、他の企業と共同出資会社を設立する手法","イ":"株式売却による利益獲得などを目的に、新しい製品やサービスを武器に市場に参入しようとする企業に対して出資などを行う企業","ウ":"新サービスや技術革新などの創出を目的に、国や学術機関、他の企業など外部の組織と共創関係を結び、積極的に技術や資源を交換し、自社に取り込む手法","エ":"特定された課題の解決を目的に、一定の期間を定めて企業内に立ち上げられ、構成員を関連部門から招集し、目的が達成された時点で解散する組織"},"explanation":"ベンチャーキャピタルは、将来有望なベンチャー企業（スタートアップ）に対して出資を行い、株式上場や株式売却による利益獲得を目的とする投資会社。アはジョイントベンチャー、ウはオープンイノベーション、エはプロジェクト組織の説明。","has_choices":true},{"year":"令和6年度","num":"問6","answer":"エ","question":"技術戦略の策定や技術開発の推進といった技術経営に直接の責任をもつ役職はどれか。","choices":{"ア":"CEO","イ":"CFO","ウ":"COO","エ":"CTO"},"explanation":"CTO（Chief Technology Officer：最高技術責任者）は技術戦略の策定や技術開発の推進など技術経営に直接の責任を持つ役職。CEO（最高経営責任者）、CFO（最高財務責任者）、COO（最高執行責任者）はそれぞれ経営・財務・業務執行を担当。","has_choices":true},{"year":"令和6年度","num":"問7","answer":"イ","question":"システム開発の上流工程において、業務プロセスのモデリングを行う目的として、最も適切なものはどれか。","choices":{"ア":"業務プロセスで取り扱う大量のデータを、統計的手法やAI手法などを用いて分析し、データ間の相関関係や隠れたパターンなどを見いだすため","イ":"業務プロセスを可視化することによって、適切なシステム設計のベースとなる情報を整備し、関係者間で解釈を共有できるようにするため","ウ":"個々の従業員がもっている業務に関する知識・経験やノウハウを社内全体で共有し、創造的なアイディアを生み出すため","エ":"プロジェクトに必要な要員を調達し、チームとして組織化して、プロジェクトの目的の達成に向けて一致団結させるため"},"explanation":"業務プロセスのモデリングは、業務の流れや仕組みを図表などで可視化することで、関係者間で共通認識を持ち、適切なシステム設計の基盤情報を整備することが目的。アはデータマイニング、ウはナレッジマネジメント、エはプロジェクトチーム編成の目的。","has_choices":true},{"year":"令和6年度","num":"問8","answer":"ウ","question":"表はA社の期末の損益計算書から抜粋した資料である。当期純利益が800百万円であるとき、販売費及び一般管理費は何百万円か。 売上高8,000、売上原価6,000、販売費及び一般管理費（?）、営業外収益150、営業外費用50、特別利益60、特別損失10、法人税等350","choices":{"ア":"850","イ":"900","ウ":"1,000","エ":"1,200"},"explanation":"当期純利益＝売上高－売上原価－販売費及び一般管理費＋営業外収益－営業外費用＋特別利益－特別損失－法人税等 800＝8,000－6,000－販管費＋150－50＋60－10－350 800＝1,800－販管費 販管費＝1,000（百万円）","has_choices":true},{"year":"令和6年度","num":"問9","answer":"ア","question":"企業の戦略立案やマーケティングなどで使用されるフェルミ推定に関する記述として、最も適切なものはどれか。","choices":{"ア":"正確に算出することが極めて難しい数量に対して、把握している情報と論理的な思考プロセスによって概数を求める手法である。","イ":"特定の集団と活動を共にしたり、人々の動きを観察したりすることによって、慣習や嗜好、地域や組織を取り巻く文化を類推する手法である。","ウ":"入力データと出力データから、その因果関係を統計的に推定する手法である。","エ":"有識者のグループに繰り返し同一のアンケート調査とその結果のフィードバックを行うことによって、ある分野の将来予測に関する総意を得る手法である。"},"explanation":"フェルミ推定は、正確な計測が困難な数量（例：日本の自動車の台数など）を、既知の情報と論理的な推論から概算する手法。イはエスノグラフィー（民族誌的調査）、ウは回帰分析、エはデルファイ法の説明。","has_choices":true},{"year":"令和6年度","num":"問10","answer":"イ","question":"不正競争防止法で規定されている限定提供データに関する記述として、最も適切なものはどれか。","choices":{"ア":"特定の第三者に対し、1回に限定して提供する前提で保管されている技術上又は営業上の情報は限定提供データである。","イ":"特定の第三者に提供する情報として電磁的方法によって相当量蓄積され管理されている技術上又は営業上の情報（秘密として管理されているものを除く）は限定提供データである。","ウ":"特定の第三者に提供するために、金庫などで物理的に管理されている技術上又は営業上の情報は限定提供データである。","エ":"不正競争防止法に定めのある営業秘密は限定提供データである。"},"explanation":"限定提供データは、特定の者に対して電磁的方法により相当量蓄積・管理されている技術上・営業上の情報（秘密として管理されているものを除く）。ア（1回限定提供）やウ（物理管理）は要件を満たさない。エの営業秘密は別の保護制度（秘密管理性が必要）で、限定提供データとは区別される。","has_choices":true},{"year":"令和6年度","num":"問11","answer":"イ","question":"品質に関する組織やプロセスの運営管理を標準化し、マネジメントの質や効率の向上を目的とした方策として、適切なものはどれか。","choices":{"ア":"ISMSの導入","イ":"ISO 9001の導入","ウ":"ITILの導入","エ":"プライバシーマークの取得"},"explanation":"ISO 9001は品質マネジメントシステムの国際規格で、品質に関する組織・プロセスの標準化によりマネジメントの質・効率向上を目的とする。ISMSは情報セキュリティ管理、ITILはITサービス管理のベストプラクティス、プライバシーマークは個人情報保護体制の認証。","has_choices":true},{"year":"令和6年度","num":"問12","answer":"ア","question":"AIに関するガイドラインの一つである「人間中心のAI社会原則」に定められている七つの「AI社会原則」のうち、「イノベーションの原則」に関する記述として、最も適切なものはどれか。","choices":{"ア":"AIの発展によって人も併せて進化するように、国際化や多様化を推進し、大学、研究機関、企業など、官民における連携と、柔軟な人材の移動を促進する。","イ":"AIの利用がもたらす結果については、問題の特性に応じて、AIの開発、提供、利用に携わった関係者が分担して責任を負う。","ウ":"サービスの提供者は、AIを利用している事実やデータの取得方法や使用方法、結果の適切性について、利用者に対する適切な説明を行う。","エ":"情報弱者を生み出さないために、幼児教育や初等中等教育において、AI活用や情報リテラシーに関する教育を行う。"},"explanation":"「イノベーションの原則」は、AIの発展で人も進化するよう、国際化・多様化の推進と官民連携・人材の柔軟な移動促進を図る原則。イは「責任の原則」、ウは「透明性の原則」、エは「教育・リテラシーの原則」の内容。","has_choices":true},{"year":"令和6年度","num":"問13","answer":"エ","question":"金融機関では、同一の顧客で複数の口座をもつ個人や法人について、氏名又は法人名、生年月日又は設立年月日、電話番号、住所又は所在地などを手掛かりに集約し、顧客ごとの預金の総額を正確に把握する作業が行われる。このように顧客がもつ複数の口座を、顧客ごとに取りまとめて一元管理する手続を表す用語として、最も適切なものはどれか。","choices":{"ア":"アカウントアグリゲーション","イ":"キーマッピング","ウ":"垂直統合","エ":"名寄せ"},"explanation":"名寄せとは、氏名・生年月日・住所などをキーに、同一人物（または法人）の複数の口座・レコードを一元管理する作業。アカウントアグリゲーションは複数金融機関の口座情報を一括管理するサービス、キーマッピングはキー項目の対応付け、垂直統合はサプライチェーン上の事業統合。","has_choices":true},{"year":"令和6年度","num":"問14","answer":"ア","question":"ある商品の販売量と気温の関係が一次式で近似できるとき、予測した気温から商品の販売量を推定する手法として、適切なものはどれか。","choices":{"ア":"回帰分析","イ":"線形計画法","ウ":"デルファイ法","エ":"パレート分析"},"explanation":"回帰分析は、変数間の関係を数式（回帰式）で表現し、一方の変数から他方を予測する統計手法。販売量と気温の一次式による近似・予測は回帰分析の典型例。線形計画法は制約条件下の最適解探索、デルファイ法は専門家の合意形成手法、パレート分析は重要要因の識別手法。","has_choices":true},{"year":"令和6年度","num":"問15","answer":"ウ","question":"必要な時期に必要な量の原材料や部品を調達することによって、工程間の在庫をできるだけもたないようにする生産方式はどれか。","choices":{"ア":"BPO","イ":"CIM","ウ":"JIT","エ":"OEM"},"explanation":"JIT（Just In Time：ジャストインタイム）は、必要なものを必要な時に必要な量だけ調達・生産して在庫を最小化するトヨタ発の生産方式。BPOは業務プロセスのアウトソーシング、CIMはコンピュータ統合製造、OEMは相手先ブランドによる製造委託。","has_choices":true},{"year":"令和6年度","num":"問16","answer":"イ","question":"RPAが適用できる業務として、最も適切なものはどれか。","choices":{"ア":"ゲームソフトのベンダーが、ゲームソフトのプログラムを自動で改善する業務","イ":"従業員の交通費精算で、交通機関利用区間情報と領収書データから精算伝票を作成する業務","ウ":"食品加工工場で、産業用ロボットを用いて冷凍食品を自動で製造する業務","エ":"通信販売業で、膨大な顧客の購買データから顧客の購買行動に関する新たな法則を見つける業務"},"explanation":"RPA（ロボティックプロセスオートメーション）は、PC上の定型的・反復的な事務作業をソフトウェアロボットで自動化する技術。交通費精算伝票作成のような定型的なデスクワークが典型的な適用業務。アはAIによる自動改善、ウは物理的な産業ロボット、エはデータマイニングであり、RPAの適用範囲外。","has_choices":true},{"year":"令和6年度","num":"問17","answer":"エ","question":"技術開発戦略において作成されるロードマップを説明しているものはどれか。","choices":{"ア":"技術の競争力レベルと技術のライフサイクルを2軸としたマトリックス上に、自社の技術や新しい技術をプロットする。","イ":"研究開発への投資とその成果を2軸とした座標上に、技術の成長過程をグラフ化し、旧技術から新技術への転換状況を表す。","ウ":"市場面からの有望度と技術面からの有望度を2軸としたマトリックス上に、技術開発プロジェクトをプロットする。","エ":"横軸に時間、縦軸に市場、商品、技術などを示し、研究開発成果の商品化、事業化の方向性をそれらの要素間の関係で表す。"},"explanation":"技術ロードマップは、横軸に時間、縦軸に市場・製品・技術などの要素を示し、研究開発成果の商品化・事業化の方向性と要素間の関係を時系列で整理した計画図。アはテクノロジーポートフォリオ、イはS字カーブ、ウはポートフォリオ評価マトリックスの説明。","has_choices":true},{"year":"令和6年度","num":"問18","answer":"ウ","question":"コーポレートガバナンスを強化した事例として、最も適切なものはどれか。","choices":{"ア":"女性が活躍しやすくするために労務制度を拡充した。","イ":"迅速な事業展開のために、他社の事業を買収した。","ウ":"独立性の高い社外取締役の人数を増やした。","エ":"利益が得られにくい事業から撤退した。"},"explanation":"コーポレートガバナンス（企業統治）の強化策として、独立性の高い社外取締役の増員は、経営の監督・透明性向上に直結する典型的な施策。アは女性活躍推進（ダイバーシティ）、イはM&A戦略、エは事業ポートフォリオ整理であり、コーポレートガバナンスの強化とは異なる目的。","has_choices":true},{"year":"令和6年度","num":"問19","answer":"ウ","question":"ある銀行では、システムの接続仕様を外部に公開し、あらかじめ契約を結んだ外部事業者のアクセスを認めることによって、利便性の高い、高度なサービスを展開しやすくしている。このような取組を表す用語として、最も適切なものはどれか。","choices":{"ア":"BPO","イ":"RPA","ウ":"オープンAPI","エ":"技術経営"},"explanation":"オープンAPIは、自社システムの接続仕様（API）を外部に公開し、契約した外部事業者が接続・利用できる仕組みで、金融分野ではフィンテック企業との連携による新サービス創出に活用されている。BPOは業務プロセスのアウトソーシング、RPAはロボットによる業務自動化、技術経営はMOT（Management of Technology）。","has_choices":true},{"year":"令和6年度","num":"問20","answer":"イ","question":"A社では、1千万円を投資して営業支援システムを再構築することを検討している。現状の営業支援システムの運用費が5百万円/年、再構築後の営業支援システムの運用費が4百万円/年、再構築による新たな利益の増加が2百万円/年であるとき、この投資の回収期間は何年か。ここで、これら以外の効果、費用などは考慮しないものとし、計算結果は小数点以下第2位を四捨五入するものとする。","choices":{"ア":"2.5","イ":"3.3","ウ":"5.0","エ":"10.0"},"explanation":"年間効果＝運用費削減（5－4＝1百万円）＋利益増加（2百万円）＝3百万円/年 回収期間＝投資額÷年間効果＝1,000万円÷300万円≒3.33年→小数点第2位を四捨五入→3.3年","has_choices":true},{"year":"令和6年度","num":"問21","answer":"ウ","question":"あるソフトウェアは、定額の料金や一定の期間での利用ができる形態で提供されている。この利用形態を表す用語として、適切なものはどれか。","choices":{"ア":"アクティベーション","イ":"アドウェア","ウ":"サブスクリプション","エ":"ボリュームライセンス"},"explanation":"サブスクリプションは、月額・年額などの定額料金や一定期間でソフトウェア・サービスを利用できる料金モデル。アクティベーションはライセンス認証手続き、アドウェアは広告表示を条件に無料提供するソフト、ボリュームライセンスは一括購入による割引ライセンス。","has_choices":true},{"year":"令和6年度","num":"問22","answer":"ウ","question":"インターネットを介して個人や企業が保有する住宅などの遊休資産の貸出しを仲介するサービスや仕組みを表す用語として、最も適切なものはどれか。","choices":{"ア":"シェアードサービス","イ":"シェアウェア","ウ":"シェアリングエコノミー","エ":"ワークシェアリング"},"explanation":"シェアリングエコノミーは、個人・企業が保有する遊休資産（住宅・車・スキル等）をインターネットプラットフォームを通じて他者と共有・貸し借りする経済モデル。シェアードサービスは共通業務の集中化、シェアウェアは試用可能な有料ソフト、ワークシェアリングは仕事の分かち合い。","has_choices":true},{"year":"令和6年度","num":"問23","answer":"ア","question":"A社はRPAソフトウェアを初めて導入するに当たり、計画策定フェーズ、先行導入フェーズ、本格導入フェーズの3段階で進めようと考えている。次のうち、計画策定フェーズで実施する作業として、適切なものだけを全て挙げたものはどれか。 a RPAソフトウェアの適用可能性を見極めるための概念検証を実施する。 b RPAソフトウェアを全社展開するための導入と運用の手順書を作成する。 c 部門、業務を絞り込んでRPAソフトウェアを導入し、効果を実測する。","choices":{"ア":"a","イ":"a, c","ウ":"b","エ":"b, c"},"explanation":"計画策定フェーズでは、まずRPAの適用可能性を検討する概念検証（PoC：PoC）を実施する（a）。bは本格導入フェーズ、cは先行導入フェーズで行う作業。","has_choices":true},{"year":"令和6年度","num":"問24","answer":"ウ","question":"式は定期発注方式で原料の発注量を求める計算式である。a〜cに入れる字句の適切な組合せはどれか。 発注量＝（a＋調達期間）×毎日の使用予定量＋b－現在の在庫量－c","choices":{"ア":"a:営業日数、b:安全在庫量、c:現在の発注残","イ":"a:営業日数、b:現在の発注残、c:安全在庫量","ウ":"a:発注間隔、b:安全在庫量、c:現在の発注残","エ":"a:発注間隔、b:現在の発注残、c:安全在庫量"},"explanation":"定期発注方式の発注量公式：発注量＝（発注間隔＋調達期間）×毎日の使用予定量＋安全在庫量－現在の在庫量－現在の発注残。定期発注は「発注間隔」が基本。安全在庫を確保しつつ、既に発注済み（発注残）は差し引く。","has_choices":true},{"year":"令和6年度","num":"問25","answer":"ア","question":"史跡などにスマートフォンを向けると、昔あった建物の画像や説明情報を現実の風景と重ねるように表示して、観光案内をできるようにした。ここで活用した仕組みを表す用語として、最も適切なものはどれか。","choices":{"ア":"AR","イ":"GUI","ウ":"VR","エ":"メタバース"},"explanation":"AR（Augmented Reality：拡張現実）は、現実の映像にデジタル情報を重ねて表示する技術。史跡に向けると過去の建物画像を重畳表示するのはARの典型的な活用例。GUIはグラフィカルなユーザーインタフェース、VRは完全な仮想空間、メタバースは仮想的な3次元空間。","has_choices":true},{"year":"令和6年度","num":"問26","answer":"ア","question":"データサイエンティストの役割に関する記述として、最も適切なものはどれか。","choices":{"ア":"機械学習や統計などの手法を用いてビッグデータを解析することによって、ビジネスに活用するための新たな知見を獲得する。","イ":"企業が保有する膨大なデータを高速に検索できるように、パフォーマンスの高いデータベースを運用するためのシステム基盤を構築する。","ウ":"企業における情報システムに関するリスクを評価するために、現場でのデータの取扱いや管理についての実態を調査する。","エ":"企業や組織における安全な情報システムの企画、設計、開発、運用を、サイバーセキュリティに関する専門的な知識や技能を活用して支援する。"},"explanation":"データサイエンティストは、機械学習・統計等の高度な分析手法を用いてビッグデータを解析し、ビジネス上の新たな知見・価値を生み出す専門職。イはデータベースエンジニア、ウはITリスクアナリスト、エはサイバーセキュリティエンジニアの役割。","has_choices":true},{"year":"令和6年度","num":"問27","answer":"イ","question":"個人情報保護法では、あらかじめ本人の同意を得ていなくても個人データの提供が許される行為を規定している。この行為に該当するものだけを、全て挙げたものはどれか。 a 事故で意識不明の人がもっていた本人の社員証を見て、搬送先の病院が本人の会社に電話してきたので、総務の担当者が本人の自宅電話番号を教えた。 b 新規加入者を勧誘したいと保険会社の従業員に頼まれたので、総務の担当者が新入社員の名前と所属部門のリストを渡した。 c 不正送金等の金融犯罪被害者に関する個人情報を、類似犯罪の防止対策を進める捜査機関からの法令に基づく要請に応じて、総務の担当者が提供した。","choices":{"ア":"a","イ":"a, c","ウ":"b, c","エ":"c"},"explanation":"個人情報保護法で同意なく提供できるのは、生命・身体保護のために必要で本人の同意取得が困難な場合（a）や、法令に基づく場合（c）など。bは営業目的であり同意なしの第三者提供は不可。よってa,cの「イ」。","has_choices":true},{"year":"令和6年度","num":"問28","answer":"ア","question":"次の事例のうち、AIを導入することによって業務の作業効率が向上したものだけを全て挙げたものはどれか。 a 食品専門商社のA社が、取引先ごとに様式が異なる手書きの請求書に記載された文字を自動で読み取ってデータ化することによって、事務作業時間を削減した。 b 繊維製造会社のB社が、原材料を取引先に発注する定型的なPC操作を自動化するツールを導入し、事務部門の人員を削減した。 c 損害保険会社のC社が、自社のコールセンターへの問合せに対して、オペレーターにつなげる前に音声チャットボットでヒアリングを行うことによって、オペレーターの対応時間を短縮した。 d 物流会社のD社が、配送荷物に電子タグを装着して出荷時に配送先を電子タグに書き込み、配送時にそれを確認することによって、誤配送を削減した。","choices":{"ア":"a, c","イ":"b, c","ウ":"b, d","エ":"c, d"},"explanation":"AIを活用したのは、aの手書き文字自動認識（AI-OCR）とcの音声チャットボット（AI）。bはRPA（AI不要の定型操作自動化）、dはIoT（電子タグ活用）であり、AIではない。よってa,cの「ア」。","has_choices":true},{"year":"令和6年度","num":"問29","answer":"イ","question":"ある企業が、顧客を引き付ける優れたUX（User Experience）やビジネスモデルをデジタル技術によって創出し、業界における従来のサービスを駆逐してしまうことによって、その業界の既存の構造が破壊されるような現象を表す用語として、最も適切なものはどれか。","choices":{"ア":"デジタルサイネージ","イ":"デジタルディスラプション","ウ":"デジタルディバイド","エ":"デジタルトランスフォーメーション"},"explanation":"デジタルディスラプション（Digital Disruption）は、デジタル技術を活用した新サービスが既存市場・業界構造を破壊する現象。デジタルサイネージは電子看板、デジタルディバイドはIT利用格差、DX（デジタルトランスフォーメーション）はデジタル化による業務・価値創出変革。","has_choices":true},{"year":"令和6年度","num":"問30","answer":"エ","question":"上司から自社の当期の損益計算書を渡され、「我が社の収益性分析をしなさい」と言われた。経営に関する指標のうち、この損益計算書だけから計算できるものだけを全て挙げたものはどれか。 a 売上高増加率 b 売上高利益率 c 自己資本利益率","choices":{"ア":"a","イ":"a, b","ウ":"a, b, c","エ":"b"},"explanation":"損益計算書（PL）だけから算出できるのはb「売上高利益率（利益÷売上高）」のみ。aの「売上高増加率」は前期比較が必要（PL1期分のみでは不可）、cの「自己資本利益率」は自己資本データが含まれる貸借対照表（BS）も必要。","has_choices":true},{"year":"令和6年度","num":"問31","answer":"エ","question":"顧客との個々のつながりを意識して情報を頻繁に更新するSNSなどのシステムとは異なり、会計システムのように高い信頼性と安定稼働が要求される社内情報を扱うシステムの概念を示す用語として、最も適切なものはどれか。","choices":{"ア":"IoT（Internet of Things）","イ":"PoC（Proof of Concept）","ウ":"SoE（Systems of Engagement）","エ":"SoR（Systems of Record）"},"explanation":"SoR（Systems of Record）は、会計・人事などの基幹業務を担い、高い信頼性・安定稼働が求められる記録系システム。SoE（Systems of Engagement）はSNSなど顧客との関係構築に使うエンゲージメント系システム。IoTはモノのインターネット、PoCは概念実証。","has_choices":true},{"year":"令和6年度","num":"問32","answer":"イ","question":"労働者派遣における派遣労働者の雇用関係に関する記述のうち、適切なものはどれか。","choices":{"ア":"派遣先との間に雇用関係があり、派遣元との間には存在しない。","イ":"派遣元との間に雇用関係があり、派遣先との間には存在しない。","ウ":"派遣元と派遣先のいずれの間にも雇用関係が存在する。","エ":"派遣元と派遣先のいずれの間にも雇用関係は存在しない。"},"explanation":"労働者派遣では、派遣労働者は派遣元（派遣会社）と雇用契約を締結しており、派遣先とは雇用関係がない（指揮命令関係のみ）。これが請負や業務委託との違いであり、偽装請負との区別のポイントでもある。","has_choices":true},{"year":"令和6年度","num":"問33","answer":"エ","question":"次の記述のうち、業務要件定義が曖昧なことが原因で起こり得る問題だけを全て挙げたものはどれか。 a 企画プロセスでシステム化構想がまとまらず、システム化の承認を得られない。 b コーディングのミスによって、システムが意図したものと違う動作をする。 c システムの開発中に仕様変更による手戻りが頻発する。 d システムを受け入れるための適切な受入れテストを設計できない。","choices":{"ア":"a, b","イ":"b, c","ウ":"b, d","エ":"c, d"},"explanation":"業務要件定義の曖昧さが原因となるのは、c（仕様変更による手戻り）とd（受入れテスト設計困難）。aは企画段階の問題（要件定義より前）、bはコーディングミス（実装段階の問題）で要件定義の曖昧さとは直接関係しない。","has_choices":true},{"year":"令和6年度","num":"問34","answer":"エ","question":"顧客の特徴に応じたきめ細かい対応を行うことによって、顧客と長期的に良好な関係を築き、顧客満足度の向上や取引関係の継続につなげる仕組みを構築したい。その仕組みの構成要素の一つとして、営業活動で入手した顧客に関する属性情報や顧客との交渉履歴などを蓄積し、社内で共有できるシステムを導入することにした。この目的を達成できるシステムとして、最も適切なものはどれか。","choices":{"ア":"CAEシステム","イ":"MRPシステム","ウ":"SCMシステム","エ":"SFAシステム"},"explanation":"SFA（Sales Force Automation：営業支援システム）は、顧客情報・商談履歴・交渉経緯などを蓄積・共有し、営業活動の効率化と顧客との長期的な関係構築を支援するシステム。CAEはコンピュータ支援エンジニアリング、MRPは資材所要量計画、SCMはサプライチェーン管理。","has_choices":true},{"year":"令和6年度","num":"問35","answer":"エ","question":"実用新案に関する記述として、最も適切なものはどれか。","choices":{"ア":"今までにない製造方法は、実用新案の対象となる。","イ":"自然法則を利用した技術的思想の創作で高度なものだけが、実用新案の対象となる。","ウ":"新規性の審査に合格したものだけが実用新案として登録される。","エ":"複数の物品を組み合わせて考案した新たな製品は、実用新案の対象となる。"},"explanation":"実用新案は「物品の形状・構造・組合せ」に係る考案を保護する権利で、物品を複数組み合わせた新製品も対象となる。アの「製造方法」は実用新案の対象外（特許の対象）。イの「高度なもの」は特許の要件。ウは実用新案には実体審査がなく、新規性等の審査なしで登録される（無審査登録制度）。","has_choices":true},{"year":"令和6年度","num":"問36","answer":"ア","question":"プロジェクトに該当する事例として、適切なものだけを全て挙げたものはどれか。 a 会社合併に伴う新組織への移行 b 社内システムの問合せや不具合を受け付けるサービスデスクの運用 c 新規の経理システム導入に向けたプログラム開発 d 毎年度末に実施する会計処理","choices":{"ア":"a, c","イ":"b, c","ウ":"b, d","エ":"c"},"explanation":"プロジェクトは「明確な目標・期間・予算を持つ一時的な取り組み」。a（会社合併移行）とc（新規システム開発）は開始・終了が明確な一時的活動。b（サービスデスク運用）とd（毎年度末会計処理）は継続的・反復的な定常業務。","has_choices":true},{"year":"令和6年度","num":"問37","answer":"エ","question":"システム開発プロジェクトを終結する時に、プロジェクト統合マネジメントで実施する活動として、最も適切なものはどれか。","choices":{"ア":"工程の進捗の予定と実績の差異を分析する。","イ":"作成した全ての成果物の一覧を確認する。","ウ":"総費用の予算と実績の差異を分析する。","エ":"知識や教訓を組織の資産として登録する。"},"explanation":"プロジェクト終結時の統合マネジメントでは、プロジェクトで得た知識・教訓・ベストプラクティスを組織の資産として記録・登録することが重要な活動。ア（進捗差異分析）とウ（費用差異分析）は実行中の管理活動、イ（成果物確認）はスコープマネジメントの活動。","has_choices":true},{"year":"令和6年度","num":"問38","answer":"イ","question":"あるシステムの運用において、利用者との間でSLAを交わし、利用可能日を月曜日から金曜日、1日の利用可能時間を7時から22時まで、稼働率を98%以上で合意した。1週間の運用において、障害などでシステムの停止を許容できる時間は最大何時間か。","choices":{"ア":"0.3","イ":"1.5","ウ":"1.8","エ":"2.1"},"explanation":"1週間の総利用可能時間＝5日×15時間＝75時間 許容停止時間＝75時間×（1－0.98）＝75×0.02＝1.5時間","has_choices":true},{"year":"令和6年度","num":"問39","answer":"エ","question":"サービスデスクを評価するためには適切なKPIを定めて評価する必要がある。顧客満足度を高めるために値が小さい方が良いKPIとして、適切なものだけを全て挙げたものはどれか。 a SLAで合意された目標時間内に対応が完了したインシデント件数の割合 b 1回の問合せで解決ができたインシデント件数の割合 c 二次担当へエスカレーションされたインシデント件数の割合 d 利用者がサービスデスクの担当者につながるまでに費やした時間","choices":{"ア":"a, b","イ":"a, d","ウ":"b, c","エ":"c, d"},"explanation":"値が小さい方が良いKPI（マイナス指標）は、c（エスカレーション率：低い方が問題少ない）とd（応答待ち時間：短い方が顧客満足度高い）。a（目標時間内解決率）とb（一発解決率）は値が大きい方が良いKPI。","has_choices":true},{"year":"令和6年度","num":"問40","answer":"ア","question":"アジャイル開発に関する記述として、最も適切なものはどれか。","choices":{"ア":"開発する機能を小さい単位に分割して、優先度の高いものから短期間で開発とリリースを繰り返す。","イ":"共通フレームを適用して要件定義、設計などの工程名及び作成する文書を定義する。","ウ":"システム開発を上流工程から下流工程まで順番に進めて、全ての開発工程が終了してからリリースする。","エ":"プロトタイプを作成して利用者に確認を求め、利用者の評価とフィードバックを行いながら開発を進めていく。"},"explanation":"アジャイル開発は、小さな機能単位に分割し、スプリント（短期間のサイクル）で開発・リリースを繰り返す開発手法。イは共通フレーム（プロセス定義）、ウはウォーターフォール開発、エはプロトタイプ開発の特徴。","has_choices":true},{"year":"令和6年度","num":"問41","answer":"イ","question":"あるプロジェクトの作業間の関係と所要時間がアローダイアグラムで示されている。このアローダイアグラムのBからEの四つの結合点のうち、工程全体の完了時間に影響を与えることなく、その結合点から始まる全ての作業の開始を最も遅らせることができるものはどれか。（経路：A→B→D→E→F=15+10+10+15=50、A→B→E→F=15+25+15=55、A→C→E→F=10+15+15=40、クリティカルパス：A→B→E→F=55）","choices":{"ア":"B","イ":"C","ウ":"D","エ":"E"},"explanation":"クリティカルパス：A→B→E→F（所要時間55）。各結合点の最早開始時刻と最遅開始時刻：B:最早15/最遅15（余裕0）、C:最早10/最遅25（余裕15）、D:最早25/最遅35（余裕10）、E:最早40/最遅40（余裕0）。最も余裕が大きいのはC（15の余裕あり）。","has_choices":true},{"year":"令和6年度","num":"問42","answer":"イ","question":"システム監査人の役割として、適切なものだけを全て挙げたものはどれか。 a 監査手続の種類、実施時期、適用範囲などについて、監査計画を立案する。 b 監査の目的に応じた監査報告書を作成し、社内に公開する。 c 監査報告書にある改善提案に基づく改善の実施を監査対象部門に指示する。 d 監査報告書にある改善提案に基づく改善の実施状況をモニタリングする。","choices":{"ア":"a, b","イ":"a, d","ウ":"b, c","エ":"c, d"},"explanation":"システム監査人の役割はa（監査計画立案）とd（改善実施状況のモニタリング）。bは「社内に公開」が誤り（報告は経営者や依頼者に行う）、cの「指示」は監査人の役割外（監査は勧告・提言であり指示・命令はしない）。","has_choices":true},{"year":"令和6年度","num":"問43","answer":"イ","question":"情報システムに関する施設や設備を維持・保全するために行うリスク対策のうち、ファシリティマネジメントの観点から行う対策として、適切なものだけを全て挙げたものはどれか。 a コンピュータ室への入室を、認可した者だけに限定する。 b コンピュータの設置場所を示す標識を掲示しない。 c 利用者のPCにマルウェア対策ソフトを導入する。","choices":{"ア":"a","イ":"a, b","ウ":"a, c","エ":"b, c"},"explanation":"ファシリティマネジメントは施設・設備の管理・保全の観点。a（入室制限）とb（設置場所を示す標識を非掲示）は物理的セキュリティ・施設管理の施策。cのマルウェア対策ソフトはITセキュリティ（論理的対策）であり、ファシリティマネジメントではない。","has_choices":true},{"year":"令和6年度","num":"問44","answer":"ア","question":"提供しているITシステムが事業のニーズを満たせるように、人材、プロセス、情報技術を適切に組み合わせ、継続的に改善して管理する活動として、最も適切なものはどれか。","choices":{"ア":"ITサービスマネジメント","イ":"システム監査","ウ":"ヒューマンリソースマネジメント","エ":"ファシリティマネジメント"},"explanation":"ITサービスマネジメント（ITSM）は、ITシステムが事業ニーズを満たすよう人材・プロセス・技術を組み合わせてITサービスを継続的に管理・改善するフレームワーク（ITIL等）。システム監査はIT統制の評価、ヒューマンリソースマネジメントは人材管理、ファシリティマネジメントは施設・設備管理。","has_choices":true},{"year":"令和6年度","num":"問45","answer":"エ","question":"本番稼働後の業務遂行のために、業務別にサービス利用方法の手順を示した文書として、最も適切なものはどれか。","choices":{"ア":"FAQ","イ":"サービスレベル合意書","ウ":"システム要件定義書","エ":"利用者マニュアル"},"explanation":"利用者マニュアルは、本番稼働後の業務遂行に向け、業務ごとのシステム操作手順・利用方法を示した文書。FAQはよくある質問と回答集、SLA（サービスレベル合意書）はサービス品質の合意文書、システム要件定義書は開発前の要件をまとめた文書。","has_choices":true},{"year":"令和6年度","num":"問46","answer":"エ","question":"ITサービスマネジメントの管理プロセスに関する記述a〜cと用語の適切な組合せはどれか。 a ITサービスの変更を実装するためのプロセス b インシデントの根本原因を突き止めて解決策を提供するためのプロセス c 組織が所有しているIT資産を把握するためのプロセス","choices":{"ア":"a:構成管理、b:問題管理、c:リリース及び展開管理","イ":"a:構成管理、b:リリース及び展開管理、c:問題管理","ウ":"a:問題管理、b:リリース及び展開管理、c:構成管理","エ":"a:リリース及び展開管理、b:問題管理、c:構成管理"},"explanation":"a（変更の実装）→リリース及び展開管理、b（根本原因の究明）→問題管理（インシデント管理は対症療法、問題管理は根本原因分析）、c（IT資産の把握）→構成管理（CMDB：構成管理データベースで資産を管理）。","has_choices":true},{"year":"令和6年度","num":"問47","answer":"ウ","question":"ソフトウェアの開発におけるDevOpsに関する記述として、最も適切なものはどれか。","choices":{"ア":"開発側が重要な機能のプロトタイプを作成し、顧客とともにその性能を実測して妥当性を評価する。","イ":"開発側では、開発の各工程でその工程の完了を判断した上で次工程に進み、総合テストで利用者が参加して操作性の確認を実施した後に運用側に引き渡す。","ウ":"開発側と運用側が密接に連携し、自動化ツールなどを活用して機能の導入や更新などを迅速に進める。","エ":"システム開発において、機能の拡張を図るために、固定された短期間のサイクルを繰り返しながらプログラムを順次追加する。"},"explanation":"DevOps（Development + Operations）は、開発チームと運用チームが密接に連携・協力し、CI/CD（継続的インテグレーション/継続的デリバリー）等の自動化ツールを活用して、ソフトウェアの高頻度・高速なリリースを実現する開発・運用手法。アはプロトタイプ開発、イはウォーターフォール、エはスクラム開発の説明。","has_choices":true},{"year":"令和6年度","num":"問48","answer":"イ","question":"システム監査で用いる判断尺度の選定方法に関する記述として、最も適切なものはどれか。","choices":{"ア":"システム監査ではシステム管理基準の全項目をそのまま使用しなければならない。","イ":"システム監査のテーマに応じて、システム管理基準以外の基準を使用してもよい。","ウ":"システム監査のテーマによらず、システム管理基準以外の基準は使用すべきでない。","エ":"アジャイル開発では、システム管理基準は使用すべきでない。"},"explanation":"システム監査では、監査テーマや目的に応じてシステム管理基準以外の国際標準・業界標準・社内規程なども判断尺度として活用できる。システム管理基準はあくまで代表的な基準の一つであり、全項目の使用義務もアジャイル開発での使用禁止規定もない。","has_choices":true},{"year":"令和6年度","num":"問49","answer":"ア","question":"ソフトウェア開発プロジェクトにおける、コストの見積手法には、積み上げ法、ファンクションポイント法、類推見積法などがある。見積りで使用した手法とその特徴に関する記述a〜cの適切な組合せはどれか。 a プロジェクトに必要な個々の作業を洗い出し、その作業ごとの工数を見積もって集計する。 b プロジェクトの初期段階で使用する手法で、過去の事例を活用してコストを見積もる。 c データ入出力や機能に着目して、ソフトウェア規模を見積もり、係数を乗ずるなどしてコストを見積もる。 積み上げ法:a、ファンクションポイント法:c、類推見積法:b","choices":{"ア":"積み上げ法:a、ファンクションポイント法:c、類推見積法:b","イ":"積み上げ法:b、ファンクションポイント法:a、類推見積法:c","ウ":"積み上げ法:c、ファンクションポイント法:a、類推見積法:b","エ":"積み上げ法:a、ファンクションポイント法:b、類推見積法:c"},"explanation":"積み上げ法はa（作業ごとの工数積み上げ）、ファンクションポイント法はc（機能規模を数値化してコスト算出）、類推見積法はb（過去事例から類推）。これが「ア」の組合せに対応。","has_choices":true},{"year":"令和6年度","num":"問50","answer":"エ","question":"ソフトウェア製品の品質特性を、移植性、機能適合性、互換性、使用性、信頼性、性能効率性、セキュリティ、保守性に分類したとき、RPAソフトウェアの使用性に関する記述として、最も適切なものはどれか。","choices":{"ア":"RPAが稼働するPCのOSが変わっても動作する。","イ":"RPAで指定した時間及び条件に基づき、適切に自動処理が実行される。","ウ":"RPAで操作対象となるアプリケーションソフトウェアがバージョンアップされても、簡単な設定変更で対応できる。","エ":"RPAを利用したことがない人でも、簡単な教育だけで利用可能になる。"},"explanation":"使用性（Usability）は、指定された条件下で利用者が製品を使いやすいか（学習しやすさ・操作性等）を表す品質特性。エ（初めてでも簡単に利用できる）が使用性に該当。ア（OS変更でも動作）は移植性、イ（正確に実行）は信頼性、ウ（変更に対応しやすい）は保守性。","has_choices":true},{"year":"令和6年度","num":"問51","answer":"エ","question":"システム開発プロジェクトにおいて、テスト中に発見された不具合の再発防止のために不具合分析を行うことにした。テスト結果及び不具合の内容を表に記入し、不具合ごとに根本原因を突き止めた後に、根本原因ごとに集計を行い発生頻度の多い順に並べ、主要な根本原因の特定を行った。ここで利用した図表のうち、根本原因を集計し、発生頻度順に並べて棒グラフで示し、累積値を折れ線グラフで重ねて示したものはどれか。","choices":{"ア":"散布図","イ":"チェックシート","ウ":"特性要因図","エ":"パレート図"},"explanation":"パレート図は、不具合・問題の原因を頻度順に並べた棒グラフと累積比率の折れ線グラフを組み合わせた図で、重要な問題（原因の上位20%が全体の80%を占めるパレートの法則）を特定するために使用する。散布図は相関分析、チェックシートはデータ収集記録、特性要因図（魚の骨図）は原因の系統的整理に使用。","has_choices":true},{"year":"令和6年度","num":"問52","answer":"ア","question":"システム開発プロジェクトにおいて、新機能の追加要求が変更管理委員会で認可された後にプロジェクトスコープマネジメントで実施する活動として、適切なものはどれか。","choices":{"ア":"新機能を追加で開発するためにWBSを変更し、コストの詳細な見積りをするための情報として提供する。","イ":"新機能を追加で開発するためのWBSのアクティビティの実行に必要なスキルを確認し、必要に応じてプロジェクトチームの能力向上を図る。","ウ":"変更されたWBSに基づいてスケジュールを作成し、完了時期の見通しを提示する。","エ":"変更されたWBSに基づいて要員の充足度を確認し、必要な場合は作業の外注を検討する。"},"explanation":"プロジェクトスコープマネジメントの活動は、スコープ（作業範囲）の定義・管理・変更。変更承認後はWBSを変更更新し、コスト見積りの基礎情報を提供するのがスコープマネジメントの活動。イはリソースマネジメント、ウはスケジュールマネジメント、エは調達・リソースマネジメントの活動。","has_choices":true},{"year":"令和6年度","num":"問53","answer":"ウ","question":"ITガバナンスに関する次の記述中のaに入れる字句として、最も適切なものはどれか。 「経営者は、a の事業の目的を支援する観点で、効果的、効率的かつ受容可能な a のITの利用について評価する。」","choices":{"ア":"過去と現在","イ":"現在","ウ":"現在と将来","エ":"将来"},"explanation":"ITガバナンスに関するISO/IEC 38500の定義では、経営者は「現在と将来」の事業目的を支援するという観点でITの利用を評価する。経営者はIT投資の現在価値だけでなく将来の事業目的への整合性も評価することが求められる。","has_choices":true},{"year":"令和6年度","num":"問54","answer":"ウ","question":"事業活動に関わる法令の遵守などを目的の一つとして、統制環境、リスクの評価と対応、統制活動、情報と伝達、モニタリング、ITへの対応から構成される取組はどれか。","choices":{"ア":"CMMI","イ":"ITIL","ウ":"内部統制","エ":"リスク管理"},"explanation":"内部統制（COSO-ICF）は統制環境・リスクの評価と対応・統制活動・情報と伝達・モニタリング活動・ITへの対応の6要素から構成される枠組みで、財務報告の信頼性・法令遵守・業務の有効性・資産保全を目的とする。CMMIは能力成熟度モデル、ITILはITサービス管理のフレームワーク。","has_choices":true},{"year":"令和6年度","num":"問55","answer":"ウ","question":"システム監査の目的に関する記述として、適切なものはどれか。","choices":{"ア":"開発すべきシステムの具体的な用途を分析し、システム要件を明らかにすること","イ":"情報システムが設置されている施設とその環境を総合的に企画、管理、活用すること","ウ":"情報システムに係るリスクに適切に対応しているかどうかを評価することによって、組織体の目標達成に寄与すること","エ":"知識、スキル、ツール及び技法をプロジェクト活動に適用することによって、プロジェクトの要求事項を満足させること"},"explanation":"システム監査の目的は、情報システムのリスクに適切に対応できているかを独立した立場で評価し、問題点の改善・是正を促すことで組織の目標達成に貢献すること。アはシステム要件定義、イはファシリティマネジメント、エはプロジェクトマネジメントの説明。","has_choices":true},{"year":"令和6年度","num":"問56","answer":"イ","question":"PCにおいて、電力供給を断つと記憶内容が失われるメモリ又は記憶媒体はどれか。","choices":{"ア":"DVD-RAM","イ":"DRAM","ウ":"ROM","エ":"フラッシュメモリ"},"explanation":"DRAM（Dynamic Random Access Memory）は揮発性メモリで、電力供給が断たれると記憶内容が消える。DVD-RAM・ROM・フラッシュメモリは不揮発性で、電源を切っても内容が保持される。","has_choices":true},{"year":"令和6年度","num":"問57","answer":"ウ","question":"暗号化方式の特徴について記した表において、表中のa〜dに入れる字句の適切な組合せはどれか。（a:暗号化鍵と復号鍵が異なる方式、b:暗号化鍵と復号鍵が同一の方式）","choices":{"ア":"a:共通鍵暗号方式、b:公開鍵暗号方式、c:遅い、d:速い","イ":"a:共通鍵暗号方式、b:公開鍵暗号方式、c:速い、d:遅い","ウ":"a:公開鍵暗号方式、b:共通鍵暗号方式、c:遅い、d:速い","エ":"a:公開鍵暗号方式、b:共通鍵暗号方式、c:速い、d:遅い"},"explanation":"公開鍵暗号方式は暗号化鍵（公開鍵）と復号鍵（秘密鍵）が異なり（a）、鍵配送は容易だが処理速度が遅い（c）。共通鍵暗号方式は暗号化・復号に同じ鍵を使い（b）、鍵配送は難しいが処理速度が速い（d）。","has_choices":true},{"year":"令和6年度","num":"問58","answer":"エ","question":"文書作成ソフトや表計算ソフトなどにおいて、一連の操作手順をあらかじめ定義しておき、実行する機能はどれか。","choices":{"ア":"オートコンプリート","イ":"ソースコード","ウ":"プラグアンドプレイ","エ":"マクロ"},"explanation":"マクロは、アプリケーションで繰り返し行う操作をあらかじめ記録・定義しておき、一括実行できる機能。オートコンプリートは入力補完機能、ソースコードはプログラムのソース、プラグアンドプレイはデバイスの自動認識・設定機能。","has_choices":true},{"year":"令和6年度","num":"問59","answer":"イ","question":"OCRの役割として、適切なものはどれか。","choices":{"ア":"10cm程度の近距離にある機器間で無線通信する。","イ":"印刷文字や手書き文字を認識し、テキストデータに変換する。","ウ":"デジタル信号処理によって、人工的に音声を作り出す。","エ":"利用者の指先などが触れたパネル上の位置を検出する。"},"explanation":"OCR（Optical Character Recognition：光学的文字認識）は、印刷文字や手書き文字を光学的に読み取りテキストデータに変換する技術。ア（近距離無線通信）はNFC、ウ（音声合成）はTTS（Text-to-Speech）、エ（タッチ位置検出）はタッチパネルセンサーの説明。","has_choices":true},{"year":"令和6年度","num":"問60","answer":"イ","question":"関係データベースを構成する要素の関係を表す図において、図中のa〜cに入れる字句の適切な組合せはどれか。（データベースの集まり→aの集まり→bの集まり→行（cの集まり））","choices":{"ア":"a:表、b:フィールド、c:レコード","イ":"a:表、b:レコード、c:フィールド","ウ":"a:フィールド、b:表、c:レコード","エ":"a:レコード、b:表、c:フィールド"},"explanation":"関係データベースの構造：データベース→表（テーブル）の集まり（a）→レコード（行）の集まり（b）→フィールド（列・項目）の集まり（c）。表の中にレコード（行）が並び、各レコードはフィールド（列）で構成される。","has_choices":true},{"year":"令和6年度","num":"問61","answer":"ア","question":"cookieを説明したものはどれか。","choices":{"ア":"Webサイトが、Webブラウザを通じて訪問者のPCにデータを書き込んで保存する仕組み又は保存されるデータのこと","イ":"Webブラウザが、アクセスしたWebページをファイルとしてPCのハードディスクに一時的に保存する仕組み又は保存されるファイルのこと","ウ":"Webページ上で、Webサイトの紹介などを目的に掲載されている画像のこと","エ":"ブログの機能の一つで、リンクを張った相手に対してその旨を通知する仕組みのこと"},"explanation":"cookieは、Webサイトがブラウザを通じて訪問者のPC（ローカル）にデータを保存する仕組み・データ（ログイン状態維持・カート情報等に利用）。イはWebキャッシュ、ウはバナー広告やロゴ画像、エはトラックバックの説明。","has_choices":true},{"year":"令和6年度","num":"問62","answer":"エ","question":"関数convertは、整数型の配列を一定のルールで文字列に変換するプログラムである。関数convertをconvert(arrayInput)として呼び出したときの戻り値が「AABAB」になる引数arrayInputの値はどれか。（1なら「A」、それ以外なら「B」を末尾に追加）","choices":{"ア":"{0, 0, 1, 2, 1}","イ":"{0, 1, 2, 1, 1}","ウ":"{1, 0, 1, 2, 0}","エ":"{1, 1, 2, 1, 0}"},"explanation":"「AABAB」になるには：1番目→A（1）、2番目→A（1）、3番目→B（1以外）、4番目→A（1）、5番目→B（1以外）。よって配列は{1, 1, 2以外の値, 1, 2以外の値}＝{1, 1, 2, 1, 0}「エ」。","has_choices":true},{"year":"令和6年度","num":"問63","answer":"ア","question":"SSDの全てのデータを消去し、復元できなくする方法として用いられているものはどれか。","choices":{"ア":"Secure Erase","イ":"磁気消去","ウ":"セキュアブート","エ":"データクレンジング"},"explanation":"SSDのデータ完全消去にはSecure Eraseコマンドを使用する。SSDはフラッシュメモリを使用しているため磁気消去は効果がない。セキュアブートはBIOS/UEFIの起動検証機能、データクレンジングはデータの品質改善（誤り修正）。","has_choices":true},{"year":"令和6年度","num":"問64","answer":"イ","question":"情報セキュリティのリスクマネジメントにおけるリスクへの対応を、リスク共有、リスク回避、リスク保有及びリスク低減の四つに分類するとき、リスク共有の例として、適切なものはどれか。","choices":{"ア":"災害によるシステムの停止時間を短くするために、遠隔地にバックアップセンターを設置する。","イ":"情報漏えいによって発生する損害賠償や事故処理の損失補填のために、サイバー保険に加入する。","ウ":"電子メールによる機密ファイルの流出を防ぐために、ファイルを添付した電子メールの送信には上司の許可を必要とする仕組みにする。","エ":"ノートPCの紛失や盗難による情報漏えいを防ぐために、HDDを暗号化する。"},"explanation":"リスク共有（移転）は、リスクの結果を第三者と共有する対応策で、サイバー保険加入が典型例。アはリスク低減（バックアップ）、ウはリスク低減（送信制限）、エはリスク低減（暗号化）。","has_choices":true},{"year":"令和6年度","num":"問65","answer":"ウ","question":"AIにおける機械学習の学習方法に関する次の記述中のa〜cに入れる字句の適切な組合せはどれか。 教師あり学習は正解付きデータでaと呼ばれる手法で未知データをクラス分け、bと呼ばれる手法でデータの関係性を見つける。教師なし学習は正解なしデータでcと呼ばれる手法でグループ分けする。","choices":{"ア":"a:回帰、b:分類、c:クラスタリング","イ":"a:クラスタリング、b:分類、c:回帰","ウ":"a:分類、b:回帰、c:クラスタリング","エ":"a:分類、b:クラスタリング、c:回帰"},"explanation":"教師あり学習：a（分類）＝クラスに分ける手法、b（回帰）＝数値の関係性（連続値予測）を見つける手法。教師なし学習：c（クラスタリング）＝正解ラベルなしにデータをグループ化する手法。","has_choices":true},{"year":"令和6年度","num":"問66","answer":"エ","question":"PKIにおけるCA（Certificate Authority）の役割に関する記述として、適切なものはどれか。","choices":{"ア":"インターネットと内部ネットワークの間にあって、内部ネットワーク上のコンピュータに代わってインターネットにアクセスする。","イ":"インターネットと内部ネットワークの間にあって、パケットフィルタリング機能などを用いてインターネットから内部ネットワークへの不正アクセスを防ぐ。","ウ":"利用者に指定されたドメイン名を基にIPアドレスとドメイン名の対応付けを行い、利用者を目的のサーバにアクセスさせる。","エ":"利用者の公開鍵に対する公開鍵証明書の発行や失効を行い、鍵の正当性を保証する。"},"explanation":"CA（認証局：Certificate Authority）は、公開鍵の持ち主の本人確認を行い、公開鍵証明書（デジタル証明書）の発行・管理・失効を行う機関。アはプロキシサーバ、イはファイアウォール、ウはDNSサーバの役割。","has_choices":true},{"year":"令和6年度","num":"問67","answer":"ウ","question":"図に示す2台のWebサーバと1台のデータベースサーバから成るWebシステムがある。Webサーバの稼働率はともに0.8とし、データベースサーバの稼働率は0.9とすると、このシステムの小数第3位を四捨五入した稼働率は幾らか。（2台のWebサーバのうち少なくとも1台が稼働していて、かつ、データベースサーバが稼働していれば、システムとしては稼働しているとみなす）","choices":{"ア":"0.04","イ":"0.58","ウ":"0.86","エ":"0.96"},"explanation":"2台のWebサーバの並列稼働率＝1－（1－0.8）×（1－0.8）＝1－0.04＝0.96 システム全体（Webサーバ並列×DBサーバ直列）＝0.96×0.9＝0.864→四捨五入→0.86","has_choices":true},{"year":"令和6年度","num":"問68","answer":"ウ","question":"情報デザインで用いられる概念であり、部屋のドアノブの形で開閉の仕方を示唆するというような、人間の適切な行動を誘発する知覚可能な手掛かりのことを何と呼ぶか。","choices":{"ア":"NUI（Natural User Interface）","イ":"ウィザード","ウ":"シグニファイア","エ":"マルチタッチ"},"explanation":"シグニファイア（Signifier）は、ドアノブの形状が「押す・引く・回す」という行動を示唆するように、人間の適切な行動を誘発する知覚可能な手掛かりのこと（デザイナーのDon Normanが提唱）。NUIは自然なインタフェース、ウィザードは段階的な操作案内、マルチタッチは複数指でのタッチ操作。","has_choices":true},{"year":"令和6年度","num":"問69","answer":"イ","question":"障害に備えるために、4台のHDDを使い、1台分の容量をパリティ情報の記録に使用するRAID5を構成する。1台のHDDの容量が1Tバイトのとき、実効データ容量はおよそ何バイトか。","choices":{"ア":"2T","イ":"3T","ウ":"4T","エ":"5T"},"explanation":"RAID5では4台のHDDのうち1台分の容量がパリティ情報に使われる。実効データ容量＝（4－1）×1T＝3Tバイト。","has_choices":true},{"year":"令和6年度","num":"問70","answer":"ウ","question":"ESSIDをステルス化することによって得られる効果として、適切なものはどれか。","choices":{"ア":"アクセスポイントと端末間の通信を暗号化できる。","イ":"アクセスポイントに接続してくる端末を認証できる。","ウ":"アクセスポイントへの不正接続リスクを低減できる。","エ":"アクセスポイントを介さず、端末同士で直接通信できる。"},"explanation":"ESSIDのステルス化（非公開設定）により、SSIDが公開スキャンに表示されなくなるため、不特定多数からの不正接続リスクを低減できる。ただし完全な防止にはならない。アは暗号化（WPA等）、イはMACアドレスフィルタリングや認証、エはアドホックモード通信の効果。","has_choices":true},{"year":"令和6年度","num":"問71","answer":"イ","question":"インターネットで使用されているドメイン名の説明として、適切なものはどれか。","choices":{"ア":"Web閲覧や電子メールを送受信するアプリケーションが使用する通信規約の名前","イ":"コンピュータやネットワークなどを識別するための名前","ウ":"通信を行うアプリケーションを識別するための名前","エ":"電子メールの宛先として指定する相手の名前"},"explanation":"ドメイン名はインターネット上のコンピュータやネットワークを識別する名前（IPアドレスの代わりに使用）。アはプロトコル（HTTP/SMTP等）、ウはポート番号の機能（アプリケーション識別）、エはメールアドレスの説明。","has_choices":true},{"year":"令和6年度","num":"問72","answer":"ウ","question":"次の記述のうち、バイオメトリクス認証の例だけを全て挙げたものはどれか。 a Webページに歪んだ文字の列から成る画像を表示し、読み取った文字列を利用者に入力させることによって、認証を行う。 b キーボードで特定文字列を入力させ、そのときの打鍵の速度やタイミングの変化によって、認証を行う。 c タッチパネルに手書きで氏名を入力させ、そのときの筆跡、筆圧、運筆速度などによって、認証を行う。 d タッチパネルに表示された複数の点をあらかじめ決められた順になぞらせることによって、認証を行う。","choices":{"ア":"a, b","イ":"a, d","ウ":"b, c","エ":"c, d"},"explanation":"バイオメトリクス認証は人間の生体的・行動的特徴を用いた認証。b（打鍵の速度・タイミング）とc（筆跡・筆圧・運筆速度）が行動的バイオメトリクス。aはCAPTCHA（ボット排除のため）、dはパターン認証（パスワードの一種）でバイオメトリクスではない。","has_choices":true},{"year":"令和6年度","num":"問73","answer":"エ","question":"IoT機器のセキュリティ対策のうち、ソーシャルエンジニアリング対策として、最も適切なものはどれか。","choices":{"ア":"IoT機器とサーバとの通信は、盗聴を防止するために常に暗号化通信で行う。","イ":"IoT機器の脆弱性を突いた攻撃を防止するために、機器のメーカーから最新のファームウェアを入手してアップデートを行う。","ウ":"IoT機器へのマルウェア感染を防止するためにマルウェア対策ソフトを導入する。","エ":"IoT機器を廃棄するときは、内蔵されている記憶装置からの情報漏えいを防止するために物理的に破壊する。"},"explanation":"ソーシャルエンジニアリング対策（特に廃棄時の情報漏えい防止）として、IoT機器廃棄時に内蔵記憶装置を物理的に破壊することが適切。ア（暗号化通信）とイ（ファームウェア更新）とウ（マルウェア対策ソフト）は技術的な通信・ソフトウェアセキュリティ対策。","has_choices":true},{"year":"令和6年度","num":"問74","answer":"エ","question":"トランザクション処理に関する記述のうち、適切なものはどれか。","choices":{"ア":"コミットとは、トランザクションが正常に処理されなかったときに、データベースをトランザクション開始前の状態に戻すことである。","イ":"排他制御とは、トランザクションが正常に処理されたときに、データベースの内容を確定させることである。","ウ":"ロールバックとは、複数のトランザクションが同時に同一データを更新しようとしたときに、データの矛盾が起きないようにすることである。","エ":"ログとは、データベースの更新履歴を記録したファイルのことである。"},"explanation":"ログ（ジャーナルファイル）はデータベースの更新前後の情報を記録したファイルで、障害回復に使用される。アの「コミット」はトランザクション成功時に変更確定する操作（ロールバックの説明が逆）。イの「排他制御」は同時更新を防ぐ仕組み（コミットの説明が逆）。ウの「ロールバック」は失敗時に開始前状態に戻す操作（排他制御の説明が逆）。","has_choices":true},{"year":"令和6年度","num":"問75","answer":"エ","question":"情報セキュリティの3要素である機密性、完全性及び可用性と、それらを確保するための対策の例a〜cの適切な組合せはどれか。 a アクセス制御 b デジタル署名 c ディスクの二重化","choices":{"ア":"a:可用性、b:完全性、c:機密性","イ":"a:可用性、b:機密性、c:完全性","ウ":"a:完全性、b:機密性、c:可用性","エ":"a:機密性、b:完全性、c:可用性"},"explanation":"アクセス制御（a）→機密性（権限者のみアクセス）、デジタル署名（b）→完全性（改ざん検知・認証）、ディスクの二重化（c）→可用性（障害時も継続稼働）。","has_choices":true},{"year":"令和6年度","num":"問76","answer":"ウ","question":"スマートフォンなどのタッチパネルで広く採用されている方式であり、指がタッチパネルの表面に近づいたときに、その位置を検出する方式はどれか。","choices":{"ア":"感圧式","イ":"光学式","ウ":"静電容量方式","エ":"電磁誘導方式"},"explanation":"静電容量方式は、人体の静電気を利用して指がパネルに近づいた際の静電容量の変化で位置を検出する方式で、スマートフォン等で広く採用。感圧式は押下圧力で検出、光学式は光の遮断で検出、電磁誘導方式はペンのコイルとの電磁誘導で検出（主にスタイラスペン対応）。","has_choices":true},{"year":"令和6年度","num":"問77","answer":"ウ","question":"出所が不明のプログラムファイルの使用を避けるために、その発行元を調べたい。このときに確認する情報として、適切なものはどれか。","choices":{"ア":"そのプログラムファイルのアクセス権","イ":"そのプログラムファイルの所有者情報","ウ":"そのプログラムファイルのデジタル署名","エ":"そのプログラムファイルのハッシュ値"},"explanation":"デジタル署名は、プログラムの発行元（開発者・企業）が秘密鍵で署名したものであり、公開鍵証明書と照合することで発行元の正当性を確認できる。アクセス権は利用権限、所有者情報はOS上の管理者情報、ハッシュ値は改ざん検知に使用（発行元の確認には不十分）。","has_choices":true},{"year":"令和6年度","num":"問78","answer":"ア","question":"利用者がスマートスピーカーに向けて話し掛けた内容に対して、スマートスピーカーから音声で応答するための処理手順が（1）〜（4）のとおりであるとき、音声認識に該当する処理はどれか。 （1）利用者の音声をテキストデータに変換する。 （2）テキストデータを解析して、その意味を理解する。 （3）応答する内容を決定して、テキストデータを生成する。 （4）生成したテキストデータを読み上げる。 ア（1） イ（2） ウ（3） エ（4）","choices":{"ア":"（1）音声→テキストデータへの変換","イ":"（2）テキストデータの意味理解","ウ":"（3）応答テキストデータの生成","エ":"（4）テキストデータの音声読み上げ"},"explanation":"音声認識（Speech Recognition）は、人間の音声をテキストデータに変換する処理（1）。（2）は自然言語処理・意味理解、（3）は応答生成、（4）は音声合成（TTS）に該当。","has_choices":true},{"year":"令和6年度","num":"問79","answer":"エ","question":"企業などの内部ネットワークとインターネットとの間にあって、セキュリティを確保するために内部ネットワークのPCに代わって、インターネット上のWebサーバにアクセスするものはどれか。","choices":{"ア":"DNSサーバ","イ":"NTPサーバ","ウ":"ストリーミングサーバ","エ":"プロキシサーバ"},"explanation":"プロキシサーバは、内部ネットワークのクライアントに代わってWebアクセスを中継し、セキュリティ確保・アクセス制御・キャッシュによる高速化を実現するサーバ。DNSはドメイン名解決、NTPは時刻同期、ストリーミングサーバは動画・音声配信に使用。","has_choices":true},{"year":"令和6年度","num":"問80","answer":"ア","question":"OSS（Open Source Software）に関する記述として、適切なものだけを全て挙げたものはどれか。 a OSSを利用して作成したソフトウェアを販売することができる。 b ソースコードが公開されたソフトウェアは全てOSSである。 c 著作権が放棄されているソフトウェアである。","choices":{"ア":"a","イ":"a, b","ウ":"b, c","エ":"c"},"explanation":"aのみが正しい。OSSはオープンソースライセンスに従った条件で自由に利用・改変・再配布できるが、著作権は放棄されていない（c誤り）。ソースコードが公開されていてもOSSライセンスがなければOSSではない（b誤り）。aは多くのOSSライセンスで許可されている（GPLライセンスでも販売は可能）。","has_choices":true},{"year":"令和6年度","num":"問81","answer":"エ","question":"一つの表で管理されていた受注データを、受注に関する情報と商品に関する情報に分割して、正規化を行った上で関係データベースの表で管理する。正規化を行った結果の表の組合せとして、最も適切なものはどれか。（受注データ：受注番号、発注者名、商品番号、商品名、個数、単価） エ 受注表（受注番号、発注者名、商品番号、個数）、商品表（商品番号、商品名、単価）","choices":{"ア":"受注表（受注番号、発注者名、商品番号、個数）・商品表（商品番号、商品名）","イ":"受注表（受注番号、発注者名、商品名、個数、単価）・商品表（商品番号）","ウ":"受注表（受注番号、発注者名）・商品表（商品番号、商品名、個数、単価）","エ":"受注表（受注番号、発注者名、商品番号、個数）・商品表（商品番号、商品名、単価）"},"explanation":"正規化（第2正規形）では、主キーに完全関数従属する属性のみを同じ表に置く。受注番号に従属：発注者名・商品番号・個数。商品番号に従属：商品名・単価。よって受注表（受注番号、発注者名、商品番号、個数）と商品表（商品番号、商品名、単価）が正しい正規化結果（エ）。","has_choices":true},{"year":"令和6年度","num":"問82","answer":"イ","question":"ISMSクラウドセキュリティ認証に関する記述として、適切なものはどれか。","choices":{"ア":"一度認証するだけで、複数のクラウドサービスやシステムなどを利用できるようにする認証の仕組み","イ":"クラウドサービスについて、クラウドサービス固有の管理策が実施されていることを認証する制度","ウ":"個人情報について適切な保護措置を講ずる体制を整備しているクラウド事業者などを評価して、事業活動に関してプライバシーマークの使用を認める制度","エ":"利用者がクラウドサービスへログインするときの環境、IPアドレスなどに基づいて状況を分析し、リスクが高いと判断された場合に追加の認証を行う仕組み"},"explanation":"ISMSクラウドセキュリティ認証（ISO/IEC 27017ベース）は、クラウドサービス固有の情報セキュリティ管理策（クラウド特有のリスク・管理要件）が実施されていることを認証する制度。アはシングルサインオン（SSO）、ウはプライバシーマーク、エはリスクベース認証の説明。","has_choices":true},{"year":"令和6年度","num":"問83","answer":"エ","question":"1から6までの六つの目をもつサイコロを3回投げたとき、1回も1の目が出ない確率は幾らか。","choices":{"ア":"1/216","イ":"5/72","ウ":"91/216","エ":"125/216"},"explanation":"1回投げて1の目が出ない確率＝5/6 3回とも出ない確率＝（5/6）³＝125/216","has_choices":true},{"year":"令和6年度","num":"問84","answer":"エ","question":"IoTエリアネットワークでも利用され、IoTデバイスからの無線通信をほかのIoTデバイスが中継することを繰り返し、リレー方式で通信をすることによって、広範囲の通信を実現する技術はどれか。","choices":{"ア":"GPS","イ":"MIMO","ウ":"キャリアアグリゲーション","エ":"マルチホップ"},"explanation":"マルチホップ通信は、IoTデバイスが他のデバイスを中継点（ホップ）として通信をリレーすることで広範囲の通
