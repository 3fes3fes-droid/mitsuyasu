<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>選手の所属クラブ一覧</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root { --line:#d6dbe3; --head:#eef1f5; --bg:#f6f7f9; --text:#111; --muted:#5d6570; }
* { box-sizing:border-box; }
body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",Meiryo,sans-serif; }
.wrap { max-width:1540px; margin:0 auto; padding:14px 16px 48px; }
h1 { margin:0 0 10px; font-size:20px; line-height:1.25; }
.controls { display:flex; flex-wrap:wrap; gap:6px; align-items:center; padding:9px; margin-bottom:10px; background:#fff; border:1px solid var(--line); }
button, .btn { border:1px solid #aeb7c3; background:#fff; color:#111; padding:7px 9px; border-radius:4px; font-size:12px; line-height:1; cursor:pointer; text-decoration:none; }
button:hover, .btn:hover { background:#eef3f8; }
button.active { background:#111; color:#fff; border-color:#111; }
.clear { background:#222; color:#fff; border-color:#222; }
.status { margin-left:auto; display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
.badge { border:1px solid #c8ced8; background:#fafbfc; padding:6px 8px; border-radius:4px; font-size:12px; white-space:nowrap; }
#visibleCount { background:#111; color:#fff; border-color:#111; font-weight:800; }
.tablebox { background:#fff; border:1px solid var(--line); overflow:auto; }
table { width:100%; min-width:1390px; border-collapse:collapse; }
th, td { border:1px solid var(--line); padding:7px 8px; vertical-align:middle; font-size:13px; }
th { position:sticky; top:0; z-index:2; background:var(--head); white-space:nowrap; }
.center { text-align:center; white-space:nowrap; }
.group { font-weight:800; }
.player { display:flex; align-items:flex-start; gap:10px; min-width:430px; }
.playerMeta { flex:1 1 auto; min-width:0; }
.introText { margin-top:7px; color:#333; font-size:12px; line-height:1.55; white-space:normal; max-width:620px; }
.photoBox { width:108px; height:108px; flex:0 0 108px; border:1px solid #c3cbd6; border-radius:10px; overflow:hidden; background:#eceff3; display:flex; align-items:center; justify-content:center; }
.photoBox img { width:108px; height:108px; object-fit:cover; display:block; }
.noPhoto { color:#606a76; font-size:12px; }
.nameRow { display:flex; flex-wrap:wrap; align-items:center; gap:7px; }
.playerlink { color:#0645ad; font-weight:800; font-size:15px; text-decoration:none; }
.playerlink:hover { text-decoration:underline; }
.yt { display:inline-block; background:#c00; color:#fff; border-radius:4px; padding:5px 7px; font-size:11px; line-height:1; text-decoration:none; }
.cellbtn { width:100%; border:0; background:transparent; padding:0; text-align:left; font:inherit; cursor:pointer; }
.cellbtn:hover { text-decoration:underline; }
.club { font-weight:700; }
.agebtn { text-align:center; font-weight:700; }
.dob { color:#555; }
.note { margin:8px 0 0; color:#555; font-size:12px; line-height:1.5; }
@media(max-width:760px){
  .wrap { padding:10px 8px 36px; }
  h1 { font-size:18px; }
  .status { width:100%; margin-left:0; }
  .photoBox, .photoBox img { width:96px; height:96px; }
  .photoBox { flex-basis:96px; }
  table { min-width:1340px; }
}
</style>
</head>
<body>
<div class="wrap">
<h1>選手の所属クラブ一覧</h1>
<div class="controls">
  <button class="clear" id="clearFilter" type="button">フィルタ解除</button>
  <button data-sort="default" type="button">元の順</button>
  <button data-sort="group" type="button">グループ順</button>
  <button data-sort="clubCountDesc" type="button">所属クラブが多い順</button>
  <button data-sort="clubCountAsc" type="button">所属クラブが少ない順</button>
  <button data-sort="leagueCountDesc" type="button">リーグが多い順</button>
  <button data-sort="leagueCountAsc" type="button">リーグが少ない順</button>
  <button data-sort="ageCountDesc" type="button">年齢が多い順</button>
  <button data-sort="ageCountAsc" type="button">年齢が少ない順</button>
  <button data-sort="ageDesc" type="button">年齢高い順</button>
  <button data-sort="ageAsc" type="button">年齢若い順</button>
  <button data-sort="introDesc" type="button">紹介文あり</button>
  <div class="status">
    <span class="badge" id="visibleCount">表示 0 / 0</span>
    <span class="badge" id="photoCount">写真 0 / 0</span>
    <span class="badge" id="introCount">紹介文 0 / 0</span>
    <span class="badge" id="sortStatus">ソート：元の順</span>
    <span class="badge" id="filterStatus">フィルタ：なし</span>
  </div>
</div>
<div class="tablebox">
<table>
<thead><tr><th>組</th><th>背番号</th><th>位置</th><th>選手名</th><th>代表</th><th>本来の所属クラブ</th><th>クラブ所在国</th><th>リーグ / 何部</th><th>年齢</th><th>生年月日</th></tr></thead>
<tbody id="playersBody"></tbody>
</table>
</div>
<p class="note">写真はHTML表示時に外部API取得しない。確定済みURLを<code>PHOTO_CACHE</code>に埋め込み済み（1246/1248件、99.8%）。写真URLはYahoo!スポーツの選手画像URLに統一。</p>
</div>

const INTRO_CACHE = {"Japan|Zion Suzuki|2002-08-21":"類いまれな高い身体能力を有する規格外の守護神。圧巻の飛距離を誇るロングキックなどの攻撃面、抜群の反射神経を生かしたセービングや力強いクロスキャッチといった守備面のどちらも極めて質が高く、弱冠23歳ながら日本代表でも不動の座を確保している。GKとして日本人初となるイタリアの1部リーグに挑戦するなど、日本サッカーの未来を変える存在として躍進中だ。","South Korea|Son Heung-min|1992-07-08":"絶対的なキャプテンとして攻撃の中心を担い、4大会連続でワールドカップに選出された韓国を代表するスーパースター。爆発的なスピードを生かした推進力と、左右両足から放たれる正確無比なシュートで次々にネットを揺らすアタッカーだ。昨季からアメリカに所属を移し、「ホームアドバンテージ」を得て迎える今大会も、エースとして国民の期待に応え続ける。","Brazil|Alisson|1992-10-02":"「最後のとりで」という表現がぴったりなGKで、圧倒的な1対1での強さを誇る。チームの窮地を救った数は数知れず、彼と対じする限り、アタッカーにとって簡単なシュートは存在しない。派手に見せるスーパーセーブが多いわけではなく、正確なポジショニングから繰り出される確実なシュートストップが魅力だ。セービングに加えて得点に直結するキックも持ち味で、まさにチームを勝たせるGKといえる。","Brazil|Marquinhos|1994-05-14":"足元の技術にたけており、本職はセンターバックながらも、複数のポジションをそつなくこなす万能型の守備職人。広範囲を埋めるカバー能力と対人の強さを併せ持ち、代表、所属クラブともに主将格としてチームをまとめ上げてきた。UEFAチャンピオンズリーグ制覇を経験した男が次に狙うのは、自身未到達の「ワールドカップ制覇」ただ1つ。「セレソン」復権に向け、最終ラインから勝者のメンタリティーを植え付ける。","Brazil|Vinícius Júnior|2000-07-12":"10代の頃から脚光を浴びていた神童は、爆発的な加速力と南米特有のアイデアに富んだドリブルを武器に、世界でも指折りのプレーヤーに上り詰めた。近年はキック精度の向上が著しく、ゴールなどの目に見える結果で存在感を示している。それと同時に振る舞いや言動をメディアの風刺にさらされることも増えたが、屈しない愚直さは彼を語る上で欠かせない。「王国復権」を掲げるチームのプライドを、エースとしてピッチ上で表現する。","Brazil|Neymar|1992-02-05":"23年10月以来となる「サプライズ復帰」を果たしたこの世代きってのスーパースター。愛するクラブへの帰還を果たし、度重なる負傷に見舞われながらも、さびることのない足下の技術と抜群の戦術眼で観客を沸かせる姿は今も昔も変わることはない。かつては強豪国の地位を築いていた「セレソン」も今では薄氷の南米予選5位通過。ピッチ内外を問わず、絶大な影響力を誇る男の集大成が、「王国再興」のカギを握る。","Brazil|Raphinha|1996-12-14":"所属クラブでリーグ2連覇を達成し、勢いにのる彼は自身二度目となるワールドカップに臨む。ウイングとしての推進力もさることながら、DFとの駆け引きにも優れており、神出鬼没のオフザボールからゴールに迫る。また、自陣深くまでプレスバックする献身的な姿勢も魅力の1つだ。技術だけでなく、賢さと強度も兼ね備えている彼は、タレントがそろう「セレソン」の中でも異質であり、前線をけん引する存在になるだろう。","Morocco|Yassine Bounou|1991-04-05":"22年カタール大会ではアフリカ勢初となるベスト4の快挙をもたらした立役者となった。彼の特筆すべき点は1対1のセーブにあり、手足を一瞬で広げ、体の面に当てる技術は35歳となった今も衰えない。また、足元の技術も非常に高く、左足のキックからチャンスを演出する攻撃力も兼ね備えている。ダークホースとはもう呼べない「アトラスの獅子」の最後のとりでとして、今大会も名だたる強豪国の前に立ちふさがる。","Morocco|Achraf Hakimi|1998-11-04":"現代のサッカー界において、「攻撃的サイドバック」といえば真っ先にこの選手が思い浮かぶだろう。得点力、スプリントスピード、ドリブルのキレ、すべてにおいてアタッカー顔負けの攻撃性能を有している。当然ながら代表でも替えの利かない存在であり、今大会はキャプテンマークを巻いて臨む予定だが、4月末に右太ももを負傷。最高峰の舞台で、フルコンディションの姿を見せることができるか。","United States|Christian Pulisic|1998-09-18":"「キャプテン・アメリカ」の愛称で知られるアタッカー。鋭い加速と繊細なボールタッチを武器に、前線のあらゆる位置から決定的な違いを生み出す。技術で観客を魅了する一方、ポジションがサイドでも中央でも、チームのために汗を流せる献身性も魅力だ。26年に入ってから得点がなく、パフォーマンスが心配されたものの、直前のテストマッチでようやくネットを揺らした。自国開催での躍進へ、「ヒーロー」の活躍は必須条件だ。","エクアドル|Willian Pacho|2001-10-16":"エクアドルの中核を担うディフェンスリーダー。恵まれたリーチから繰り出される対人強度と、希少な左利きセンターバックという利点を生かしたビルドアップ能力の高さが持ち味だ。南米予選では、グループ最少失点を樹立した守備陣で唯一の全試合出場を記録。その安定感は個としての強さにとどまらず、最終ラインの秩序を担保する存在として際立つ。名実ともに世界屈指の地位を手にした頼もしき男は、全てを代表チームへ還元する。","エクアドル|Moisés Caicedo|2001-11-02":"エクアドルが世界に誇る「ダイナモ」。24歳という若さにして本大会出場は二度目となる。最大の武器は、90分間落ちることのない走力を生かした広範囲のカバー能力と、激しい対人強度。所属クラブ、代表ともに不動の地位を築いており、攻守にわたって貢献度の高いプレーでチームを支える。中心選手として戦った南米予選は、名だたる強豪国を抑えての2位通過に貢献。「ラ・トリ」の屋台骨として、さらなる「無双」に期待したい。","Germany|Jamal Musiala|2003-02-26":"ドイツが世界に誇る「至宝」。ボールが足下に収まった瞬間、密集地帯を一転して攻略可能な空間へと変貌させるタッチの柔らかさが魅力だ。所属する強豪クラブでは若くして10番を背負い、度重なるケガに苦しみながらも大舞台に向けてコンディションを合わせてきた。2大会連続のグループステージ敗退に終わった「ディー・マンシャフト」を再び頂へ導けるか。自身二度目の挑戦となる大舞台で、その真価が問われる。","Germany|Florian Wirtz|2003-05-03":"10代の頃から脚光を浴び、母国クラブでは無敗優勝という偉業に貢献した。今季からはイングランドに移って活躍を続ける攻撃的MF。左右両足を遜色なく使いこなし、狭いスペースを難なく抜け出す高い技術に、さらには相手ブロックの隙を突くパスセンスをも兼ね備える。周りを生かすのみならず、ミドルレンジからネットを揺らせる得点力も魅力だ。ポリバレント性の高さも含め、非常に重宝される存在だろう。","Netherlands|Virgil van Dijk|1991-07-08":"強さ、高さ、速さを誇る世界最高峰のセンターバック。パフォーマンスは常に高い水準を保ち、淡々と相手の攻撃を処理し続ける。最後尾に彼のような安心感のあるDFがいるだけで、チームにもたらされる影響は大きいだろう。絶品の守備に加えて正確なフィードでゲームをコントロールし、セットプレーではターゲットマンとしてシュートをたたき込む攻撃力も兼備。特徴的なゴールセレブレーションを披露する機会は訪れるか。","Netherlands|Ryan Gravenberch|2002-05-16":"自国のレジェンド、フランク・ライカールト氏を連想させるスケール感と、現代的な機動力を兼備する中盤の「大器」。長いストライドでピッチ全体を献身的に走り回り、強じんなフィジカルと長身選手らしからぬ足元の技術で相手のプレスを無効化する。守備の局面においても圧倒的な存在感を放ち、欧州予選ではグループ最少失点を記録した組織的な堅守に大きく貢献。満を持しての初挑戦となる舞台で、自身の名を世界にとどろかせたい。","Netherlands|Memphis Depay|1994-02-13":"欧州の名門クラブを渡り歩き、現在はブラジルに活躍の場を移した通称「メンフィス」。178センチと決して大柄ではないが、常人離れしたフィジカルと卓越した足下のセンスを武器に、前線のポジションならどこでもハイレベルにこなす万能型アタッカーだ。特筆すべきはパワーと精密さを兼ね備えたキックであり、セットプレーではどの位置からでも猛威を振るう。オランダ代表歴代最多得点者は、さらなる数字の更新を狙う。","Netherlands|Cody Gakpo|1999-05-07":"「オランイェ」の前線を彩る万能型アタッカー。ピッチの広範囲を往来しながら攻撃に流動性をもたらし、ビルドアップの出口役としても機能する。長身選手らしからぬ緻密なボールタッチと、リーチを生かしたキャリー能力はタレント軍団の中でも群を抜いており、得意のカットインから繰り出される一撃はまさに一級品。フットボールの母国で研さんを積んだ異質な才能が、王座獲得へのカギを握る。","Netherlands|Frenkie de Jong|1997-05-12":"しなやかな動作と繊細なボールタッチを武器に、組み立てとつぶしの両役を担って中盤を支配するセントラルMF。最大の魅力は相手の間を縫うようなドリブルで、不利な局面を一気に覆す「飛び道具」にもなり得る。近年は度重なる負傷に苦しんでおり、この半年間は十分な出場機会を確保できなかった。コンディション面で不安は残すが、チームに不可欠な選手であることには変わりなく、母国の飛躍のカギを握る1人に数えられる。","Sweden|Alexander Isak|1999-09-21":"まさに「ラインブレイカー」という言葉が似合うストライカー。生粋の点取り屋らしい嗅覚で、ゴールへの最適解を持ち前の長い手足と繊細なシュートテクニックで形にする。一概に背後へ走るだけではなく、ボックス内で待ち構えたシーンでも得点を奪える器用さと強さを兼ね備える。新天地へと移った今季は負傷に苦しみ、プレー時間が少ないが、得点のバリエーションが多いだけに、全てのチームにとって脅威であることは間違いない。","Sweden|Viktor Gyökeres|1998-06-04":"マスクを模したゴールセレブレーションが象徴的な「重戦車」は、屈強なフィジカルに一瞬のスピード、そしてゴールへの嗅覚と、ストライカーに必要な要素を余すことなく併せ持つ。裏への動き出しや前線からのプレッシングを、試合を通して繰り返し行える走力も大きな魅力。ボックス近辺では迷いなく足を振り抜くため、シュートが決まらずとも副次的に好機が生まれることが多く、どこにいても警戒が必要な選手だ。","Japan|Yukinari Sugawara|2000-06-28":"攻守両面で強度の高いプレーを続けることができる右サイドプレーヤー。豊富なスタミナを武器にタッチラインを幾度も上下動し、攻撃ではスピードに乗ったドリブルから精度の高いクロスを、守備では粘り強い対応で対人の強さを発揮する。高い戦術理解度を持っており、スタメンで起用された時はもちろん、逃げ切る際のストッパー的な起用でも計算が立つのはチームにとって非常に大きい。数少ないサイドの専門職としての働きに期待だ。","Japan|Shōgo Taniguchi|1991-07-15":"クレバーな対応が光るセンターバック。最終ラインの中央でディフェンス陣を統率し、体を張り続けるベテランの守備職人だ。ビルドアップの際も落ち着いて左右にボールを散らし、攻撃の一歩目となるなど、常に冷静さを失わない点が魅力の1つ。24年には大ケガを負ったが、復帰以降もメンバーに名を連ね続けており、指揮官の信頼も厚い。新世代の台頭が著しい中、数少ない前回大会の経験者として、ピッチ内外での貢献に期待したい。","Japan|Kō Itakura|1997-01-27":"攻守にクオリティーの高い現代型センターバック。体格を生かした対人守備の強さもさることながら、ビルドアップでも絶対的な安心感をもたらす。前回大会は出場停止のクロアチア戦を除いた全試合にスタメン出場し、快進撃に大きく貢献。この1年はケガに悩まされており、今大会が久々の招集となる。コンディション面には不安が残るが、実績や監督からの信頼は十分。以前は本職だったボランチのバックアッパーとしても貴重な存在だ。","Japan|Yūto Nagatomo|1986-09-12":"アジア初となる5大会連続でワールドカップに選出された生けるレジェンド。他の追随を許さない豊富な経験値と、常に前を向ける圧倒的なメンタルの強さを有しており、短期決戦の中でどんな状況でもチームを1つにまとめ上げる強力なリーダーシップを持つ。その尽きることのないポジティブなエネルギーはピッチの内外で発揮され、チームに良い効果をもたらすことができる貴重な存在だ。","Japan|Wataru Endo|1993-02-09":"右足、左足、頭とどの部位からも得点を奪う現代的なFW。185センチの長身を生かしてポスト役をこなし、味方と連係しながらゴールへの道筋を描く。代表では1トップだけでなくシャドーで起用されることもあり、前線からの守備も含めた「万能さ」が最大の魅力だ。前回大会は追加で招集されたものの、出場機会を得られずに悔しい思いをした。今大会も追加招集となったが、結果を残して得意の「忍者ポーズ」を世界に発信したい。","Japan|Ao Tanaka|1998-09-10":"中盤で時間を作り、試合を支配するボランチだ。優れたテクニックで密集地帯でも冷静にボールをコントロールし、「必殺」のスルーパスでアシストを量産。さらに、特筆すべきは機を見た攻め上がりだ。前回大会でも「三笘の1ミリ」から得点を決めており、ここぞという時に結果を残す勝負強さも備えている。守備面でもうまくポジションを取って危険なスペースを埋めており、攻守においてクレバーさが光る。","Japan|Takefusa Kubo|2001-06-04":"巧みなボールコントロールや緩急の付けたドリブルで攻撃の道筋を作り出すクラッキ。「魔法の左足」から創造性豊かなプレーの数々でオフェンスをけん引し、一気にゴールを陥れる。セットプレーでもその精度の高さは発揮されており、放たれるクロスの質は一級品だ。前回大会を含めて大舞台では悔しい思いが多く、今大会もケガで一時はメンバー入りが危ぶまれた。コンディションを整え、今回こそ自らの大会とできるか。","Japan|Keisuke Gotō|2005-06-03":"巧みなポジショニングで危険な位置に入り込み、191センチの長身を生かした長いリーチからワンタッチでゴールを奪う若きFWだ。足下の技術やスピードを武器にしており、「力強さ」よりも「滑らかさ」を強みとしてベルギーで躍進中。屈強なDFとの経験を糧にフィジカル面も成長しており、代表での経験は浅いものの、1トップとして数多くのタスクを高い水準でこなすことができる。","Japan|Ritsu Dōan|1998-06-16":"強じんなフィジカルを生かした突破が魅力のアタッカーという一面だけではもはやない。ウイングバックを務めた際は、献身的な守備で粉骨砕身チームに貢献。DFが本職かと見間違うほどの強度を発揮して相手の進行を阻み続ける。もちろんボールを持てば積極果敢なドリブルを繰り出し、左足からの強烈なシュートは欠かせない武器の1つ。伊東純也と入れ替わりながら異なる個性を発揮して右サイドを機能させている。","Japan|Daizen Maeda|1997-10-20":"爆発的なスプリント力を誇る快足アタッカー。一切手を抜かないハードワークを身上とし、ボール非保持時にも自慢の走力を生かして相手に脅威を与え続けることができる貴重な存在だ。守備だけではなく、昨季は所属クラブで公式戦33得点を決めてリーグ年間最優秀選手賞に輝くなど、攻撃面の期待も高い。前回大会は3試合に先発し、ハイプレスの先導役となって1得点も記録。今度こそ「ベスト8」の壁を打ち破る原動力となりたい。","Japan|Keisuke Ōsako|1999-07-28":"当時としてはGK史上最年少となる19歳325日で代表デビュー。前回大会後からコンスタントに選出されるようになり、自身初となる夢の舞台への切符を手に入れた。シュートストップやクロスの対応を得意としており、ハンドリング技術の高さが最大の武器だ。どんな状況に陥ってもすぐに切り替えられるメンタルの強さを持ち、常に平常心でゴールマウスを守り続ける。大会を通じて与えられた役割を全うし、チームに貢献したい。","Japan|Keito Nakamura|2000-07-28":"左サイドからゴールを陥れるアタッカー。自らの力で突破を図るだけでなく、味方を利用して相手の急所を突くプレー判断の精巧さに優れている。最大の魅力は得点力の高さで、ドリブルからのシュートに加え、うまくクロスに合わせてネットを揺らすなど、「決め切る」ことができる能力は代表でも随一といえる。所属クラブでは最終節に1試合4ゴールを挙げるなど、最高の状態で北中米の地に降り立つ。","Japan|Junya Itō|1993-03-09":"サイドを切り裂く「サムライブルー」屈指のスピードスター。ベテランの域に達した現在もそのプレースタイルは衰えを知らず、自慢の快足を生かしたチャンスメイクで相手に脅威を与え続ける。「集大成」として挑む今大会は、カタールの地で味わった悔しさのリベンジを期する場。相手がどこであれ物おじしない性格と、4年間で積み上げてきた経験値を武器に、「やたらと速い伊東純也」が日本史上初のベスト8進出の立役者となる。","Japan|Daichi Kamada|1996-08-05":"ピッチ上でのインテリジェンスを感じさせるコンダクターだ。常に落ち着いて試合をコントロールし、流れを読んで必要なプレーを選択できる頭脳を持ち味としている。優れたテクニックを生かして密集の中でも時間を作り、気の利いたパスで味方を生かす。シャドーでもボランチでも高いパフォーマンスを見せる、使い勝手の良さも魅力だ。年々影響力を増しており、「森保ジャパン」の浮沈を担っている中心人物といえるだろう。","Japan|Tsuyoshi Watanabe|1997-02-05":"タイトなマークと空中戦の強さを武器とするセンターバック。3バックの中央では統率力を発揮して周囲をうまく使いながら守備を構築し、自身も対人能力の高さを生かして1対1で優位に立つ。鍛え上げられたフィジカルと頭脳的な守備の両面を発揮し、最終ラインに落ち着きをもたらすことができる。代表経験はまだ浅いが、海外での奮闘と招集時のパフォーマンスが認められ、自身初の舞台にたどり着いた。","Japan|Yuito Suzuki|2001-10-25":"万能型の「仕掛けられるゲームメーカー」。本職のトップ下をはじめ、両サイドやセンターフォワードまで器用に務めるが、代表では主にシャドーの位置を任されることが多い。ドリブルが最大の武器ではあるものの、「ドリブラー」との認識がさほど浸透していないことからも分かる通り、いかなる攻撃プレーも高いレベルでこなせるバランスの良さが魅力だ。デンマークやドイツで実力を付け、24歳で初めての大舞台に臨む。","Japan|Ayase Ueda|1998-08-28":"オランダリーグで得点王に輝き、充実の時を迎えている不動のエースストライカー。豊富なゴールパターンを持つが、特に武器としているのは空中戦の強さだ。182センチと決して長身ではないものの、優れたポジショニングから強烈なヘディングシュートでネットを揺らす。また、前線での体を張ったポストプレーは代表にとって欠かせないものになっており、不完全燃焼に終わった前回大会の借りを返したい。","Japan|Kōki Ogawa|1997-08-08":"フィニッシュワークのパターンの多さが魅力のFWだ。ペナルティエリア内でのクオリティーに絶対の自信を持ち、強引にでもネットを揺らす粘り強さを持つ。特にクロスに合わせる形を得意としており、伊東純也ら精度の高いキッカーがそろう日本代表ではヘディングシュートで数多く得点を奪っている。デビューから11戦10得点という日本代表の記録を持っており、そのサイズを生かして1トップとして体を張り続ける。","Japan|Ayumu Seko|2000-06-07":"優れた戦術眼と、両足で放たれる矢のようなロングフィードを備えた「ボールを持てる」センターバック。そのスキルを買われ、本職の最終ラインだけでなく中盤の位置でも起用されるなど、ユーティリティー性でもチームの一助となる。長く欧州の舞台でもまれたことにより、年々守備面での判断に間違いがなくなってきた。攻守に明確なウイークがなく、脂が乗った状態で自身初の舞台に臨む。","Japan|Hiroki Itō|1999-05-12":"長身を生かしたディフェンスと、左足の精度の高さを武器とするDF。スプリント能力も高く、果敢な攻め上がりから前線に顔を出し、得点を演出する。また、長短を使い分けたパスの出し入れを得意としており、味方を生かす能力にもたけている。所属するドイツのビッグクラブでは、ややケガに苦しみながらもコンスタントに出場機会を確保しており、前回大会よりも格段にスケール感を増している。","Japan|Takehiro Tomiyasu|1998-11-05":"世界的なクラブで名をはせた守備のオールラウンドプレーヤー。DFとして求められる賢さ、高さ、力強さに加えて足下の技術も併せ持ち、最終ラインであればどのポジションでも高いレベルで務めることが可能だ。度重なるケガの影響で一時は無所属の状態もあったが、現在はオランダのクラブで出場機会を得ている。今大会では逃げ切る際のクローザーとしても期待され、たとえ短い出場時間でも重要な役割を担う。","Japan|Tomoki Hayakawa|1999-03-03":"「常勝軍団」でゴールマウスにカギを掛けるGK。25年にはGKとして史上2人目となるJリーグ最優秀選手賞に輝き、優勝したチームを最後方から支えた。最大の特徴は驚異の反射神経から繰り出すスーパーセーブだ。絶体絶命のピンチでも個の能力で防ぎ切るなど、存在感は抜群。鈴木彩艶の壁は厚いが、有事の際でも代表の守護神を任せられる安定感を備えている。","Japan|Kaishū Sano|2000-12-30":"ピッチのあらゆるところに顔を出すダイナモ。強度の高さをベースに、積極的なアプローチでボールを奪う対人の強さは所属リーグでも屈指であり、そこから爆発的なスプリントを生かして一気に前線に運べるダイナミックさも持ち味といえる。巧みにシュートを決める技術も有しており、幅広く動くスタイルは鎌田大地との補完関係が抜群だ。「森保ジャパン」では直近1年間で瞬く間に台頭。今大会は「心臓」としてフル回転が期待される。","Japan|Junnosuke Suzuki|2003-07-12":"すい星のごとく現れた若きDF。24年に湘南で定位置をつかむと、翌年にはデンマークへ旅立ち、代表初出場は25年の6月。10月のブラジル戦で左センターバックとして出色の出来を見せ、一気に台頭した。跳躍力、スプリント力を含めた身体能力の高さを有し、目の前の相手を1対1で抑え込める。両足を使えるパスセンスも持ち合わせており、試合を経験するごとに成長を続ける、限界が見えない22歳だ。","Japan|Kento Shiogai|2005-03-26":"強引にでもゴールに迫る若きアタッカー。オランダでプロとしての一歩目を踏み出すと、瞬く間に頭角を現し、今年の1月にドイツへステップアップを果たした。どちらのクラブでもスーパーサブでの起用が主で、代表でも「切り札」としての活躍に期待したい。わずか1キャップでのメンバー入りとなったが、大舞台でもひるむことなく前進するのがこの男の強み。フィジカルの強さとスプリント能力を発揮して結果を残す。","エジプト|Mohamed Salah|1992-06-15":"世界屈指のアタッカーとして長年欧州を席巻してきた母国エジプトの「英雄」。卓越したフィジカルとメンタリティーを兼ね備え、左足から放たれる一撃は見る者を一瞬で熱狂の渦へと引きずり込む。イングランドで250以上もの得点を記録したレジェンドにとって、ワールドカップの舞台は今回が二度目。キャプテンとしてチームを束ねてエジプトに初勝利をもたらし、さらに初のノックアウトステージ進出へと導けるか。","Belgium|Thibaut Courtois|1992-05-11":"「タランチュラ」の異名で、数々の名門クラブで守護神を務めた彼は、いまだに陰りを見せることはない。特筆すべきは200cmという規格外の体格ながら、圧倒的な反射神経を誇る部分である。3年前には膝の負傷を経験したが、持ち前の敏しょう性は衰えず。しかし、ベルギー代表からはピッチ外の問題によって招集されない時期もあった。復帰を果たした今は「黄金世代」の1人として、チームの旗頭になることを期待したい。","Belgium|Kevin De Bruyne|1991-06-28":"卓越したゲームメイク能力を持つコンダクター。広い視野と精度の高いキックを武器に、チャンスに直結するパスを何度も繰り出す。ゴールを演出する側にとどまらず、ミドルレンジから左右両足で強烈なシュートを突き刺すことも可能だ。大一番では勝負強さが光り、18年ロシア大会の3位入賞に大きく貢献。ベテランの域に入ってもセンスは健在で、「黄金世代」の象徴として、新世代とともに「レッドデビルズ」を勝利に導く。","Uruguay|Federico Valverde|1998-07-22":"熱い闘志を前面に出しながら、ピッチを縦横無尽に駆け回る「ラ・セレステ」のキャプテン。最大の特長は卓越したインテンシティーで、デュエルの局面では持ち前のフィジカルを生かして相手を圧倒する。右足から放たれる弾丸のようなシュートは今や代名詞となっており、スコアラーとしての活躍にも注目が集まる。「古豪」をけん引するリーダーとして、不本意な結果に終わった22年カタール大会のリベンジを誓う。","Spain|Rodri|1996-06-22":"派手さより堅実さを重視したプレーで、チームの「心臓」と「頭脳」を兼任する守備的MF。攻撃では高い戦術眼を生かして起点となり、一方の守備においても前回大会はセンターバックを任されたほど、文句なしの高い強度を備える。一昨年にバロンドールを受賞した名選手だが、近年は慢性化したケガに苦しんでいる。コンディションに不安は残るが、本来のポジションであるアンカーで勝負する今大会のパフォーマンスは必見だ。","Spain|Lamine Yamal|2007-07-13":"フットボール界の未来を担うアタッカー。今季は所属クラブで公式戦45試合24ゴール17アシストという圧倒的な数字を残し、その真価を示した。傑出した突破力に加えてプレー選択にも優れ、すでに完成された右ウインガーだ。代名詞は、小さなモーションから瞬間的に繰り出されるアウトサイドキックで、芸術的な軌道を描きながらピンポイントで受け手の足下に届く。その左足を武器に、「ラ・ロハ」のチャンスメイクの柱となる。","Spain|Pedri|2002-11-25":"適切な場所にボールを届ける確かな技術と頭脳を持つゲームメイカーは、ライン間への侵入からチャンスを演出するバイタリティーも兼ね備える。針の糸を通すようなラストパスの精度は一級品だ。また、小柄ながら抜群のボディーバランスでデュエルを制し、守備の局面でも存在感を示す。すでに世界最高峰の中盤としての呼び声が高い彼は、4大会ぶりの悲願を誓う「無敵艦隊」の中軸として、チームをけん引する。","Spain|Pau Cubarsí|2007-01-22":"守備ではラインコントロールの中心を担って統率し、攻撃では正確無比なフィードから起点を作る。まさに最終ラインの司令塔である彼は、弱冠19歳の新鋭だ。若くして非常に高い判断力を持ち、ディレイを多用して自分の間合いに引き込むクレバーな守備が光る。所属クラブではすでに中軸を担っており、「ラ・ロハ」の新たなディフェンスリーダーとして、優勝を目指すチームのキーパーソンとなるだろう。","ノルウェー|Erling Haaland|2000-07-21":"規格外の得点力を持つ怪物FW。圧倒的な「高さ」や「強さ」が際立つ選手ながら、「速さ」や足下の技術までも一線級のクオリティーを有する。欧州予選では8試合で16得点という圧巻の数字をたたき出し、母国を久々の大舞台へと導いた。多彩なバリエーションでゴールを量産する、まさに「出れば決める」ストライカーだ。元サッカー選手の父親は94年アメリカ大会に出場しており、親子二世代にわたって北米の地での大舞台に挑む。","ノルウェー|Martin Ødegaard|1998-12-17":"若くしてその才能を買われ、16歳から欧州トップレベルの舞台を経験してきた「魔術師」。円熟味を増した今でもその左足は健在で、柔らかいタッチと空間を使うパスで時間を止めるようにチャンスメイクする。代表と所属クラブの両方でキャプテンを務めるなど、プレーだけでなく精神面でもチームの支柱となれる存在だ。自身にとって初となる「夢の舞台」で躍動し、母国を高みへ導けるか。","France|Ousmane Dembélé|1997-05-15":"かつては悪童と評された逸材も、年齢を重ねるごとに落ち着きを会得し、今や「バロンドーラー」としての称号を獲得。他の追随を許さない両足の精度はもちろん、高い俊敏性とアスリート能力を武器に、数々のDFを地の底に陥れてきた。所属クラブでは「偽9番」として地位を確立しているが、「レ・ブルー」ではサイドが主戦場。世界屈指の破壊力を持つタレント軍団の中でもひと際輝く「怪物」が、頂点奪還の立役者となる。","France|Kylian Mbappé|1998-12-20":"現代フットボール界を象徴する怪物アタッカー。異次元のスプリント能力で背後をえぐり、わずかな隙からゴールを奪い切る決定力も兼ね備える。前回大会では決勝の大舞台で鮮烈な爪痕を残したものの、頂点を目前にしながら悔しさを味わった。だからこそ次に求められるのは、個の輝きだけではなくチームとしての結果だ。主将としての重圧を背負い、2大会ぶりとなる王座奪還へ。「レ・ブルー」の10番が新たな歴史にその名を刻む。","France|Michael Olise|2001-12-12":"ソックスとスパイクを同じ色に合わせるスタイルを好み、殊に異彩を放つ左利きのテクニシャン。繊細なボールタッチと緩急自在のドリブルで相手の重心を剥がし、狭い局面をいとも簡単に崩す。視野の広さにも優れ、突破後の選択肢としてラストパスとシュートを高精度で使い分けられるのが特徴だ。そして自身最大の売りは、カットインからの再現性の高いフィニッシュ。ビッグマッチでも物おじしないメンタリティーにも注目だ。","France|William Saliba|2001-03-24":"屈強なフィジカル、スピード、そして読みの鋭さを生かした対人能力は他を寄せ付けず、センターバックの中では現時点で世界トップ5に入るといっても差し支えない。いかなる状況においても冷静にプレーし、1人で相手の攻撃を封じ込んでしまうなど、その安定感は高級車に例えられるほど。彼がハイラインの土台としてどっしりと構えておけば、ピッチに立つ攻撃陣は思う存分前へと意識を向けられるはずだ。","Argentina|Julián Alvarez|2000-01-31":"「ラ・アラーニャ」の愛称で知られる現代型ストライカー。豊富なスタミナを武器に、前線からの献身的な守備はもちろん、戦術理解度の高さを生かした多彩なプレーが持ち味だ。そして、最大の魅力は何と言っても世界最高クラスの決定力。左右両足を遜色なく使いこなし、幅広いレンジからゴールに襲い掛かる一撃は見る者を魅了する。所属クラブでは惜しくも無冠に終わった今季の悔しさを、大舞台で晴らす準備はできているはずだ。","Argentina|Lionel Messi|1987-06-24":"まさしく、フットボール史に刻まれた生ける伝説。「神の子」と呼ばれ続け、前回大会での悲願達成によってより高い存在に昇華したといっても良いだろう。欧州を離れた今でも唯一無二のプレースタイルは揺るがず、南米予選では数々のタレントを抑えて得点王に輝いた。守備免除が許された世界的に見ても希少な存在として、ピッチ内外を問わず絶大な存在感を発揮。自身六度目の挑戦となる大舞台で、自国を初の大会連覇へ導けるか。","Argentina|Lautaro Martínez|1997-08-22":"ゴールを陥れる「9番」、攻撃のタクトを振る「10番」の両方を高いレベルでこなす万能型ストライカー。FWとしての技術はさることながら、最大の魅力はそのリーダーシップで、ピッチ内外で勝利への執念を見せる姿は「猛牛」に例えられる。所属クラブでは名実ともにレジェンドの道を歩む一方、前回のワールドカップは結果を残せずに悔しい思いをした。今大会は、自らの手で「アルヘンティナ」を再び頂上に導きたい。","Argentina|Emiliano Martínez|1992-09-02":"セービング能力に秀でた守護神。的確なポジショニングと超人的な反応速度を武器とし、際どいシュートも楽々と止めてみせる。PK戦では積極的に心理戦を仕掛け、前回大会を含め、タイトルの懸かった大一番で救世主となる活躍を見せてきた。決して恵まれたとはいえない幼少期や、長い不遇の時期を経験した苦労人としても知られる。史上初となる二度目のゴールデングローブ賞を狙う男が、王者の最後の防波堤として立ちはだかる。","Argentina|Enzo Fernández|2001-01-17":"優れたポジショニングセンスを武器に、攻守両面で「王者」を支える、替えの利かない選手の1人。MFとして理想的な能力を併せ持ち、折を見た攻撃参加は今やおなじみの光景になりつつある。前回大会では中盤の底に位置し、ゲームの組み立て役としてプレーしたが、今大会はインサイドハーフ起用が主となりそうだ。より自身の強みを生かせるポジションで、所属クラブでの世界一に続いて代表チームでも「頂点」のみを狙う。","コロンビア|Luis Díaz|1997-01-13":"「ルチョ」の愛称で親しまれる左ウインガーは、今季毎試合のように得点に関与する活躍を見せた通り、今まさにキャリアの絶頂期を迎えている。持ち前のスピードやテクニックにはさらに磨きがかかり、左サイドを幾度となく切り裂いてチャンスへつなげる。これらの攻撃センスに加え、泥臭くも映る体を張ったプレーや、アタッカーらしからぬ積極的なディフェンスも魅力だ。攻守にわたる高い貢献度で、母国を勝利へ導けるか。","Portugal|Rúben Dias|1997-05-14":"圧倒的な対人能力を誇る守備職人。フィジカルを武器に空中戦や1対1で強さを発揮するのみならず、今日のセンターバックには不可欠とされるビルドアップのスキルも引けを取らない。守備陣の統率者としても優秀で、長らく母国の顔として君臨したペペがピッチを去った今大会は、その系譜を継ぐ新たな「ディフェンスリーダー」としての役割が期待される。祖国に念願のタイトルをもたらすべく、鉄壁を敷いてチームを支えたい。","Portugal|Cristiano Ronaldo|1985-02-05":"名門クラブを渡り歩き、幾多のタイトルを獲得してきた彼だが、唯一もって手にしていないビッグタイトルが「ワールドカップ」だ。サウジアラビアに渡って以降もコンディションは保っており、経験値からくるゴール前での勝負強さと決定力はいまだに健在だ。しかし、40歳を超えた今は、第一線でのプレーから離れる時期もそう遠くはない。一国を代表した華々しい栄冠へ賭ける思いは、出場する選手のだれよりも強く重いものである。","Portugal|Bruno Fernandes|1994-09-08":"「魔術師」とも称されるポルトガル代表屈指の司令塔。正確無比なスルーパスで守備網を切り裂き、強烈なミドルで試合の均衡を動かす。局面の変化を見逃さない戦術眼を備え、停滞した流れに一手で刺激を与えられる存在だ。所属クラブでは主将を担い、中盤の核としてゲームのかじ取りから献身的な守備まで、マルチタスクを器用にこなせる「現代型の10番」。母国初となる悲願のタイトルへ、大舞台での勝負強さを遺憾なく発揮したい。","Portugal|Vitinha|2000-02-13":"ポルトガル不動の「心臓」として君臨する世界屈指のプレーメーカー。狭い局面でもボールを失わない高い技術と広い視野を兼ね備え、ミスの少ない配球で試合のリズムを操る。所属クラブでは欧州最高峰の戦いで主力として存在感を確立し、リーグ連覇やビッグマッチを経験しながら評価を押し上       case "group": return (groupRank[x.group]??999)-(groupRank[y.group]??999)||baseCmp(x,y);
      case "clubCountDesc": return (y.club_count-x.club_count)||String(x.club_jp).localeCompare(String(y.club_jp),"ja")||baseCmp(x,y);
      case "clubCountAsc": return (x.club_count-y.club_count)||String(x.club_jp).localeCompare(String(y.club_jp),"ja")||baseCmp(x,y);
      case "leagueCountDesc": return (y.league_count-x.league_count)||String(x.league).localeCompare(String(y.league),"ja")||baseCmp(x,y);
      case "leagueCountAsc": return (x.league_count-y.league_count)||String(x.league).localeCompare(String(y.league),"ja")||baseCmp(x,y);
      case "ageCountDesc": return (y.age_count-x.age_count)||(Number(y.age)-Number(x.age))||baseCmp(x,y);
      case "ageCountAsc": return (x.age_count-y.age_count)||(Number(x.age)-Number(y.age))||baseCmp(x,y);
      case "ageDesc": return (Number(y.age)-Number(x.age))||baseCmp(x,y);
      case "ageAsc": return (Number(x.age)-Number(y.age))||baseCmp(x,y);
      case "introDesc": return (Number(hasIntro(y))-Number(hasIntro(x)))||baseCmp(x,y);
      default: return baseCmp(x,y);
    }
  });
  return a;
}
function filterButton(type, value, label, cls="") { return `<button class="cellbtn ${cls}" type="button" data-filter-type="${esc(type)}" data-filter-value="${esc(value)}" data-filter-label="${esc(label)}">${esc(label)}</button>`; }
function renderPhoto(row) {
  const u = photoUrl(row);
  if (u) return `<div class="photoBox"><img src="${esc(u)}" alt="${esc(row.name_jp)}" loading="lazy" referrerpolicy="no-referrer" onerror="this.closest('.photoBox').innerHTML='<span class=&quot;noPhoto&quot;>読込失敗</span>'"></div>`;
  return `<div class="photoBox"><span class="noPhoto">写真なし</span></div>`;
}
function rowHtml(row) {
  const ageLabel = row.age + "歳";
  const intro = introText(row);
  const introHtml = intro ? `<div class="introText">${esc(intro)}</div>` : "";
  return `<tr>
    <td class="center group">${esc(row.group)}</td><td class="center">${esc(row.number)}</td><td class="center">${esc(row.pos)}</td>
    <td><div class="player">${renderPhoto(row)}<div class="playerMeta"><div class="nameRow"><a class="playerlink" href="${googleUrl(row.name_jp)}" target="_blank" rel="noopener noreferrer" data-en="${esc(row.name_en)}">${esc(row.name_jp)}</a><a class="yt" href="${youtubeUrl(row.name_jp)}" target="_blank" rel="noopener noreferrer">YouTube</a></div>${introHtml}</div></div></td>
    <td>${filterButton("team_jp", row.team_jp, flagLabel(teamFlag(row), row.team_jp))}</td>
    <td>${filterButton("club_key", row.club_key, row.club_jp, "club")}</td>
    <td>${filterButton("club_country_jp", row.club_country_jp, flagLabel(clubFlag(row), row.club_country_jp))}</td>
    <td>${filterButton("league", row.league, row.league)}</td>
    <td class="center">${filterButton("age", row.age, ageLabel, "agebtn")}</td>
    <td class="center dob">${esc(row.dob)}</td>
  </tr>`;
}
function render() {
  const filtered = applyFilter(PLAYER_DATA);
  const sorted = sortRows(filtered);
  const photoTotal = PLAYER_DATA.filter(hasPhoto).length;
  const introTotal = PLAYER_DATA.filter(hasIntro).length;
  document.getElementById("playersBody").innerHTML = sorted.map(rowHtml).join("");
  document.getElementById("visibleCount").textContent = `表示 ${sorted.length} / ${PLAYER_DATA.length}`;
  document.getElementById("photoCount").textContent = `写真 ${photoTotal} / ${PLAYER_DATA.length}`;
  document.getElementById("introCount").textContent = `紹介文 ${introTotal} / ${PLAYER_DATA.length}`;
  document.getElementById("sortStatus").textContent = "ソート：" + SORT_LABELS[activeSort];
  document.getElementById("filterStatus").textContent = filterText(activeFilter);
  document.querySelectorAll("[data-sort]").forEach(b => b.classList.toggle("active", b.dataset.sort === activeSort));
}
document.addEventListener("click", e => {
  const f = e.target.closest("[data-filter-type]");
  if (f) { activeFilter = {type:f.dataset.filterType, value:f.dataset.filterValue, label:f.dataset.filterLabel || f.textContent.trim()}; render(); return; }
  const s = e.target.closest("[data-sort]");
  if (s) { activeSort = s.dataset.sort; render(); return; }
});
document.getElementById("clearFilter").addEventListener("click", () => { activeFilter = null; render(); });
render();
</script>
</body>
</html>
